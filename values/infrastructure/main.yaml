# Default values for monobase-infrastructure Helm chart
# These control cluster-wide infrastructure components
# Note: argocd.repoURL is injected from infrastructure-root.yaml bootstrap file

# Cert Manager - TLS certificate automation
certManager:
  enabled: true
  version: v1.16.2

# Cert Manager Resources - ClusterIssuers and certificate configuration
certManagerIssuers:
  enabled: true
  issuers:
    # HTTP-01 challenge type (no DNS provider needed)
    - name: letsencrypt-prod
      email: "admin@example.com"
      server: production
      provider: http01
    
    - name: letsencrypt-staging
      email: "admin@example.com"
      server: staging
      provider: http01

    # HTTP-01 challenge via NGINX Gateway (for domains routed through NGINX)
    - name: letsencrypt-nginx-http01
      email: "caretheextramile@gmail.com"
      server: production
      provider: http01
      http01:
        gatewayName: nginx-shared-gateway
        gatewayNamespace: nginx-gateway-system

    # Cloudflare DNS-01 challenge (for wildcard and multi-level subdomains)
    - name: letsencrypt-mycure-cloudflare-prod
      email: "caretheextramile@gmail.com"
      server: production
      provider: cloudflare
      cloudflare:
        apiTokenSecretRef:
          name: mycure-cloudflare-api-token
          key: api-token
        dnsZones:
          - mycureapp.com
          - stitchtechsolutions.com
          - localfirsthealth.com
          - mycure.md

# Envoy Gateway - Gateway API implementation
envoyGateway:
  enabled: true
  version: v1.2.0

# NGINX Gateway Fabric - Staging test (alongside Envoy Gateway)
nginxGateway:
  enabled: true
  version: "2.4.1"

# NGINX Gateway Resources
nginxGatewayResources:
  gatewayClass:
    enabled: false  # GatewayClass created by operator chart

  gateway:
    name: nginx-shared-gateway
    namespace: nginx-gateway-system
    gatewayClassName: nginx
    listeners:
      # Preprod localfirsthealth.com (ephemeral prod-mirror env)
      - name: https-preprod-lfh
        port: 443
        protocol: HTTPS
        hostname: "*.preprod.localfirsthealth.com"
        tlsSecretName: nginx-gateway-tls-preprod
      - name: http-preprod-lfh
        port: 80
        protocol: HTTP
        hostname: "*.preprod.localfirsthealth.com"
      # Production localfirsthealth.com
      - name: https-lfh
        port: 443
        protocol: HTTPS
        hostname: "*.localfirsthealth.com"
        tlsSecretName: nginx-gateway-tls-prod
      - name: http-lfh
        port: 80
        protocol: HTTP
        hostname: "*.localfirsthealth.com"
      # Production mycure.md
      - name: https-mycure
        port: 443
        protocol: HTTPS
        hostname: "*.mycure.md"
        tlsSecretName: nginx-gateway-tls-prod-mycure
      - name: http-mycure
        port: 80
        protocol: HTTP
        hostname: "*.mycure.md"

  tls:
    certificates:
      - secretName: nginx-gateway-tls-preprod
        clusterIssuer: letsencrypt-mycure-cloudflare-prod  # DNS-01, wildcard
        dnsNames:
          - "*.preprod.localfirsthealth.com"
      - secretName: nginx-gateway-tls-prod
        clusterIssuer: letsencrypt-mycure-cloudflare-prod  # DNS-01
        dnsNames:
          - "*.localfirsthealth.com"
      - secretName: nginx-gateway-tls-prod-mycure
        clusterIssuer: letsencrypt-nginx-http01  # HTTP-01 via NGINX Gateway
        dnsNames:
          - api.mycure.md
          - find.mycure.md

  # Cluster-wide SnippetsPolicies for the shared nginx Gateway.
  # Owned here (not per-app) so two releases can never inject the same
  # directive into the same nginx context — that triggers
  # "directive is duplicate" and breaks config reload.
  snippetsPolicies:
    - name: hapihub-proxy-timeout
      snippets:
        - context: http.server.location
          value: |
            proxy_read_timeout 3600s;
            client_max_body_size 50m;
    # vapt-2025#10 L-001: OSS NGINX cannot suppress the `Server` response
    # header via `server_tokens` (only hides the version) and the data-plane
    # image does not bundle `headers-more`. Use the bundled njs module
    # (ngx_http_js_module) to delete the header in the response-header phase.
    # Script: charts/nginx-gateway/files/security-headers.js
    # Mount:  argocd/infrastructure/templates/nginx-gateway.yaml
    - name: nginx-strip-server-header
      snippets:
        - context: http
          value: |
            js_import securityHeaders from /etc/nginx/njs-security/security-headers.js;
        - context: http.server.location
          value: |
            js_header_filter securityHeaders.clearServer;

# EnvoyProxy Configuration - Cloud-specific LoadBalancer settings
envoyProxyConfig:
  enabled: false  # Override per deployment
  name: custom-proxy-config
  namespace: envoy-gateway-system
  serviceAnnotations: true
  cloudProvider: none

  azure:
    publicIpName: ""
    resourceGroup: ""
    ipv4Address: ""

  aws:
    eipAllocations: ""

  gcp:
    staticIpAddress: ""

  digitalocean:
    loadBalancerId: ""
    loadBalancerName: ""

  customAnnotations: {}

# Gateway Resources - Shared Gateway configuration
gateway:
  # Base domain for gateway (override per deployment)
  domain: mycureapp.com

  # Gateway configuration
  gateway:
    name: shared-gateway
    namespace: gateway-system
    gatewayClassName: envoy-gateway
    listeners:
      https:
        enabled: true
        port: 443
        protocol: HTTPS
        # hostname automatically derived from gateway.domain as *.mycureapp.com
      http:
        enabled: true
        port: 80
        protocol: HTTP
        # hostname automatically derived from gateway.domain as *.mycureapp.com
    # Additional listeners for localfirsthealth.com domains
    additionalListeners:
      # Production localfirsthealth.com
      - name: https-lfh
        port: 443
        protocol: HTTPS
        hostname: "*.localfirsthealth.com"
      - name: http-lfh
        port: 80
        protocol: HTTP
        hostname: "*.localfirsthealth.com"
      # Removed: *.mycure.md and *.stg.mycure.md envoy listeners.
      # These were unused — every mycure.md HTTPRoute attaches to
      # nginx-shared-gateway (different gateway, different cert), and
      # the gateway-tls certificate doesn't include the *.mycure.md
      # wildcards, so envoy reported InvalidCertificateRef and the
      # listeners stayed Programmed=False, dragging gateway-resources
      # to Degraded health in ArgoCD. (See `kubectl get httproutes -A` —
      # only monitoring/grafana attaches to envoy shared-gateway.)

  # TLS/Certificate configuration
  tls:
    enabled: true
    secretName: gateway-tls
    certManager:
      enabled: true  # Enabled: DNS records exist, ready for certificate provisioning
      clusterIssuer: letsencrypt-mycure-cloudflare-prod  # DNS-01 challenge (HTTP-01 broken in Envoy Gateway v1.2.0)
      includeApex: false  # Wildcard listeners don't match apex domain
      # Specific subdomains for HTTP-01 challenge
      subdomains:
        # Production subdomains
        - grafana
        - api
        - web
        - sync
        - storage
        - dentalemon
        - hapihub
        - mycure
        - mycurev8
      # Additional domains for localfirsthealth.com
      additionalDomains:
        # Production localfirsthealth.com
        - dentalemon-myaccount.localfirsthealth.com
        - dentalemon-website.localfirsthealth.com
        - grafana.localfirsthealth.com
        - hapihub.localfirsthealth.com
        - mycure-deploydash.localfirsthealth.com
        - mycure-myaccount.localfirsthealth.com
        - mycure.localfirsthealth.com
        - mycurelocal.localfirsthealth.com
        - mycurev8.localfirsthealth.com
        - sync.localfirsthealth.com
        # *.mycure.md removed: the envoy shared-gateway no longer has
        # mycure.md listeners (see additionalListeners above), and the
        # cert-manager Cloudflare DNS-01 issuer cannot resolve the mycure.md
        # zone in this account. The real *.mycure.md routes terminate TLS on
        # nginx-shared-gateway using a separate nginx-gateway-tls-prod-mycure cert.

  # HTTP to HTTPS redirect
  httpRedirect:
    enabled: false  # Disabled: wildcard redirect incompatible with HTTP-01
    statusCode: 301

  # EnvoyPatchPolicy - Increase max request headers size
  # Fixes HTTP 431 "Request Header Fields Too Large" errors
  envoyPatchPolicy:
    enabled: true
    maxRequestHeadersKb: 96  # Default 60, max 96
    listeners:
      - https
      - https-lfh
      - https-mycure

# External Secrets - Secret management
externalSecrets:
  enabled: true
  version: 0.9.11
  provider: gcp
  
  # AWS Secrets Manager configuration
  aws:
    region: us-east-1
    roleArn: ""
    serviceAccountName: external-secrets-sa
  
  # Azure Key Vault configuration
  azure:
    vaultUrl: ""
    identityId: ""
    tenantId: ""
  
  # GCP Secret Manager configuration
  gcp:
    projectId: ""
    region: us-central1
    clusterName: ""
    serviceAccountEmail: ""

# External DNS - Automatic DNS record management from HTTPRoutes
externalDNS:
  enabled: true  # Automatic DNS via Cloudflare

# Longhorn - Distributed block storage
longhorn:
  enabled: false  # Usually use cloud provider storage
  version: 1.6.0

# Kyverno - Policy engine
kyverno:
  enabled: false  # Optional, enable for policy enforcement
  version: 3.2.0
  policies:
    enabled: false  # Only if kyverno.enabled=true

# Velero - Backup and disaster recovery
velero:
  enabled: true
  version: 7.1.4
  provider: digitalocean
  
  # AWS S3 configuration
  aws:
    region: us-east-1
    bucket: ""  # Set to S3 bucket name (e.g., my-cluster-velero-backups)
    roleArn: ""  # Auto-populated from terraform output (IRSA)
  
  # Azure Blob Storage configuration
  azure:
    resourceGroup: ""  # Set to Azure resource group
    storageAccount: ""  # Set to storage account name
    blobContainer: ""  # Set to blob container name (e.g., velero-backups)
    subscriptionId: ""  # Optional, auto-detected if not set
    identityClientId: ""  # Auto-populated from terraform output (Workload Identity)
  
  # GCP Cloud Storage configuration
  gcp:
    bucket: ""  # Set to GCS bucket name (e.g., my-cluster-velero-backups)
    projectId: ""  # Set to GCP project ID
    region: us-central1
    serviceAccount: ""  # Auto-populated from terraform output (Workload Identity)
  
  # DigitalOcean Spaces configuration
  digitalocean:
    bucket: mycure-doks-velero-backups
    region: sgp1
    accessKey: ""  # Via External Secrets
    secretKey: ""  # Via External Secrets
  
  # MinIO configuration (for K3D/local development)
  minio:
    bucket: velero-backups
    url: http://minio.velero.svc:9000
    publicUrl: http://localhost:9000
    accessKey: minio
    secretKey: minio123
  
  # Backup schedules configuration
  schedules:
    # Infrastructure namespace backups
    infrastructure:
      daily:
        enabled: true
        schedule: "0 3 * * *"  # 3 AM daily
        retention: 720h  # 30 days
      hourly:
        enabled: false  # Optional, for critical infrastructure
        schedule: "0 * * * *"  # Every hour
        retention: 72h  # 3 days
    
    # Cluster-wide resource backups
    cluster:
      weekly:
        enabled: true
        schedule: "0 4 * * 0"  # 4 AM Sunday
        retention: 2160h  # 90 days

    # Production workload backups
    production:
      daily:
        enabled: true
        schedule: "0 2 * * *"  # 2 AM daily
        retention: 720h  # 30 days
        namespaces:
          - mycure-production

# Falco - Runtime security monitoring
falco:
  enabled: false  # Optional, enable for runtime threat detection
  version: 4.6.1
  rules:
    enabled: false  # Only if falco.enabled=true

# Monitoring - Prometheus + Grafana stack
monitoring:
  enabled: true  # Optional, enable for observability
  version: 11.x.x  # Bitnami kube-prometheus chart version
  
  # Prometheus configuration
  prometheus:
    retention: 30d  # How long to keep metrics
    storageSize: 50Gi  # Prometheus data storage
    storageClass: ""  # Auto-detect from cluster default
  
  # Grafana configuration (deployed as separate wrapper chart)
  grafana:
    enabled: true  # Enable Grafana deployment

    # Bitnami grafana subchart values (nested under 'grafana:')
    grafana:
      admin:
        user: admin
        password: admin  # Override via External Secrets in production

      # Use bitnamilegacy image (consistency with monitoring stack)
      image:
        registry: docker.io
        repository: bitnamilegacy/grafana

      resources:
        requests:
          cpu: "50m"
          memory: "150Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      persistence:
        enabled: true
        size: 10Gi
        storageClass: ""  # Auto-detect from cluster default

      # Dashboard provider configuration
      dashboardsProvider:
        enabled: true

      # Dashboard ConfigMaps to load
      dashboardsConfigMaps:
        - configMapName: grafana-dashboard-global
          fileName: global.json
        - configMapName: grafana-dashboard-nodes
          fileName: nodes.json
        - configMapName: grafana-dashboard-namespaces
          fileName: namespaces.json
        - configMapName: grafana-dashboard-pods
          fileName: pods.json
        - configMapName: grafana-dashboard-apiserver
          fileName: api-server.json
        - configMapName: grafana-dashboard-prometheus
          fileName: prometheus.json

    # Wrapper chart gateway configuration (not nested)
    gateway:
      enabled: true
      hostname: ""  # Uses grafana.{domain}
  
  # Alertmanager configuration
  alertmanager:
    enabled: true
    storageClass: ""  # Auto-detect
    
    # Slack notifications (optional)
    slack:
      webhookUrl: ""  # Set to Slack webhook URL for alerts
    
    # Email notifications (optional)
    email:
      smarthost: ""  # SMTP server (e.g., smtp.gmail.com:587)
      from: ""  # From email address
      to: ""  # To email address

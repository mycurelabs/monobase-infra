# ===== DATABASE: PostgreSQL (HA, Tier 4.2) =====
# Replication mode: 1 primary + 1 read replica with streaming replication.
# Sized for the migrated 11.x dataset (~35GB useful from MongoDB) plus
# 18 months growth headroom. See plan: tier 4.2 in DIFF.md.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: replication

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    replicationUsername: repl_user
    secretKeys:
      adminPasswordKey: postgres-password
      replicationPasswordKey: postgres-replication-password

  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi

  readReplicas:
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ===== DATABASE: MongoDB =====
mongodb:
  enabled: true # Self-hosted MongoDB in Kubernetes

  fullnameOverride: "mongodb"

  architecture: replicaset
  replicaCount: 1

  image:
    repository: bitnamilegacy/mongodb
    tag: 7.0.15-debian-12-r0

  auth:
    rootUser: root
    existingSecret: mongodb

  arbiter:
    enabled: false

  livenessProbe:
    enabled: true
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  readinessProbe:
    enabled: true
    timeoutSeconds: 20
    periodSeconds: 20
    failureThreshold: 10

  persistence:
    enabled: true
    storageClass: ""
    size: 100Gi

  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 3000m
      memory: 6Gi

  podDisruptionBudget:
    enabled: false

# ===== CACHE: Valkey (Redis) — Tier 4.3 =====
valkey:
  enabled: false  # disabled 2026-04-07 (incident)

  global:
    security:
      allowInsecureImages: true

  auth:
    existingSecret: valkey

  architecture: standalone

  image:
    repository: bitnamilegacy/valkey
    tag: 8.0.1-debian-12-r2

  master:
    persistence:
      enabled: true
      storageClass: ""
      size: 4Gi
    # Resource sizing inherited from staging (2026-04-06 lessons):
    # 512Mi -> 277 restarts in 27h, 1Gi still OOMs during AOF replay,
    # 2Gi gives real headroom. CPU bumped so initial replay doesn't
    # starve the liveness probe.
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi

# ===== STORAGE: MinIO Object Storage =====
minio:
  enabled: false

  fullnameOverride: "minio"

  image:
    repository: bitnamilegacy/minio
    tag: "2025.7.23-debian-12-r3"

  mode: standalone

  statefulset:
    replicaCount: 1

  auth:
    existingSecret: minio

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  defaultBuckets: "monobase-files"

  buckets:
    - name: "monobase-files"
  region: "us-east-1"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  gateway:
    enabled: true
    hostname: ""
    rateLimit:
      enabled: false

# ===== EMAIL TESTING: Mailpit =====
mailpit:
  enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  gateway:
    enabled: true
    hostname: ""

# ===== P2P SYNC: Cadence — Tier 4.4 =====
cadence:
  enabled: false  # disabled 2026-04-07 (incident)

  image:
    repository: ghcr.io/mycurelabs/cadence
    tag: "0.4.0"
    pullPolicy: Always

  replicaCount: 1

  # Resource sizing inherited from staging (2026-04-06 lessons):
  # 0.4.0 OOMs at 2Gi during initial valkey state load (~425k metadata
  # keys + 110-table watermark cache + iroh quic stack). 4Gi gives headroom.
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  gateway:
    hostname: ""
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "10m"

  postgresql:
    enabled: true
    serviceName: postgresql-primary
    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator (Tier 5) =====
# Long-lived MongoDB → PostgreSQL migration tool. NOT a Job — runs continuously
# through bulk → cdc → reverse-cdc as MIGRATION.md phases progress.
#
# Default disabled. Flip enabled: true at MIGRATION.md Phase 2 (after the
# image is published and ready to start the bulk run).
#
# v3.7.0 ships MODE=reverse-cdc as PG-only capture: PG triggers record every
# write on the allowlist into `_pg_changelog`. Capture-only — no MongoDB
# replay; the changelog is the rollback forensic trail.
hapihubMigrator:
  enabled: true # Phase 2 — bulk migration started 2026-04-07

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.7.4"
    pullPolicy: IfNotPresent

  # bulk (Phase 3) → cdc (Phase 4) → reverse-cdc (Phase 6, post-cutover)
  mode: reverse-cdc

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  # Connection details — both DB connection strings are assembled in-template
  # from the existing in-cluster K8s secrets (no GCP secret indirection):
  #   PG_TARGET_URI ← postgresql Secret (postgres-password)
  #   MONGO_SOURCE_URI ← mongodb Secret (mongodb-root-password)
  postgresql:
    enabled: true
    serviceName: postgresql-primary
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless # bitnami chart only creates the headless service
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  # Encryption keys are required so the migrator can decrypt the encrypted
  # MongoDB collections (medical-records, billing-*, personal-details) before
  # writing to PG, AND re-encrypt during reverse CDC.
  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

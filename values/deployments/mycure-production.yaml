  env:
    - name: CADENCE_PER_COLLECTION_WORKERS
      value: "true"
    # ── 0.9.0 RC α–η fix-program gates (mono#2356) ──────────────────────
    # Preprod-verified 2026-07-13 (0.9.0 booted clean). All fixes are
    # default-off in the binary; enabled here. HELD fleet-wide until
    # validated: ENFORCE_PEER_BINDING (can wedge a box whose peer_id/token
    # mismatch — validate on a box first), SCOPE_FAIL_CLOSED (announcements
    # needs an array org-scope), STABLE_KEYSPACE (keyspace-move maint op).
    - name: CADENCE_WATERMARK_INVARIANT      # #2370 silent-write-loss clamp
      value: "true"
    - name: CADENCE_APPLIER_FK_RETRY         # #2358 FK-casualty requeue
      value: "true"
    - name: CADENCE_LAG_RECOVERY_INCREMENTAL # #2391 no full-snapshot re-flood
      value: "true"
    - name: CADENCE_BASELINE_EMIT            # #2389 baseline-absorbed rows
      value: "true"
    - name: CADENCE_MEMBER_SCOPE_EXPANSION   # #2372 anonymous members (own-org; fails open)
      value: "true"
    - name: CADENCE_ENFORCE_READ_ONLY        # #2397 v1
      value: "true"
    - name: CADENCE_ENFORCE_REVOCATION       # #2397 v4 (revoked_subs empty = no-op)
      value: "true"
    - name: CADENCE_JWKS_TTL_SECS            # #2397 v2 (rotation revocation)
      value: "3600"
    - name: CADENCE_JSONB_SUBKEY_MERGE       # validate_m partial (delta-safe)
      value: "true"
    - name: CADENCE_BULK_OP_DETECT           # WATCH-3 divergence detection
      value: "true"
    - name: CADENCE_P2P_ENABLED              # #2359 hub is WS-only
      value: "false"
    # HELD off on PROD: retention-peer-floor defaults ON in the binary, but
    # prod has a disk-emergency history (d25/d27) and the
    # `cadence_retention_floor_seq==0` alert isn't wired yet — a wedged peer
    # could pin partitions. Keep the age-cutoff until the alert exists.
    - name: CADENCE_RETENTION_PEER_FLOOR
      value: "false"

  # TEMPORARY (2026-07-14 incident): paused to shed PG load — hub resync
  # catch-up walks were ~half the active queries on the pegged 2-vCPU PG
  # node during clinic peak hours. Restore to 1 off-peak (or after the PG
  # node capacity bump); boxes queue offline and catch up on resume.
  replicaCount: 0

  # Resources sized to the empirically-observed memory floor (2026-06-10
  # incident, monobase-infra#10). After §A.2/§B/§D/§E shipped in 0.5.14-0.5.17
  # the catch-up code path is fully optimized (UPSERT type-coercion fix,
  # bounded max_lamports_by_doc, bounded mpsc producer queue, per-collection
  # lamport_map). The residual ~1.7 GiB plateau on prod is non-catch-up
  # runtime state — iroh transport, tokio runtime, fred/valkey client pool,
  # loro CRDT, allocator fragmentation — that isn't addressable at the app
  # layer. Preprod plateaus at ~1.2 GiB; prod's heavier peer + workload
  # extrapolates to ~1.7 GiB. 4 GiB gives ~2x headroom before the next
  # workload step kicks the cycle back on.
  # 2026-07-10 (M4 full-config cutover): 96 collections × primary-reader-on-
  # every-catch-up (baseline not persisted to changelog) blew past the 4Gi
  # limit → OOMKilled (exit 137). Bumped 4Gi→12Gi / req 1→3Gi to stop the
  # crash loop while the catch-up memory profile is retuned for 96 collections.
  resources:
    requests:
      cpu: 200m
      memory: 3Gi
    limits:
      cpu: "2"
      memory: 12Gi

  gateway:
    hostname: ""
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "10m"

  postgresql:
    enabled: true
    serviceName: postgresql-primary
    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  # Phase 3.4: opt prod into the PG-native partitioned changelog. Dual-
  # write soak — Valkey stays authoritative for reads (`readFrom:
  # valkey`); cadence writes every change-log entry to BOTH stores so
  # PG's `cadence` schema fills with parity data. Once the prod
  # divergence counter holds at 0 for >5 days AND preprod's `readFrom:
  # pg` flip has soaked for >24h, a follow-up PR flips this to "pg" too.
  #
  # Motivation: today (2026-06-24 09:36 UTC) prod cadence OOM-cycled
  # the Valkey instance — pressure 3071/3072 MB, emergency trim 100k
  # entries, append_change script failures cascaded, pod restarted.
  # That's the exact failure mode Phase 3 targets. Enabling dual-write
  # gets PG-backed durability in place; Phase 4 eventually removes
  # the Valkey changelog write path entirely.
  #
  # Failure mode: if PG is unreachable, Valkey writes still succeed
  # and `cadence:dual_write_divergence_total` on /metrics increments.
  # Sync is never blocked by a PG outage during this phase.
  # Phase 3.5: flip prod changelog reads to PG-authoritative.
  # Empirical soak (2026-06-24 → 2026-06-25):
  #   - preprod readFrom=pg ran 16h on 7.6M ops, 0 divergence, 0 restarts
  #   - prod dual-write (readFrom=valkey) ran 14h on 548k ops, 0 divergence
  #   - PG `cadence.changelog` has 770k+ rows, daily partitions rolling
  # Writes still dual-write so Valkey stays as the seq allocator +
  # rollback ground truth. Phase 4 removes the Valkey changelog write
  # path entirely once readFrom=pg has soaked enough that we're
  # comfortable.
  pgChangelog:
    enabled: true
    readFrom: "pg"
    # 2026-06-26: dropped 7→2 after the 158 GB d25 reseed event.
    # 2026-07-10 (#103 M4 cutover): raised back 2→7 for fleet offline
    # tolerance.
    # 2026-07-14: back to 2 — post-M4 daily partitions run 9-58 GB, so 7d
    # retention risks another disk-full. Cost (unchanged from 06-26): peers
    # offline >2 days fall below the lamport trim floor and must do a
    # snapshot-based resume (existing code path).
    retentionDays: 2

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator (Tier 5) =====
# Long-lived MongoDB → PostgreSQL migration tool. NOT a Job — runs continuously
# through bulk → cdc → reverse-cdc as MIGRATION.md phases progress.
#
# Default disabled. Flip enabled: true at MIGRATION.md Phase 2 (after the
# image is published and ready to start the bulk run).
#
# v3.7.0 ships MODE=reverse-cdc as PG-only capture: PG triggers record every
# write on the allowlist into `_pg_changelog`. Capture-only — no MongoDB
# replay; the changelog is the rollback forensic trail.
hapihubMigrator:
  enabled: false # migrator stopped 2026-07-02 (was: Phase 2 bulk started 2026-04-07)
  replicaCount: 1  # re-enabled 2026-06-10 after cadence 0.5.13 keyset fix landed

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.9.3"  # #2092: legacy billing-invoices → billing_legacy_invoices (was mis-mapped to billing_invoices); + billing.invoices → billing_invoices. Reverse map follows registry.
    pullPolicy: IfNotPresent

  # bulk (Phase 3) → cdc (Phase 4) → reverse-cdc (Phase 6, post-cutover)
  mode: cdc

  # ===== Reverse PG→Mongo (Phase B) — staged gated rollout (infra#11) =====
  # Stage 4 (FULL): `tables` filter dropped → reverse-apply covers ALL
  # reverse-scoped collections, INCLUDING the 5 encrypted ones (personal_details,
  # medical_records, billing_invoices, billing_items, billing_payments). PG
  # plaintext is re-encrypted with the prod ENC_* keys before writing to Mongo
  # (AES-CBC, deterministic; keys verified at startup; ciphertext+_eh validated
  # end-to-end in preprod). Forward (3.8.1) sets suppress_capture (no echo);
  # latest-wins skips anything Mongo already has. Stages 1→3b preceded this.
  reverseCdc:
    enabled: true
    apply: true
    # no `tables` → apply ALL reverse-scoped (incl. encrypted) = full reverse sync

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

  # Connection details — both DB connection strings are assembled in-template
  # from the existing in-cluster K8s secrets (no GCP secret indirection):
  #   PG_TARGET_URI ← postgresql Secret (postgres-password)
  #   MONGO_SOURCE_URI ← mongodb Secret (mongodb-root-password)
  postgresql:
    enabled: true
    serviceName: postgresql-primary
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless # bitnami chart only creates the headless service
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  # Encryption keys are required so the migrator can decrypt the encrypted
  # MongoDB collections (medical-records, billing-*, personal-details) before
  # writing to PG, AND re-encrypt during reverse CDC.
  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details

  # Nightly bulk safety-net sweep over a trailing 48h window. Re-runs
  # MODE=bulk to catch documents the CDC replayer may have missed
  # (collector disconnects, oplog truncation, key skew, etc.). Bulk is
  # idempotent (ON CONFLICT DO UPDATE) and shares the upsert path with
  # CDC — safe alongside the running Deployment. Validated end-to-end
  # in preprod against tags 3.7.4 and 3.7.8.
  nightlyJob:
    enabled: true  # re-enabled 2026-06-10 after cadence 0.5.13 keyset fix landed
    schedule: "0 18 * * *"   # 02:00 Asia/Manila daily, offset from Velero @ 02:00 UTC
    lookbackHours: 48

  # Reverse-bulk nightly safety net (MODE=reverse-bulk, PG → Mongo). The reverse
  # analog of nightlyJob above: sweeps PG rows updated in the trailing window and
  # upserts them to Mongo (latest-wins, re-encrypting encrypted collections),
  # catching anything the realtime reverse replayer missed (worker downtime,
  # capture gaps). Full scope (no `tables`) to match the realtime reverse-apply.
  # Offset from the forward nightly (18:00) and Velero (02:00).
  reverseNightlyJob:
    enabled: true
    schedule: "0 20 * * *"   # 20:00 UTC daily
    windowHours: 26
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

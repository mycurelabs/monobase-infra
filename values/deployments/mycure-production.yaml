# ===== DATABASE: PostgreSQL (HA, Tier 4.2) =====
# Replication mode: 1 primary + 1 read replica with streaming replication.
# Migrator dual-write grew the DB to ~187GB (5x the original ~35GB MongoDB
# projection), filling the 200Gi volumes on 2026-06-25 and crashlooping the
# primary (disk-full during WAL redo). Bumped 200Gi -> 300Gi. Growth rate
# needs review — this will refill. See plan: tier 4.2 in DIFF.md.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: replication

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    replicationUsername: repl_user
    secretKeys:
      adminPasswordKey: postgres-password
      replicationPasswordKey: postgres-replication-password

  primary:
    persistence:
      enabled: true
      storageClass: ""
      # 400Gi: emergency-expanded live on 2026-06-29 during a changelog-spike
      # disk-fill; this reconciles repo+STS template to the live PVC. Read
      # replica stays 300Gi. See disk-full incident notes.
      size: 400Gi
    resources:
      requests:
        # 2026-07-07 node-reservation bump (mono#2129 follow-up): the primary
        # actually uses ~1.3 cores / 11.5Gi but requested only 250m/4Gi, so the
        # scheduler saw a "mostly free" node and co-located app pods on it
        # during the #2114 incident (node hit 105% CPU). Honest requests
        # de-facto reserve the node (~13.7Gi allocatable) without taints.
        cpu: 1000m
        memory: 12Gi
      limits:
        cpu: 2000m
        memory: 12Gi  # bumped 8Gi->12Gi 2026-06-29: primary was at ~95% mem (7.6/8Gi), OOM-kill headroom
    # Perf tuning — replaces PG defaults (shared_buffers 128MB / work_mem 4MB)
    # for the 35GB DB; sized to the 8Gi pod limit. See node-separation issue
    # for the CPU-oversubscription follow-up. Applying restarts the primary.
    #
    # shared_preload_libraries: bitnami's default is 'pgaudit' — keep it and
    # add pg_stat_statements (mono#2129 follow-up: query attribution was
    # impossible during the incident). Requires the restart this block already
    # implies; CREATE EXTENSION pg_stat_statements in the hapihub DB after.
    extendedConfiguration: |
      shared_preload_libraries = 'pgaudit, pg_stat_statements'
      shared_buffers = 2GB
      effective_cache_size = 5GB
      work_mem = 16MB
      maintenance_work_mem = 256MB
      random_page_cost = 1.1
      effective_io_concurrency = 200
    # Cross-DB spread: never co-locate the PG primary with MongoDB. Both are
    # heavy (PG ~1.5core/8.6Gi, Mongo ~6Gi) and had piled onto one prod node,
    # saturating it (CPU 105%) and causing 15-16s queries. `required` is safe:
    # 4 prod nodes, 3 DB pods. Overrides the chart's default self-only preset.
    # Applying reschedules the primary (brief write blip) — trigger in a window.
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: mongodb
            topologyKey: kubernetes.io/hostname

  readReplicas:
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: ""
      size: 300Gi
    resources:
      requests:
        cpu: 100m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    # Keep the replica's config in lockstep with the primary (idle today, but
    # ready for read-offload and consistent on promotion). Restarts the replica.
    # primary_slot_name pins the replica to a persistent physical slot
    # (pg_read_replica) so the primary retains WAL until the replica consumes it
    # — prevents the "WAL segment already removed" death the replica hit on
    # 2026-06-25. Capped on the primary by max_slot_wal_keep_size=80GB so a dead
    # replica can't refill the primary disk.
    extendedConfiguration: |
      shared_preload_libraries = 'pgaudit, pg_stat_statements'
      shared_buffers = 2GB
      effective_cache_size = 5GB
      work_mem = 16MB
      maintenance_work_mem = 256MB
      random_page_cost = 1.1
      effective_io_concurrency = 200
      primary_slot_name = 'pg_read_replica'
    # Prefer to keep the read replica off the primary and Mongo nodes too, so
    # all three DBs spread. Soft (preferred) — the replica is idle/less critical,
    # and a hard rule could wedge scheduling if a node is drained.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: [postgresql, mongodb]
                  - key: app.kubernetes.io/component
                    operator: NotIn
                    values: [read]
              topologyKey: kubernetes.io/hostname
    # Startup probe gates liveness during the initial pg_basebackup. The DB is
    # ~140GB, so a re-clone takes ~90min — the default liveness probe would
    # SIGKILL the pod every ~90s and restart the clone forever. 180min ceiling
    # (720 * 15s). See disk-full / replica re-clone incident 2026-06-25.
    customStartupProbe:
      exec:
        command:
          - /bin/sh
          - -c
          - exec pg_isready -U postgres -d dbname=hapihub -h 127.0.0.1 -p 5432
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 720
      successThreshold: 1

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ===== DATABASE: MongoDB =====
mongodb:
  enabled: true # Self-hosted MongoDB in Kubernetes

  fullnameOverride: "mongodb"

  architecture: replicaset
  replicaCount: 1

  image:

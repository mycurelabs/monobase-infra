# ===== HEALTHCARE: SyncD Real-time Synchronization =====
syncd:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/syncd
    tag: "5.130.36"
    pullPolicy: IfNotPresent

  # Scaled to 0: legacy on-prem hapihub sync clients are decommissioned.
  # syncd's SECONDARY_PREFERRED reads land on the standalone (single-member)
  # MongoDB primary shared with hapihub, saturating it and causing mycurev8
  # request hangs. autoscaling disabled so the HPA (minReplicas: 1) does not
  # scale it back up. Re-enable both if an on-prem client must reconnect.
  replicaCount: 0

  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      cpu: "2"
      memory: 4Gi

  gateway:
    hostname: ""
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false # disabled so HPA does not override replicaCount: 0 (see note above)
    minReplicas: 1
    maxReplicas: 3

  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      # MongoDB URI (managed DigitalOcean - shared with hapihub)
      - secretKey: MONGO_URI
        remoteKey: mycure-production-mongo-uri
      # Encryption keys (same as hapihub)
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details

  mongodb:
    external: false # Use in-cluster MongoDB
    enabled: true
    serviceName: mongodb
    database: hapihub
    username: root
    replicaSet: rs0

# ===== DATABASE: PostgreSQL (HA, Tier 4.2) =====
# Replication mode: 1 primary + 1 read replica with streaming replication.
# Sized for the migrated 11.x dataset (~35GB useful from MongoDB) plus
# 18 months growth headroom. See plan: tier 4.2 in DIFF.md.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: replication

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    replicationUsername: repl_user
    secretKeys:
      adminPasswordKey: postgres-password
      replicationPasswordKey: postgres-replication-password

  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 250m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    # Perf tuning — replaces PG defaults (shared_buffers 128MB / work_mem 4MB)
    # for the 35GB DB; sized to the 8Gi pod limit. See node-separation issue
    # for the CPU-oversubscription follow-up. Applying restarts the primary.
    extendedConfiguration: |
      shared_buffers = 2GB
      effective_cache_size = 5GB
      work_mem = 16MB
      maintenance_work_mem = 256MB
      random_page_cost = 1.1
      effective_io_concurrency = 200

  readReplicas:
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 100m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    # Keep the replica's config in lockstep with the primary (idle today, but
    # ready for read-offload and consistent on promotion). Restarts the replica.
    extendedConfiguration: |
      shared_buffers = 2GB
      effective_cache_size = 5GB
      work_mem = 16MB
      maintenance_work_mem = 256MB
      random_page_cost = 1.1
      effective_io_concurrency = 200

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ===== DATABASE: MongoDB =====
mongodb:
  enabled: true # Self-hosted MongoDB in Kubernetes

  fullnameOverride: "mongodb"

  architecture: replicaset
  replicaCount: 1

  image:
    repository: bitnamilegacy/mongodb
    tag: 7.0.15-debian-12-r0

  auth:
    rootUser: root
    existingSecret: mongodb

  arbiter:
    enabled: false

  livenessProbe:
    enabled: true
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  readinessProbe:
    enabled: true
    timeoutSeconds: 20
    periodSeconds: 20
    failureThreshold: 10

  persistence:
    enabled: true
    storageClass: ""
    size: 200Gi

  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 3000m
      memory: 6Gi

  podDisruptionBudget:
    enabled: false

# ===== CACHE: Valkey (Redis) — Tier 4.3 =====
valkey:
  enabled: true

  global:
    security:
      allowInsecureImages: true

  auth:
    existingSecret: valkey

  architecture: standalone

  image:
    repository: bitnamilegacy/valkey
    tag: 8.0.1-debian-12-r2

  master:
    persistence:
      enabled: true
      storageClass: ""
      # 2026-06-15: bumped 4Gi → 32Gi after the 4Gi PVC filled (cadence
      # change-log growth), out-of-space write corrupted AOF seqs 13/15/16,
      # valkey crashlooped 213× over 22h → fleet-wide sync outage. PVC
      # patched live, AOF repaired via valkey-check-aof --fix, this value
      # bumped to reconcile the STS template. The underlying root cause
      # (unbounded change-log growth) is unchanged — 32Gi just moves the
      # deadline. See: cadence change-log TTL/trim follow-up issue.
      size: 32Gi
    # Resource sizing history: 512Mi -> 277 restarts in 27h (staging,
    # 2026-04-06); 1Gi still OOMs during AOF replay; 2Gi OOM-crashlooped
    # 2026-06-11 with a 1.6G AOF (cadence change-log growth). 4Gi unblocks,
    # but the dataset grows unboundedly — needs change-log trimming/TTL
    # before this limit is hit again. CPU at 1 core so AOF replay doesn't
    # starve the liveness probe.
    resources:
      requests:
        cpu: 250m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

# ===== STORAGE: MinIO Object Storage =====
minio:
  enabled: false

  fullnameOverride: "minio"

  image:
    repository: bitnamilegacy/minio
    tag: "2025.7.23-debian-12-r3"

  mode: standalone

  statefulset:
    replicaCount: 1

  auth:
    existingSecret: minio

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  defaultBuckets: "monobase-files"

  buckets:
    - name: "monobase-files"
  region: "us-east-1"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  gateway:
    enabled: true
    hostname: ""
    rateLimit:
      enabled: false

# ===== EMAIL TESTING: Mailpit =====
mailpit:
  enabled: false

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  gateway:
    enabled: true
    hostname: ""

# ===== P2P SYNC: Cadence — Tier 4.4 =====
cadence:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/cadence
    tag: "0.5.19"
    pullPolicy: Always

  replicaCount: 1

  # Resources sized to the empirically-observed memory floor (2026-06-10
  # incident, monobase-infra#10). After §A.2/§B/§D/§E shipped in 0.5.14-0.5.17
  # the catch-up code path is fully optimized (UPSERT type-coercion fix,
  # bounded max_lamports_by_doc, bounded mpsc producer queue, per-collection
  # lamport_map). The residual ~1.7 GiB plateau on prod is non-catch-up
  # runtime state — iroh transport, tokio runtime, fred/valkey client pool,
  # loro CRDT, allocator fragmentation — that isn't addressable at the app
  # layer. Preprod plateaus at ~1.2 GiB; prod's heavier peer + workload
  # extrapolates to ~1.7 GiB. 4 GiB gives ~2x headroom before the next
  # workload step kicks the cycle back on.
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  gateway:
    hostname: ""
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "10m"

  postgresql:
    enabled: true
    serviceName: postgresql-primary
    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator (Tier 5) =====
# Long-lived MongoDB → PostgreSQL migration tool. NOT a Job — runs continuously
# through bulk → cdc → reverse-cdc as MIGRATION.md phases progress.
#
# Default disabled. Flip enabled: true at MIGRATION.md Phase 2 (after the
# image is published and ready to start the bulk run).
#
# v3.7.0 ships MODE=reverse-cdc as PG-only capture: PG triggers record every
# write on the allowlist into `_pg_changelog`. Capture-only — no MongoDB
# replay; the changelog is the rollback forensic trail.
hapihubMigrator:
  enabled: true # Phase 2 — bulk migration started 2026-04-07
  replicaCount: 1  # re-enabled 2026-06-10 after cadence 0.5.13 keyset fix landed

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.8.1"
    pullPolicy: IfNotPresent

  # bulk (Phase 3) → cdc (Phase 4) → reverse-cdc (Phase 6, post-cutover)
  mode: cdc

  # ===== Reverse PG→Mongo (Phase B) — staged gated rollout (infra#11) =====
  # Stage 4 (FULL): `tables` filter dropped → reverse-apply covers ALL
  # reverse-scoped collections, INCLUDING the 5 encrypted ones (personal_details,
  # medical_records, billing_invoices, billing_items, billing_payments). PG
  # plaintext is re-encrypted with the prod ENC_* keys before writing to Mongo
  # (AES-CBC, deterministic; keys verified at startup; ciphertext+_eh validated
  # end-to-end in preprod). Forward (3.8.1) sets suppress_capture (no echo);
  # latest-wins skips anything Mongo already has. Stages 1→3b preceded this.
  reverseCdc:
    enabled: true
    apply: true
    # no `tables` → apply ALL reverse-scoped (incl. encrypted) = full reverse sync

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi

  # Connection details — both DB connection strings are assembled in-template
  # from the existing in-cluster K8s secrets (no GCP secret indirection):
  #   PG_TARGET_URI ← postgresql Secret (postgres-password)
  #   MONGO_SOURCE_URI ← mongodb Secret (mongodb-root-password)
  postgresql:
    enabled: true
    serviceName: postgresql-primary
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless # bitnami chart only creates the headless service
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  # Encryption keys are required so the migrator can decrypt the encrypted
  # MongoDB collections (medical-records, billing-*, personal-details) before
  # writing to PG, AND re-encrypt during reverse CDC.
  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details

  # Nightly bulk safety-net sweep over a trailing 48h window. Re-runs
  # MODE=bulk to catch documents the CDC replayer may have missed
  # (collector disconnects, oplog truncation, key skew, etc.). Bulk is
  # idempotent (ON CONFLICT DO UPDATE) and shares the upsert path with
  # CDC — safe alongside the running Deployment. Validated end-to-end
  # in preprod against tags 3.7.4 and 3.7.8.
  nightlyJob:
    enabled: true  # re-enabled 2026-06-10 after cadence 0.5.13 keyset fix landed
    schedule: "0 18 * * *"   # 02:00 Asia/Manila daily, offset from Velero @ 02:00 UTC
    lookbackHours: 48

  # Reverse-bulk nightly safety net (MODE=reverse-bulk, PG → Mongo). The reverse
  # analog of nightlyJob above: sweeps PG rows updated in the trailing window and
  # upserts them to Mongo (latest-wins, re-encrypting encrypted collections),
  # catching anything the realtime reverse replayer missed (worker downtime,
  # capture gaps). Full scope (no `tables`) to match the realtime reverse-apply.
  # Offset from the forward nightly (18:00) and Velero (02:00).
  reverseNightlyJob:
    enabled: true
    schedule: "0 20 * * *"   # 20:00 UTC daily
    windowHours: 26
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

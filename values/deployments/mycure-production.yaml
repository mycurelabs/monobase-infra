    # hapihub.localfirsthealth.com stays on v10 for mycurev8 during the
    # transition. Phase B will flip this back to the canonical URL when
    # v11 takes over hapihub.localfirsthealth.com.
    API_URL: "https://hapihub-next.localfirsthealth.com"

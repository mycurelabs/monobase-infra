# MyCure Production Configuration
# Production environment on DigitalOcean Kubernetes (DOKS)

global:
  domain: localfirsthealth.com
  namespace: mycure-production
  environment: production

  nodePool: "production"

  gateway:
    name: nginx-shared-gateway
    namespace: nginx-gateway-system

  storage:
    provider: ""
    className: ""

# ===== CORE: Monobase API =====
api:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/api
    tag: "0.1.4"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  gateway:
    hostname: ""

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  backup:
    enabled: false

  externalSecrets:
    enabled: false

  postgresql:
    serviceName: postgresql
    architecture: standalone
    auth:
      database: postgres
      username: postgres

  mailpit:
    enabled: true

# ===== CORE: Monobase Account Frontend =====
account:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/accountapp
    tag: "1.0.2"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  gateway:
    hostname: ""

  config:
    API_URL: "https://hapihub.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: MyCure Dashboard (operator/admin web UI) =====
mycure-dashboard:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/dashboard
    tag: "0.14.11"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  gateway:
    hostname: ""  # defaults to mycure-dashboard.localfirsthealth.com
    sectionName: https-lfh

  config:
    # Point at hapihub-next (v11.9.1) — dashboard 0.7.0 uses v11-only routes
    # (HR module, messaging, OAS-routed handlers). The canonical hapihub at
    # https://hapihub.localfirsthealth.com is still v10 (Mongo) and missing
    # those endpoints. The image baked-in default for HAPIHUB_URL is
    # https://api.mycure.md which also points at v10, so we must override
    # both env vars. Revert to https://hapihub.localfirsthealth.com once the
    # v10→v11 cutover swaps that hostname onto v11.
    API_URL: "https://hapihub-next.localfirsthealth.com"
    HAPIHUB_URL: "https://hapihub-next.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== INTERNAL TOOL: NocoDB (no-code DB UI for business, issue #2041) =====
# Disabled until validated on preprod. Production rollout (separate PR) flips this
# on and adds an ExternalSecret for a stable NC_AUTH_JWT_SECRET + admin bootstrap,
# plus a dedicated read-only Postgres role for the data source.
nocodb:
  enabled: false

# ===== HEALTHCARE: MyCure PXP (patient-facing web app) =====
mycure-pxp:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/pxp
    tag: "2.0.6"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The pxp image's entrypoint sed-substitutes __PXP_RUNTIME_API_URL__ into
  # /srv/*.{js,html} at container start, so /srv must be writable. Override
  # the chart default (readOnlyRootFilesystem: true).
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  gateway:
    hostname: ""  # defaults to mycure-pxp.localfirsthealth.com
    sectionName: https-lfh

  config:
    API_URL: "https://hapihub-next.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: HapiHub API =====
hapihub:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub
    tag: "10.11.15"
    pullPolicy: IfNotPresent

  replicaCount: 3

  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

  gateway:
    hostnames:
      - hapihub.localfirsthealth.com
      - api.mycure.md
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener
    additionalSectionNames:
      - https-mycure
    # timeouts removed: nginx-shared-gateway doesn't support
    # spec.rules[].timeouts and was logging UnsupportedField warnings.
    # The proxy_read_timeout/client_max_body_size snippet now lives in
    # nginxGatewayResources.snippetsPolicies in values/infrastructure/main.yaml
    # so it's owned once at the cluster level (avoids "directive is duplicate"
    # errors when both staging and production hapihub releases tried to own
    # identical snippets on the same shared Gateway).
    snippetsPolicy:
      enabled: false

  betterAuth:
    passkey:
      rpName: "Mycure"
      rpId: "localfirsthealth.com"

  config:
    CORS_ORIGINS: "https://mycure.localfirsthealth.com,https://mycurev8.localfirsthealth.com,https://mycurev8-private.localfirsthealth.com,https://mycurelocal.localfirsthealth.com,https://mycure-myaccount.localfirsthealth.com,https://mycure-deploydash.localfirsthealth.com,https://mycure-dashboard.localfirsthealth.com,https://mycure-pxp.localfirsthealth.com,https://dentalemon.localfirsthealth.com,https://dentalemon-myaccount.localfirsthealth.com,https://dentalemon-website.localfirsthealth.com"
    CORS_STRICT: "true"
    CORS_ALLOW_LOCAL_NETWORK: "false"
    CORS_ALLOW_MOBILE_APPS: "true"
    ACCOUNTS_SERVICE_ACCOUNT_EMAILS: "service@mycure.md"

  env:
    - name: BETTER_AUTH_RATE_LIMIT_ENABLED
      value: "true"
    - name: BETTER_AUTH_RATE_LIMIT_WINDOW
      value: "60"
    - name: BETTER_AUTH_RATE_LIMIT_MAX
      value: "300"
    - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
      value: "false"

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3

  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      # Google OAuth
      - secretKey: GOOGLE_CLIENT_ID
        remoteKey: mycure-production-google-oauth-client-id
      - secretKey: GOOGLE_CLIENT_SECRET
        remoteKey: mycure-production-google-oauth-client-secret
      - secretKey: STRIPE_SECRET_KEY
        remoteKey: mycure-production-stripe-secret-key
      # Encryption keys
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details
      # MongoDB URI (managed DigitalOcean)
      - secretKey: MONGO_URI
        remoteKey: mycure-production-mongo-uri
      # JWT/Auth keys
      - secretKey: PRIVATE_KEY
        remoteKey: mycure-production-private-key
      - secretKey: PUBLIC_KEY
        remoteKey: mycure-production-public-key
      # Storage configuration (GCP)
      - secretKey: STORAGE_BUCKET
        remoteKey: mycure-production-storage-bucket
      - secretKey: STORAGE_CLIENT_EMAIL
        remoteKey: mycure-production-storage-client-email
      - secretKey: STORAGE_DIRECTORY
        remoteKey: mycure-production-storage-directory
      - secretKey: STORAGE_PRIVATE_KEY
        remoteKey: mycure-production-storage-private-key
      - secretKey: STORAGE_PROJECT_ID
        remoteKey: mycure-production-storage-project-id
      - secretKey: STORAGE_TYPE
        remoteKey: mycure-production-storage-type
      # Stripe configuration
      - secretKey: STRIPE_KEY
        remoteKey: mycure-production-stripe-key
      - secretKey: STRIPE_CHECKOUT_SUCCESS_URL
        remoteKey: mycure-production-stripe-checkout-success-url
      - secretKey: STRIPE_CHECKOUT_CANCEL_URL
        remoteKey: mycure-production-stripe-checkout-cancel-url
      # ===== 11.x additions (Tier 5 Phase 5) =====
      # Wired into the deployment template at hapihub/templates/deployment.yaml:248-260
      # as `optional: true` env vars, so safe to land while still on 10.x.
      # All 10.x secrets above are kept for rollback safety until Tier 6 cleanup.
      - secretKey: AUTH_SECRET
        remoteKey: mycure-production-auth-secret
      - secretKey: BETTER_AUTH_SECRET
        remoteKey: mycure-production-better-auth-secret

  mongodb:
    external: false # Use in-cluster MongoDB
    enabled: true
    serviceName: mongodb
    database: hapihub
    username: root
    replicaSet: rs0

  # ===== 11.x PostgreSQL backend (Tier 5 Phase 5 prep) =====
  # When postgresql.enabled: true and external: false, the hapihub chart
  # constructs DATABASE_URI directly from the in-cluster `postgresql` K8s
  # secret (charts/hapihub/templates/deployment.yaml:127-135). 10.x ignores
  # this env var; 11.x reads it on cutover. Safe to land while still on 10.x.
  postgresql:
    enabled: true
    external: false
    serviceName: postgresql-primary
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql

# ===== HEALTHCARE: HapiHub API (v11 — temporary cutover sibling) =====
# Second Helm release of the hapihub chart, deployed via the
# hapihub-next ArgoCD app template (releaseName: hapihub-next).
# Resources end up named `hapihub-next` (Deployment, Service, HTTPRoute,
# ConfigMap), distinct from the main `hapihub` release above.
#
# Purpose: expose v11 on a temp hostname so the new mycure frontend can
# exercise it while mycurev8 continues to call the canonical v10.
# A later phase will swap HTTPRoute hostnames so v11 takes canonical.
# See RCA-2026-04-22-HAPIHUB-0014-MIGRATION-BLOCKING-INDEX-BUILD.md
# for the migration safety context.
hapihubNext:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub
    tag: "11.20.54" # #2462 finalize set-once: idempotency guards on encounter/record/invoice finish+finalize (stops fresh finalized_at/finished_at clobbers); NEVER deploy 11.20.44 (stale binary)
    pullPolicy: IfNotPresent

  # Valkey response cache (mono#2231). Soaked on preprod 2026-07-07: 2h driven
  # load, 36k reqs, 79% hit rate, 303/303 write→read freshness assertions,
  # 0 client errors. Cached endpoints are declared via x-cache in hapihub's
  # OpenAPI specs (phase 1: fixtures 12h, services 5m, personal-details 5m).
  # Kill switches: set false here, or
  # `kubectl exec deploy/hapihub-next -- hapihub cache flush`.
  cache:
    enabled: true

  # Daily cleanup of expired Better Auth sessions (they never self-delete).
  pruneExpiredSessions:
    enabled: true

  # NOTE: replicaCount is ignored — autoscaling.enabled: true below means the
  # HPA owns the replica count (chart omits spec.replicas). Scale via
  # autoscaling.minReplicas/maxReplicas.
  replicaCount: 3

  resources:
    requests:
      cpu: 500m
      # Right-sized post mono#2114 fix (11.20.43): steady working set is
      # 0.5–0.6Gi through business hours with rare ~1.1Gi transients
      # (25h clean observation, 2026-07-07). The incident-era 2560Mi
      # emergency request over-reserved ~2.5x and held an extra node.
      memory: 1Gi
    limits:
      cpu: "2"
      # 2Gi caused a persistent OOMKill loop (exit 137, ~90 restarts/replica)
      # under slow-query memory spikes (pre-#2114-fix). 4Gi retained as spike
      # headroom for reports/exports; BUN_JSC_forceRAMSize caps the JS heap.
      memory: 4Gi

  gateway:
    hostnames:
      - hapihub-next.localfirsthealth.com
    sectionName: https-lfh # Use localfirsthealth.com HTTPS listener
    # No additionalSectionNames: v11 is not on api.mycure.md yet. The
    # main hapihub release owns that hostname; Phase B can decide
    # whether to move it here or keep it on the legacy side.
    snippetsPolicy:
      enabled: false
    # Issue #44: storage/file/link URLs are minted from EXTERNAL_ADDRESS, which
    # for hapihub-next is the v10 host (hapihub.localfirsthealth.com) → 404.
    # EXTERNAL_ADDRESS is ALSO better-auth's baseURL, so it can't be changed
    # without breaking auth. Instead, route only /storage on the v10 host to
    # this v11 service (v10 serves no /storage there). Fixes the URLs with zero
    # auth impact. (Long-term: wire storage.downloadURLHost in hapihub code.)
    storageRoute:
      enabled: true
      sectionName: https-lfh
      hostnames:
        - hapihub.localfirsthealth.com
      # v11-only paths to forward from the v10 host to hapihub-next.
      # /device-telemetry: maestroapp installs' sync-token iss + VITE_API_SERVER
      # both point at the v10 host, but the device-telemetry service lives only
      # on v11. v10 returns 404 for these paths, so forwarding is non-disruptive.
      paths:
        - /storage
        - /device-telemetry

  betterAuth:
    passkey:
      rpName: "Mycure"
      rpId: "localfirsthealth.com"

  config:
    CORS_ORIGINS: "https://mycure.localfirsthealth.com,https://mycurev8.localfirsthealth.com,https://mycurelocal.localfirsthealth.com,https://mycure-myaccount.localfirsthealth.com,https://mycure-deploydash.localfirsthealth.com,https://mycure-dashboard.localfirsthealth.com,https://mycure-pxp.localfirsthealth.com,https://dentalemon.localfirsthealth.com,https://dentalemon-myaccount.localfirsthealth.com,https://dentalemon-website.localfirsthealth.com"
    CORS_STRICT: "true"
    CORS_ALLOW_LOCAL_NETWORK: "false"
    CORS_ALLOW_MOBILE_APPS: "true"
    ACCOUNTS_SERVICE_ACCOUNT_EMAILS: "service@mycure.md"
    APPLE_APP_BUNDLE_IDENTIFIER: "com.mycure.pxp"
    # Issue #44: mint storage file/link URLs on hapihub-next's own host instead of
    # the v10 host (EXTERNAL_ADDRESS, which is also Better Auth's baseURL and can't
    # change). Requires hapihub >= 11.20.32 (which wires storage.downloadURLHost).
    STORAGE_DOWNLOAD_URL_HOST: "https://hapihub-next.localfirsthealth.com"
    # mono#2114: background jobs (exports, email, doc-ingestion, PDF/Chromium)
    # moved to the hapihub-next-worker release below — a single export/PDF
    # job landing on an API pod ballooned it toward the memory limit.
    RUN_WORKERS: "false"

  env:
    # #2114 OOM stopgap: JSC sizes heap-growth heuristics off machine RAM, not
    # the cgroup — under burst allocation the heap overshoots the container
    # limit before a full GC runs. Force it to see 3GiB (limit is 4Gi; the
    # remaining ~1GiB covers non-JSC memory: Buffers, in-pod Chromium/export
    # workers — RUN_WORKERS=true here).
    - name: BUN_JSC_forceRAMSize
      value: "3221225472"
    - name: BETTER_AUTH_RATE_LIMIT_ENABLED
      value: "true"
    - name: BETTER_AUTH_RATE_LIMIT_WINDOW
      value: "60"
    - name: BETTER_AUTH_RATE_LIMIT_MAX
      value: "300"
    - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
      value: "false"
    # Email: Postmark transactional (OTP, magic links, verification, resets)
    - name: EMAIL_PROVIDER
      value: "postmark"
    - name: POSTMARK_API_KEY
      valueFrom:
        secretKeyRef:
          name: hapihub-next-secrets
          key: POSTMARK_API_KEY
    - name: EMAIL_FROM_EMAIL
      value: "no-reply@mycure.md"
    - name: EMAIL_FROM_NAME
      value: "MyCure"

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: true
    # min 2 for HA; max 4 keeps one burst replica over the pre-incident 3.
    # (Incident-era max 5 right-sized after the mono#2114 fix — post-fix the
    # HPA idles at 2 with CPU ~35% of target.)
    minReplicas: 2
    maxReplicas: 4

  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      # Google OAuth
      - secretKey: GOOGLE_CLIENT_ID
        remoteKey: mycure-production-google-oauth-client-id
      - secretKey: GOOGLE_CLIENT_SECRET
        remoteKey: mycure-production-google-oauth-client-secret
      - secretKey: STRIPE_SECRET_KEY
        remoteKey: mycure-production-stripe-secret-key
      # Encryption keys
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details
      # MongoDB URI (kept for parity with the main hapihub block; v11 will
      # not read it because mongodb.enabled: false below makes the chart
      # skip MONGODB_* env injection. Harmless to leave in the Secret.)
      - secretKey: MONGO_URI
        remoteKey: mycure-production-mongo-uri
      # JWT/Auth keys
      - secretKey: PRIVATE_KEY
        remoteKey: mycure-production-private-key
      - secretKey: PUBLIC_KEY
        remoteKey: mycure-production-public-key
      # Storage configuration (GCP)
      - secretKey: STORAGE_BUCKET
        remoteKey: mycure-production-storage-bucket
      - secretKey: STORAGE_CLIENT_EMAIL
        remoteKey: mycure-production-storage-client-email
      - secretKey: STORAGE_DIRECTORY
        remoteKey: mycure-production-storage-directory
      - secretKey: STORAGE_PRIVATE_KEY
        remoteKey: mycure-production-storage-private-key
      - secretKey: STORAGE_PROJECT_ID
        remoteKey: mycure-production-storage-project-id
      - secretKey: STORAGE_TYPE
        remoteKey: mycure-production-storage-type
      # Stripe configuration
      - secretKey: STRIPE_KEY
        remoteKey: mycure-production-stripe-key
      - secretKey: STRIPE_CHECKOUT_SUCCESS_URL
        remoteKey: mycure-production-stripe-checkout-success-url
      - secretKey: STRIPE_CHECKOUT_CANCEL_URL
        remoteKey: mycure-production-stripe-checkout-cancel-url
      - secretKey: AUTH_SECRET
        remoteKey: mycure-production-auth-secret
      - secretKey: BETTER_AUTH_SECRET
        remoteKey: mycure-production-better-auth-secret
      # Email (Postmark) — OTP, magic links, verification, password resets
      - secretKey: POSTMARK_API_KEY
        remoteKey: mycure-production-postmark-api-key

  mongodb:
    # v11 is Postgres-only. Disabling Mongo here makes the chart skip
    # MONGODB_* env injection for the hapihub-next Deployment. The
    # top-level `mongodb:` StatefulSet is unchanged — the main hapihub
    # v10 release still needs it.
    enabled: false

  postgresql:
    enabled: true
    external: false
    serviceName: postgresql-primary
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql

# hapihub-next-worker: background-job consumer for hapihub-next
# (mono#2114). Deep-merged onto the hapihubNext block by the
# hapihub-next-worker ArgoCD app template — image/config/secrets flow from
# hapihubNext automatically; only the deltas live here.
hapihubNextWorker:
  enabled: true

  replicaCount: 1

  # Explicit resources — the worker app deep-merges hapihubNext values, so
  # without this it would inherit the API release's 1Gi request. The worker
  # runs exports/PDF-Chromium which legitimately spike; keep a 2Gi request.
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  config:
    RUN_WORKERS: "true"

  # No external traffic: keep the Service (probes) but no routes.
  gateway:
    enabled: false
    storageRoute:
      enabled: false
    snippetsPolicy:
      enabled: false

  # The API release owns the daily session-prune cronjob.
  pruneExpiredSessions:
    enabled: false

  # Fixed single replica — job throughput does not need an HPA, and pg-boss
  # handles multi-consumer anyway if this is ever raised.
  autoscaling:
    enabled: false

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: Frontend Application =====
mycure:

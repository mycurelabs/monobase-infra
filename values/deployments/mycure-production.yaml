# ===== P2P SYNC: Cadence — Tier 4.4 =====
cadence:
  # 0.6.1 (mono#2103 Fix 1 + infra#77 Fix 3): DB-owned updated_at triggers
  # + (updated_at, id) keyset index installed by ensure_sync_infra at
  # watcher boot behind a PG advisory lock (mono#2126 + #2132), and
  # fail-closed explicit allowlist — "*" is a boot error, unconfigured
  # collections dropped at the receive path (mono#2128). Gates cleared
  # 2026-07-04: NULL-growth = 0 new rows in 24h on all 7 tracked prod
  # tables (hapihub 11.20.37 writer fix), and 24h preprod soak clean
  # (zero restarts, changelog ⊆ allowlist, RSS 324Mi). Canary proofs on
  # preprod: raw UPDATE detected in 5s, open-txn detected post-COMMIT
  # only, unconfigured table → zero changelog rows.
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/cadence
    # 0.6.2: ensure_sync_infra runs in a background task (poll-deadline-
    # immune), index-before-backfill, advisory lock rescoped to fast DDL —
    # fixes the mono#2172 livelock hit during the 0.6.1 prod deploy.
    tag: "0.9.5"  # mono#2356: per-page scoped lamport lookup in catch-up. 0.9.4's full-collection MAX(lamport) GROUP BY doc_id ran 10-16min/collection; retry stampede (32 concurrent) pegged the PG primary node 2026-07-14 → hapihub-next starved, client-visible slowness. On top of 0.9.4 (mono#2454 box watcher wedge fix).
    pullPolicy: Always

  # ── cadenceConfig: OWNED HERE (per-env), not in the chart ─────────────
  # The chart's cadenceConfig is only a safe standalone baseline (the same
  # 2 collections). Each env values file carries the COMPLETE block: Helm
  # deep-merges maps, so a partial override cannot REMOVE a chart-default
  # key — always edit the full block here. This is the wave/rollout control
  # point for the full-config sync program (plan: cadence bidirectional
  # full-config sync). Keep in lockstep with services/hapihub/cadence.yml
  # in monobase-mycure (parity check: scripts/check-cadence-config.ts
  # --against this file).
  # ── cadenceConfig: OWNED HERE (per-env) — M4 FULL-CONFIG CUTOVER ──────
  # 97 collections (billing-legacy-invoices promoted from blacklist
  # 2026-07-10, mono#2328 — active invoice plane for V8 clients; 3
  # better-auth org tables still deferred, mono#2303). GENERATED from
  # monobase-mycure cadence.yml (parity: bun scripts/check-cadence-config.ts
  # --against <this file>). 0.7.6 = resumable catch-up + changelog-scale
  # watermarks (mono#2320, PR mono#2331); rehearsed on preprod 2026-07-10.
  # Per-collection ROLLBACK: delete the entry here + Replace-mode root
  # sync (map-key removal needs Replace — see ArgoCD wart memory).
  cadenceConfig:
    collections:
      account:
        strategy: lww
        scope_columns:
          user: user_id
      account-configurations:
        strategy: lww

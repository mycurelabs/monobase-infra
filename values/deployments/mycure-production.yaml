    enabled: false

# ===== CACHE: Valkey (Redis) — Tier 4.3 =====
valkey:
  enabled: true

  global:
    security:
      allowInsecureImages: true

  auth:
    existingSecret: valkey

  architecture: standalone

  image:
    repository: bitnamilegacy/valkey
    tag: 8.0.1-debian-12-r2

  master:
    persistence:
      enabled: true
      storageClass: ""
      # 2026-06-15: bumped 4Gi → 32Gi after the 4Gi PVC filled (cadence
      # change-log growth), out-of-space write corrupted AOF seqs 13/15/16,
      # valkey crashlooped 213× over 22h → fleet-wide sync outage. PVC
      # patched live, AOF repaired via valkey-check-aof --fix, this value
      # bumped to reconcile the STS template. The underlying root cause
      # (unbounded change-log growth) is unchanged — 32Gi just moves the
      # deadline. See: cadence change-log TTL/trim follow-up issue.
      size: 32Gi
    # Resource sizing history: 512Mi -> 277 restarts in 27h (staging,
    # 2026-04-06); 1Gi still OOMs during AOF replay; 2Gi OOM-crashlooped
    # 2026-06-11 with a 1.6G AOF (cadence change-log growth). 4Gi unblocks,
    # but the dataset grows unboundedly — needs change-log trimming/TTL
    # before this limit is hit again. CPU at 1 core so AOF replay doesn't
    # starve the liveness probe.
    resources:
      requests:
        cpu: 250m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    # `--maxmemory 3GB` + `noeviction` dropped 2026-06-25 after cadence
    # 0.5.36 (Phase 4a, mycurelabs/monobase-mycure#1988) stopped writing
    # the Valkey changelog when readFrom=Pg. Without changelog writes,
    # Valkey's working set is the seq counter + peer tokens + JWKS cache
    # + watermarks — under 100 MiB at prod load. The 3 GiB cap was
    # triggering false OOM-as-policy events (2026-06-24 09:36 UTC
    # incident) before the container's k8s limit became relevant. Let
    # the container limit do the actual ceiling now; if Valkey ever
    # gets near 4 GiB again something is seriously wrong (changelog
    # writes back on, or a new dataset class arrived) and we want a
    # real signal, not an artificial OOM cycle.


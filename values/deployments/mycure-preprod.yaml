# MyCure Pre-Production Configuration
# Ephemeral pre-prod rehearsal env on DigitalOcean Kubernetes (DOKS).
# Mirrors mycure-production in component shape (HA Postgres, replicaset Mongo,
# autoscaling, resource sizing) so major changes can be rehearsed against a
# real cloned prod dataset. GCP secrets are REUSED from mycure-production so
# restored data remains decryptable — this means prod Stripe / OAuth / auth
# credentials resolve in this namespace too, and the only thing keeping the
# env from producing real side-effects is the safety overrides below
# (mailpit, no public linking, short-lived). Tear down with
# `kubectl delete ns mycure-preprod` when the rehearsal is done.

global:
  domain: preprod.localfirsthealth.com
  namespace: mycure-preprod
  environment: preprod

  # Reuse prod node pool so scheduling/perf characteristics match prod.
  nodePool: "production"

  # Point the database-secrets chart at the mycure-production-* GCP keys so
  # Postgres/Mongo/Minio/Valkey K8s secrets carry prod credentials. Required
  # for Velero-restored PVCs (bitnami init was done with prod passwords).
  secretPrefix: "mycure-production"

  gateway:
    name: nginx-shared-gateway
    namespace: nginx-gateway-system

  storage:
    provider: ""
    className: ""

# ===== CORE: Monobase API =====
api:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/api
    tag: "0.1.4"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  gateway:
    hostname: ""

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  backup:
    enabled: false

  externalSecrets:
    enabled: false

  postgresql:
    serviceName: postgresql
    architecture: standalone
    auth:
      database: postgres
      username: postgres

  mailpit:
    enabled: true

# ===== CORE: Monobase Account Frontend =====
account:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/accountapp
    tag: "1.0.2"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  gateway:
    hostname: ""

  config:
    API_URL: "https://hapihub.preprod.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: HapiHub API =====
hapihub:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub
    tag: "11.2.9"
    pullPolicy: IfNotPresent

  replicaCount: 3

  resources:
    requests:
      cpu: 1000m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

  gateway:
    hostnames:
      - hapihub.preprod.localfirsthealth.com
    sectionName: https-preprod-lfh
    # No mycure.md hostnames in preprod — we only route *.preprod.localfirsthealth.com.
    snippetsPolicy:
      enabled: false

  betterAuth:
    passkey:
      rpName: "Mycure (preprod)"
      rpId: "preprod.localfirsthealth.com"

  config:
    CORS_ORIGINS: "https://mycure.preprod.localfirsthealth.com,https://mycurev8.preprod.localfirsthealth.com,https://mycurelocal.preprod.localfirsthealth.com,https://mycure-myaccount.preprod.localfirsthealth.com,https://mycure-deploydash.preprod.localfirsthealth.com,https://dentalemon.preprod.localfirsthealth.com,https://dentalemon-myaccount.preprod.localfirsthealth.com,https://dentalemon-website.preprod.localfirsthealth.com"
    CORS_STRICT: "true"
    CORS_ALLOW_LOCAL_NETWORK: "false"
    CORS_ALLOW_MOBILE_APPS: "true"
    ACCOUNTS_SERVICE_ACCOUNT_EMAILS: "service@mycure.md"

  env:
    - name: BETTER_AUTH_RATE_LIMIT_ENABLED
      value: "true"
    - name: BETTER_AUTH_RATE_LIMIT_WINDOW
      value: "60"
    - name: BETTER_AUTH_RATE_LIMIT_MAX
      value: "300"
    - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
      value: "false"

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5

  # Secrets REUSE the existing mycure-production-* GCP keys. This is
  # required so that data cloned from prod (MongoDB/Postgres) remains
  # decryptable in preprod — the ENC_* keys must be byte-identical.
  # Consequence: Stripe/OAuth/auth secrets are also the prod ones.
  # Isolation relies on the mailpit/host overrides below + the fact that
  # this env is short-lived and not publicly linked.
  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      # Google OAuth
      - secretKey: GOOGLE_CLIENT_ID
        remoteKey: mycure-production-google-oauth-client-id
      - secretKey: GOOGLE_CLIENT_SECRET
        remoteKey: mycure-production-google-oauth-client-secret
      - secretKey: STRIPE_SECRET_KEY
        remoteKey: mycure-production-stripe-secret-key
      # Encryption keys
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details
      # JWT/Auth keys
      - secretKey: PRIVATE_KEY
        remoteKey: mycure-production-private-key
      - secretKey: PUBLIC_KEY
        remoteKey: mycure-production-public-key
      # Storage configuration (GCP)
      - secretKey: STORAGE_BUCKET
        remoteKey: mycure-production-storage-bucket
      - secretKey: STORAGE_CLIENT_EMAIL
        remoteKey: mycure-production-storage-client-email
      - secretKey: STORAGE_DIRECTORY
        remoteKey: mycure-production-storage-directory
      - secretKey: STORAGE_PRIVATE_KEY
        remoteKey: mycure-production-storage-private-key
      - secretKey: STORAGE_PROJECT_ID
        remoteKey: mycure-production-storage-project-id
      - secretKey: STORAGE_TYPE
        remoteKey: mycure-production-storage-type
      # Stripe configuration
      - secretKey: STRIPE_KEY
        remoteKey: mycure-production-stripe-key
      - secretKey: STRIPE_CHECKOUT_SUCCESS_URL
        remoteKey: mycure-production-stripe-checkout-success-url
      - secretKey: STRIPE_CHECKOUT_CANCEL_URL
        remoteKey: mycure-production-stripe-checkout-cancel-url
      - secretKey: AUTH_SECRET
        remoteKey: mycure-production-auth-secret
      - secretKey: BETTER_AUTH_SECRET
        remoteKey: mycure-production-better-auth-secret

  mongodb:
    external: false # Use in-cluster MongoDB
    enabled: true
    serviceName: mongodb
    database: hapihub
    username: root
    replicaSet: rs0

  postgresql:
    enabled: true
    external: false
    serviceName: postgresql
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql


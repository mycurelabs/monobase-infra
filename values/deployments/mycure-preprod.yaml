# ===== HEALTHCARE: MyCure PXP (patient-facing web app) =====
mycure-pxp:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/pxp
    tag: "2.0.3"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # The pxp image's entrypoint sed-substitutes __PXP_RUNTIME_API_URL__ into
  # /srv/*.{js,html} at container start, so /srv must be writable. Override
  # the chart default (readOnlyRootFilesystem: true).
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  gateway:
    hostname: ""  # defaults to mycure-pxp.preprod.localfirsthealth.com
    sectionName: https-preprod-lfh

  config:
    API_URL: "https://hapihub.preprod.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: HapiHub API =====
hapihub:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub
    tag: "11.20.23"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 2Gi

  gateway:
    hostnames:
      - hapihub.preprod.localfirsthealth.com
    sectionName: https-preprod-lfh
    # No mycure.md hostnames in preprod — we only route *.preprod.localfirsthealth.com.
    snippetsPolicy:
      enabled: false

  betterAuth:
    passkey:
      rpName: "Mycure (preprod)"
      rpId: "preprod.localfirsthealth.com"

  config:
    CORS_ORIGINS: "https://hapihub.preprod.localfirsthealth.com,https://mycure.preprod.localfirsthealth.com,https://mycurelocal.preprod.localfirsthealth.com,https://mycure-myaccount.preprod.localfirsthealth.com,https://mycure-deploydash.preprod.localfirsthealth.com,https://mycure-dashboard.preprod.localfirsthealth.com,https://mycure-pxp.preprod.localfirsthealth.com,https://dentalemon.preprod.localfirsthealth.com,https://dentalemon-myaccount.preprod.localfirsthealth.com,https://dentalemon-website.preprod.localfirsthealth.com,https://mycure-pr--*.web.app,https://medleyapp.preprod.localfirsthealth.com"
    # ---- Phase 2: medical-AI integration (medgemma-worker + openmed enabled below) ----
    INGESTION_ENABLED: "true"
    OPENMED_ENABLED: "true"
    MEDGEMMA_URL: "http://medgemma-worker:8940"
    OLLAMA_URL: "http://ollama.tailscale.svc.cluster.local:11434"
    OPENMED_URL: "http://openmed:8920"
    EMBED_MODEL: "bge-m3"  # bge-m3 is what Ollama serves for embeddings (NOT nomic-embed-text)
    CORS_STRICT: "true"
    CORS_ALLOW_LOCAL_NETWORK: "false"
    CORS_ALLOW_MOBILE_APPS: "true"
    ACCOUNTS_SERVICE_ACCOUNT_EMAILS: "service@mycure.md"

  env:
    - name: BETTER_AUTH_RATE_LIMIT_ENABLED
      value: "true"
    - name: BETTER_AUTH_RATE_LIMIT_WINDOW
      value: "60"
    - name: BETTER_AUTH_RATE_LIMIT_MAX
      value: "300"
    - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
      value: "false"

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  # Secrets REUSE the existing mycure-production-* GCP keys. This is
  # required so that data cloned from prod (MongoDB/Postgres) remains
  # decryptable in preprod — the ENC_* keys must be byte-identical.
  # Consequence: Stripe/OAuth/auth secrets are also the prod ones.
  # Isolation relies on the mailpit/host overrides below + the fact that
  # this env is short-lived and not publicly linked.
  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      # Google OAuth
      - secretKey: GOOGLE_CLIENT_ID
        remoteKey: mycure-production-google-oauth-client-id
      - secretKey: GOOGLE_CLIENT_SECRET
        remoteKey: mycure-production-google-oauth-client-secret
      - secretKey: STRIPE_SECRET_KEY
        remoteKey: mycure-preprod-stripe-secret-key
      # Encryption keys
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details
      # JWT/Auth keys
      - secretKey: PRIVATE_KEY
        remoteKey: mycure-production-private-key
      - secretKey: PUBLIC_KEY
        remoteKey: mycure-production-public-key
      # Storage configuration (GCP)
      - secretKey: STORAGE_BUCKET
        remoteKey: mycure-production-storage-bucket
      - secretKey: STORAGE_CLIENT_EMAIL
        remoteKey: mycure-production-storage-client-email
      - secretKey: STORAGE_DIRECTORY
        remoteKey: mycure-production-storage-directory
      - secretKey: STORAGE_PRIVATE_KEY
        remoteKey: mycure-production-storage-private-key
      - secretKey: STORAGE_PROJECT_ID
        remoteKey: mycure-production-storage-project-id
      - secretKey: STORAGE_TYPE
        remoteKey: mycure-production-storage-type
      # Stripe configuration
      - secretKey: STRIPE_KEY
        remoteKey: mycure-preprod-stripe-key
      - secretKey: STRIPE_CHECKOUT_SUCCESS_URL
        remoteKey: mycure-production-stripe-checkout-success-url
      - secretKey: STRIPE_CHECKOUT_CANCEL_URL
        remoteKey: mycure-production-stripe-checkout-cancel-url
      - secretKey: AUTH_SECRET
        remoteKey: mycure-production-auth-secret
      - secretKey: BETTER_AUTH_SECRET
        remoteKey: mycure-production-better-auth-secret

  postgresql:
    enabled: true
    external: false
    serviceName: postgresql
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql


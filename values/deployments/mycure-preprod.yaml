# ===== DATABASE: MongoDB =====
# Synthetic single-node replica set used solely as the source for the
# hapihub-migrator nightly CronJob smoke test. Preprod is a CronJob
# staging ground — no CDC, no data of consequence here. The argo template
# always enforces architecture=replicaset, so a single-replica rs0 is
# what we actually deploy.
mongodb:
  enabled: true

  image:
    repository: bitnamilegacy/mongodb
    tag: 7.0.15-debian-12-r0

  auth:
    rootUser: root
    existingSecret: mongodb

  replicaCount: 1

  arbiter:
    enabled: false

  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ===== DATABASE: PostgreSQL =====
# Standalone (no read replica) in preprod: prod node pool can't fit a
# second 4Gi PG pod alongside HA Postgres + existing prod workloads.
# Replication failover testing is the only thing lost — schema, query,
# migration, and index rehearsals all still work on a single primary.
# Re-enable architecture=replication only after the prod pool is bumped.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: standalone

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    secretKeys:
      adminPasswordKey: postgres-password

  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

  podDisruptionBudget:
    enabled: false

# ===== CACHE: Valkey (Redis) =====
valkey:
  enabled: true  # re-enabled 2026-04-29 alongside cadence (root cause fixed in 0.5.x)

  global:
    security:
      allowInsecureImages: true

  auth:
    existingSecret: valkey

  architecture: standalone

  image:
    repository: bitnamilegacy/valkey
    tag: 8.0.1-debian-12-r2

  master:
    persistence:
      enabled: true
      storageClass: ""
      size: 4Gi
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    # `--maxmemory 1.5GB` + `noeviction` dropped 2026-06-25 alongside
    # the prod drop — cadence Phase 4a (0.5.36) stopped Valkey changelog
    # writes when readFrom=Pg, so the cap that paired with the trim
    # escalation policy is obsolete. Container memory limit (2 GiB)
    # is the new ceiling.


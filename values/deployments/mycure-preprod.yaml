    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  # Phase 3.3 (cadence 0.5.29+): flip changelog reads to PG-authoritative.
  # Dual-write soak (`readFrom: valkey`) ran from 2026-06-24 02:45 UTC
  # through 6h on real preprod traffic with `dual_write_divergence_total`
  # at 0 across 4.5M lamport ops — empirical parity validated.
  #
  # With `readFrom: pg` the changelog query methods (`query_since`,
  # `_batched`, tombstones, `query_by_doc`, `max_lamports_by_doc`,
  # `max_seq`, `min_seq`, `compact`) route to PG. Writes still
  # dual-write — Valkey remains the seq allocator + ground truth for
  # rollback. Reverting to `readFrom: valkey` is a one-line revert that
  # takes effect on next pod boot.
  #
  # Phase 3.4 (prod) is gated on this flip soaking for >24h.
  pgChangelog:
    enabled: true
    readFrom: "pg"
    retentionDays: 7

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator (CronJob staging only) =====
# Preprod runs only the nightly bulk CronJob — not the long-lived CDC
# Deployment. The synthetic mongodb above is empty, so each sweep walks
# the configured collection list, processes 0 docs, and exits clean.
# This validates image pull, secret/configmap wiring, env shadowing,
# the runtime date wrapper, and the Job lifecycle against a real
# ArgoCD-reconciled namespace before the same template ships to prod.
hapihubMigrator:
  enabled: false # migrator stopped 2026-07-02

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.9.2"  # #2063 + reverse mirror: same-second ties apply incoming (fwd <=, rev next-second bound)
    pullPolicy: IfNotPresent

  # No CDC in preprod — only the CronJob is exercised here.
  deployment:
    enabled: false

  # Reverse-sync canary (PG → MongoDB): apply scope widened past the initial
  # clocks,counters pair after an end-to-end round-trip proved apply works
  # (PG update → _pg_changelog → Mongo upsert, errors=0). Added tables are all
  # NON-encrypted — preprod has no ENC_* keys (externalSecrets disabled), so
  # encrypted collections (personal_details, billing_invoices/items/payments,
  # medical_records) stay out of scope here. Widen further / drop `tables`
  # as later stages pass.
  reverseCdc:
    enabled: true
    apply: true
    tables: "clocks,counters,services,medicines,organizations"

  # Reverse safety-net sweep (MODE=reverse-bulk, PG → MongoDB). Scoped to a
  # small NON-encrypted set to keep the recurring cost low (the real-time
  # reverseCdc canary above already covers the wider set) and to stay clear
  # of encrypted collections preprod can't key. windowHours is deliberately
  # wide here because preprod has no live write traffic — a 26h trailing
  # window (the prod default) would sweep nothing; 90d lets the safety-net
  # actually re-check the near-static dataset. Latest-wins makes re-runs
  # no-ops. Offset 30m from the forward nightly (0 */6).
  reverseNightlyJob:
    enabled: true
    schedule: "30 */6 * * *"
    windowHours: 2160
    tables: "counters,organizations"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # Run every 6h in preprod for faster feedback than nightly.
  nightlyJob:
    enabled: true
    schedule: "0 */6 * * *"
    lookbackHours: 48
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  postgresql:
    enabled: true
    serviceName: postgresql
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  # No encryption keys in preprod — synthetic Mongo holds no encrypted data.
  externalSecrets:
    enabled: false

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

# ===== Infra: L4 UDP LoadBalancer for QUIC (iroh) =====
# Owns the UDP LoadBalancer separately from any app chart, like the HTTP gateways
# (which can't carry UDP). Apps are just pods it selects; re-point targetSelector
# to cadence when QUIC lands there and the LB + public IP stay put.
udpGateway:
  enabled: true
  targetSelector:
    app.kubernetes.io/name: poc-iroh
  port: 6472
  healthPort: 6472

# ===== PoC: iroh 1.0 direct-QUIC connectivity test (THROWAWAY) =====
# Tiny iroh 1.0 hub pod; reachability is provided by the infra udpGateway LB
# above (not an app-owned Service). Tear down (set enabled:false / delete block +
# charts/poc-iroh + argocd/applications/templates/poc-iroh.yaml) after the run.
pocIroh:
  enabled: true
  image:
    repository: ghcr.io/mycurelabs/poc-iroh
    tag: "0.3.0"
    pullPolicy: IfNotPresent
  udpPort: 6472
  # udp-gateway LB IP — hub advertises this so boxes connect by EndpointId alone.
  publicAddr: "165.245.145.61:6472"
  nodePool: "staging"

  replicaCount: 1

  # 0.5.26 (#1923) divides per-task LRU capacity by num_collections in
  # parallel mode, capping per-task LRU at ~watcher_lru_capacity/N.
  # 2026-07-14 (mono#2356): 2Gi OOM-crashlooped — restart clears in-memory
  # baseline_emit_done, re-emits baselines for all 98 collections over a
  # bloated changelog (d13=41GB flood, since dropped) → mem spike >2Gi →
  # OOMKill → repeat, so live-capture never stabilizes (cloud→box sync
  # stalls). Bumped limit 2Gi→4Gi to let one baseline-emit cycle complete;
  # prod runs 12Gi but the preprod node (6.4Gi alloc) can't back that.
  resources:

    tag: "2025.7.23-debian-12-r3"

  mode: standalone

  statefulset:
    replicaCount: 1

  auth:
    existingSecret: minio

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  defaultBuckets: "monobase-files"

  buckets:
    - name: "monobase-files"
  region: "us-east-1"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  gateway:
    enabled: true
    hostname: ""
    sectionName: https-preprod-lfh
    rateLimit:
      enabled: false

# ===== EMAIL TESTING: Mailpit =====
# Safety override: enabled in preprod so cloned prod user rows cannot
# trigger real outbound email on reset/notification flows. HapiHub SMTP
# should be pointed at the in-cluster mailpit service.
mailpit:
  enabled: true

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  gateway:
    # Public web UI route RE-ENABLED 2026-06-22 per request — intentionally with NO auth.
    # WARNING (#5): preprod runs on cloned-prod data, so this inbox exposes real reset
    # tokens / OTPs / PHI to anyone with the URL. Deliberate testing convenience, not a
    # regression. Put it behind gateway auth (NGF AuthenticationFilter basic-auth) if it
    # outlives short-lived testing. Exposure-free alt: kubectl port-forward svc/mailpit-http 8025:80
    enabled: true
    hostname: "mail.preprod.localfirsthealth.com"

# ===== P2P SYNC: Cadence =====
cadence:
  enabled: true  # re-enabled 2026-04-29 to match staging (incident root cause fixed in 0.5.x line)

  image:
    repository: ghcr.io/mycurelabs/cadence
    tag: "0.5.37"
    pullPolicy: Always

  # Phase 1a: per-collection watcher workers, throttled by the 0.5.25
  # Semaphore cap (min(num_cpus*2, 16)) so the boot connection storm
  # that crashlooped this pod on 2026-06-23 can't recur. Preprod-only
  # soak until parallel mode is proven; prod stays serial-mode in this
  # PR. See mycurelabs/monobase-mycure#1918 + #1922.
  env:
    - name: CADENCE_PER_COLLECTION_WORKERS
      value: "true"

  replicaCount: 1

  # 0.5.26 (#1923) divides per-task LRU capacity by num_collections in
  # parallel mode, capping per-task LRU at ~watcher_lru_capacity/N. The
  # earlier 4Gi bump (monobase-infra#30) is no longer needed; step back
  # down to 2Gi to match staging sizing.
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  gateway:
    hostname: ""
    sectionName: https-preprod-lfh
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "10m"

  postgresql:
    enabled: true
    serviceName: postgresql
    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  # Phase 3.3 (cadence 0.5.29+): flip changelog reads to PG-authoritative.
  # Dual-write soak (`readFrom: valkey`) ran from 2026-06-24 02:45 UTC
  # through 6h on real preprod traffic with `dual_write_divergence_total`
  # at 0 across 4.5M lamport ops — empirical parity validated.
  #
  # With `readFrom: pg` the changelog query methods (`query_since`,
  # `_batched`, tombstones, `query_by_doc`, `max_lamports_by_doc`,
  # `max_seq`, `min_seq`, `compact`) route to PG. Writes still
  # dual-write — Valkey remains the seq allocator + ground truth for
  # rollback. Reverting to `readFrom: valkey` is a one-line revert that
  # takes effect on next pod boot.
  #
  # Phase 3.4 (prod) is gated on this flip soaking for >24h.
  pgChangelog:
    enabled: true
    readFrom: "pg"
    retentionDays: 7

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator (CronJob staging only) =====
# Preprod runs only the nightly bulk CronJob — not the long-lived CDC
# Deployment. The synthetic mongodb above is empty, so each sweep walks
# the configured collection list, processes 0 docs, and exits clean.
# This validates image pull, secret/configmap wiring, env shadowing,
# the runtime date wrapper, and the Job lifecycle against a real
# ArgoCD-reconciled namespace before the same template ships to prod.
hapihubMigrator:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.9.0"
    pullPolicy: IfNotPresent

  # No CDC in preprod — only the CronJob is exercised here.
  deployment:
    enabled: false

  # Reverse-sync canary (PG → MongoDB): apply scope widened past the initial
  # clocks,counters pair after an end-to-end round-trip proved apply works
  # (PG update → _pg_changelog → Mongo upsert, errors=0). Added tables are all
  # NON-encrypted — preprod has no ENC_* keys (externalSecrets disabled), so
  # encrypted collections (personal_details, billing_invoices/items/payments,
  # medical_records) stay out of scope here. Widen further / drop `tables`
  # as later stages pass.
  reverseCdc:
    enabled: true
    apply: true
    tables: "clocks,counters,services,medicines,organizations"

  # Reverse safety-net sweep (MODE=reverse-bulk, PG → MongoDB). Scoped to a
  # small NON-encrypted set to keep the recurring cost low (the real-time
  # reverseCdc canary above already covers the wider set) and to stay clear
  # of encrypted collections preprod can't key. windowHours is deliberately
  # wide here because preprod has no live write traffic — a 26h trailing
  # window (the prod default) would sweep nothing; 90d lets the safety-net
  # actually re-check the near-static dataset. Latest-wins makes re-runs
  # no-ops. Offset 30m from the forward nightly (0 */6).
  reverseNightlyJob:
    enabled: true
    schedule: "30 */6 * * *"
    windowHours: 2160
    tables: "counters,organizations"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # Run every 6h in preprod for faster feedback than nightly.
  nightlyJob:
    enabled: true
    schedule: "0 */6 * * *"
    lookbackHours: 48
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  postgresql:
    enabled: true
    serviceName: postgresql
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  # No encryption keys in preprod — synthetic Mongo holds no encrypted data.
  externalSecrets:
    enabled: false

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

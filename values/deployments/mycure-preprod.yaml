    # here to validate on preprod before the prod hub. HELD: scope_fail_closed
    # (announcements needs an array org-scope first) + stable_keyspace
    # (moves the Valkey keyspace — maintenance-window op, not flip-and-test).
    - name: CADENCE_WATERMARK_INVARIANT      # #2370 silent-write-loss clamp
      value: "true"
    - name: CADENCE_APPLIER_FK_RETRY         # #2358 FK-casualty requeue
      value: "true"
    - name: CADENCE_LAG_RECOVERY_INCREMENTAL # #2391 no full-snapshot re-flood
      value: "true"
    - name: CADENCE_BASELINE_EMIT            # #2389 baseline-absorbed rows
      # 2026-07-14 (mono#2356): OFF on preprod. The reconcile is a one-shot
      # per-restart pass that re-emits baselines for all 98 collections
      # (~30-60min on this prod-clone dataset, re-inflates the changelog by
      # tens of GB) and starves LIVE capture until it drains — so a new
      # cloud write isn't captured for 30-60min after any hub restart,
      # blocking cloud→box sync. Baseline is still served via the
      # primary-reader on every catch-up (correctness-safe), so turning
      # this off just trades cheaper catch-up for prompt live capture.
      # Prod keeps it true (12Gi, rarely restarts).
      value: "false"
    - name: CADENCE_MEMBER_SCOPE_EXPANSION   # #2372 anonymous members (own-org)
      value: "true"
    - name: CADENCE_ENFORCE_READ_ONLY        # #2397 v1
      value: "true"
    - name: CADENCE_ENFORCE_PEER_BINDING     # #2397 v3 — WATCH: handshake must pass
      value: "true"
    - name: CADENCE_ENFORCE_REVOCATION       # #2397 v4
      value: "true"
    - name: CADENCE_MIN_TOKEN_IAT            # mono#2456 bulk-cutoff revocation (0.9.6)
      # Reject any sync token issued before this unix-epoch cutoff (reset
      # straggler containment). Set to the 2026-07-15 lamport-reset-revocation
      # test epoch; re-onboarded boxes get tokens minted AFTER this and pass.
      value: "1784083106"
    - name: CADENCE_JWKS_TTL_SECS            # #2397 v2 (rotation revocation)
      value: "3600"
    - name: CADENCE_JSONB_SUBKEY_MERGE       # validate_m partial (delta-safe)
      value: "true"
    - name: CADENCE_BULK_OP_DETECT           # WATCH-3 divergence detection
      value: "true"
    - name: CADENCE_P2P_ENABLED              # #2359 hub is WS-only

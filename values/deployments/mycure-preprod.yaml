# ===== DATABASE: MongoDB =====
# Synthetic single-node replica set used solely as the source for the
# hapihub-migrator nightly CronJob smoke test. Preprod is a CronJob
# staging ground — no CDC, no data of consequence here. The argo template
# always enforces architecture=replicaset, so a single-replica rs0 is
# what we actually deploy.
mongodb:
  enabled: true

  image:
    repository: bitnamilegacy/mongodb
    tag: 7.0.15-debian-12-r0

  auth:
    rootUser: root
    existingSecret: mongodb

  replicaCount: 1

  arbiter:
    enabled: false

  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ===== DATABASE: PostgreSQL =====
# Standalone (no read replica) in preprod: prod node pool can't fit a
# second 4Gi PG pod alongside HA Postgres + existing prod workloads.
# Replication failover testing is the only thing lost — schema, query,
# migration, and index rehearsals all still work on a single primary.
# Re-enable architecture=replication only after the prod pool is bumped.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: standalone

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    secretKeys:
      adminPasswordKey: postgres-password

  primary:
    # M2 full-config rehearsal (2026-07-10): the default max_connections=100
    # was exhausted by cadence 0.7.0's boot — 99 per-collection ensure tasks
    # connect simultaneously (advisory lock serializes DDL, not connection
    # acquisition) → 40 collections' DDL setup starved with "connect failed".
    # 300 gives headroom for hapihub + 99 watcher workers + DDL/index tasks.
    # cadence-side fix (gate ensure connections behind the poll semaphore +
    # per-collection retry) ships as 0.7.1 during the soak.
    extendedConfiguration: |
      max_connections = 300
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi


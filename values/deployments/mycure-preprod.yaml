# ===== MEDICAL AI: OpenMed Model Server =====
# Phase 2: enabled — PHI de-id / NER / ICD-10 for document-ingestion.
# Pulls its models from HuggingFace on first start (egress 443 via ipBlock in the chart NP) into a
# 3Gi PVC (openmed-model-cache, RWO) mounted at /models (HF_HOME), persisted across restarts.
openmed:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/openmed
    tag: "0.1.3"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 2Gi

  gateway:
    enabled: false  # ClusterIP only

  config:
    OPENMED_PRELOAD: "disease,pharma"
    PYTHONUNBUFFERED: "1"  # stream uvicorn/model-load logs (otherwise buffered + invisible)

  # openmed preloads NER/ICD-10 models from HuggingFace on first boot (downloaded to the PVC),
  # which takes minutes — far longer than the chart's 60s liveness grace. Without this it gets
  # liveness-killed mid-load and never converges. Generous initialDelay = de-facto startup grace;
  # readiness (unchanged) still gates Service membership until it actually serves.
  livenessProbe:
    enabled: true
    initialDelaySeconds: 600
    periodSeconds: 15
    failureThreshold: 4

  persistence:
    enabled: true
    size: 3Gi
    storageClassName: do-block-storage  # DOKS CSI — the chart default 'longhorn' doesn't exist here

  podDisruptionBudget:
    enabled: false


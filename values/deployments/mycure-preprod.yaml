# MyCure Pre-Production Configuration
# Ephemeral pre-prod rehearsal env on DigitalOcean Kubernetes (DOKS).
# Mirrors mycure-production in component shape (HA Postgres, replicaset Mongo,
# autoscaling, resource sizing) so major changes can be rehearsed against a
# real cloned prod dataset. GCP secrets are REUSED from mycure-production so
# restored data remains decryptable — this means prod Stripe / OAuth / auth
# credentials resolve in this namespace too, and the only thing keeping the
# env from producing real side-effects is the safety overrides below
# (mailpit, no public linking, short-lived). Tear down with
# `kubectl delete ns mycure-preprod` when the rehearsal is done.

global:
  domain: preprod.localfirsthealth.com
  namespace: mycure-preprod
  environment: preprod

  # Reuse prod node pool so scheduling/perf characteristics match prod.
  nodePool: "staging"

  # Point the database-secrets chart at the mycure-production-* GCP keys so
  # Postgres/Mongo/Minio/Valkey K8s secrets carry prod credentials. Required
  # for Velero-restored PVCs (bitnami init was done with prod passwords).
  secretPrefix: "mycure-production"

  gateway:
    name: nginx-shared-gateway
    namespace: nginx-gateway-system

  storage:
    provider: ""
    className: ""

# ===== CORE: Monobase API =====
api:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/api
    tag: "0.1.4"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  gateway:
    hostname: ""

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  backup:
    enabled: false

  externalSecrets:
    enabled: false

  postgresql:
    serviceName: postgresql
    architecture: standalone
    auth:
      database: postgres
      username: postgres

  mailpit:
    enabled: true

# ===== CORE: Monobase Account Frontend =====

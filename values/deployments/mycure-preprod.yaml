# ===== DATABASE: PostgreSQL =====
# Standalone (no read replica) in preprod: prod node pool can't fit a
# second 4Gi PG pod alongside HA Postgres + existing prod workloads.
# Replication failover testing is the only thing lost — schema, query,
# migration, and index rehearsals all still work on a single primary.
# Re-enable architecture=replication only after the prod pool is bumped.
postgresql:
  enabled: true

  fullnameOverride: "postgresql"

  architecture: standalone

  image:
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r13

  auth:
    enabled: true
    database: hapihub
    username: postgres
    existingSecret: postgresql
    secretKeys:
      adminPasswordKey: postgres-password

  primary:
    persistence:
      enabled: true
      storageClass: ""
      size: 200Gi
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi

  podDisruptionBudget:
    enabled: false

# ===== DATABASE: MongoDB =====
# Disabled in preprod: hapihub 11.x runs on Postgres-only, and the prod
# node pool can't fit a third stateful workload alongside the HA Postgres
# pair. Re-enable only if a rehearsal specifically needs Mongo.
mongodb:
  enabled: false

  fullnameOverride: "mongodb"

  architecture: replicaset
  replicaCount: 1

  image:
    repository: bitnamilegacy/mongodb
    tag: 7.0.15-debian-12-r0

  auth:
    rootUser: root
    existingSecret: mongodb

  arbiter:
    enabled: false

  livenessProbe:
    enabled: true
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  readinessProbe:
    enabled: true
    timeoutSeconds: 20
    periodSeconds: 20
    failureThreshold: 10

  persistence:
    enabled: true
    storageClass: ""
    size: 100Gi

  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 3000m
      memory: 6Gi

  podDisruptionBudget:
    enabled: false

# ===== CACHE: Valkey (Redis) =====
valkey:
  enabled: false  # mirrors prod (disabled 2026-04-07 incident)

  global:
    security:
      allowInsecureImages: true

  auth:
    existingSecret: valkey

  architecture: standalone

  image:
    repository: bitnamilegacy/valkey
    tag: 8.0.1-debian-12-r2

  master:
    persistence:
      enabled: true
      storageClass: ""
      size: 4Gi
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi

# ===== STORAGE: MinIO Object Storage =====
minio:
  enabled: false

  fullnameOverride: "minio"

  image:
    repository: bitnamilegacy/minio
    tag: "2025.7.23-debian-12-r3"

  mode: standalone

  statefulset:
    replicaCount: 1

  auth:
    existingSecret: minio

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  defaultBuckets: "monobase-files"

  buckets:
    - name: "monobase-files"
  region: "us-east-1"

  podSecurityContext:
    enabled: true
    fsGroup: 1001
    fsGroupChangePolicy: "OnRootMismatch"

  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    privileged: false
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  gateway:
    enabled: true
    hostname: ""
    rateLimit:
      enabled: false

# ===== EMAIL TESTING: Mailpit =====
# Safety override: enabled in preprod so cloned prod user rows cannot
# trigger real outbound email on reset/notification flows. HapiHub SMTP
# should be pointed at the in-cluster mailpit service.
mailpit:
  enabled: true

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  gateway:
    enabled: true
    hostname: "mail.preprod.localfirsthealth.com"

# ===== P2P SYNC: Cadence =====
cadence:
  enabled: false  # mirrors prod (disabled 2026-04-07 incident)

  image:
    repository: ghcr.io/mycurelabs/cadence
    tag: "0.4.1"
    pullPolicy: Always

  replicaCount: 1

  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  gateway:
    hostname: ""
    sectionName: https-preprod-lfh
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "10m"

  postgresql:
    enabled: true
    serviceName: postgresql
    auth:
      database: hapihub

  valkey:
    enabled: true
    serviceName: "valkey-primary"

  config:
    RUST_LOG: "info"

# ===== MIGRATION: HapiHub Migrator =====
# Disabled in preprod by default. The migrator is a prod-only long-lived
# process driving the MongoDB → PostgreSQL cutover; running it in an
# ephemeral env against cloned data would race with prod's own reverse-cdc
# capture state. Flip enabled: true only if a specific rehearsal requires it.
hapihubMigrator:
  enabled: false

  image:
    repository: ghcr.io/mycurelabs/hapihub-migrator
    tag: "3.7.4"
    pullPolicy: IfNotPresent

  mode: reverse-cdc

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  postgresql:
    enabled: true
    serviceName: postgresql
    port: 5432
    auth:
      database: hapihub
      username: postgres
      existingSecret: postgresql
      passwordKey: postgres-password

  mongodb:
    enabled: true
    serviceName: mongodb-headless
    port: 27017
    database: hapihub
    username: root
    replicaSet: rs0
    authSource: admin
    existingSecret: mongodb
    passwordKey: mongodb-root-password

  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      - secretKey: ENC_BILLING_INVOICES
        remoteKey: mycure-production-enc-billing-invoices
      - secretKey: ENC_BILLING_ITEMS
        remoteKey: mycure-production-enc-billing-items
      - secretKey: ENC_BILLING_PAYMENTS
        remoteKey: mycure-production-enc-billing-payments
      - secretKey: ENC_MEDICAL_RECORDS
        remoteKey: mycure-production-enc-medical-records
      - secretKey: ENC_PERSONAL_DETAILS
        remoteKey: mycure-production-enc-personal-details

# ===== BACKUP =====
backup:
  enabled: false

# ===== SECURITY =====
podSecurityStandards:
  enabled: true
  level: restricted

# ===== RESOURCE QUOTAS =====
resourceQuotas:
  enabled: false

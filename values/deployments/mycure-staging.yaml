# MyCure Staging Configuration
# Staging environment on DigitalOcean Kubernetes (DOKS)

global:
  domain: stg.localfirsthealth.com
  namespace: mycure-staging
  environment: staging

  nodePool: "staging"

  gateway:
    name: nginx-shared-gateway
    namespace: nginx-gateway-system
    sectionName: https-stg-lfh # NGINX Gateway listener

  storage:
    provider: ""
    className: ""

# ===== CORE: Monobase API =====
api:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/api
    tag: "0.1.4"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  gateway:
    hostname: ""

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  backup:
    enabled: false

  externalSecrets:
    enabled: false

  postgresql:
    serviceName: postgresql
    architecture: standalone
    auth:
      database: postgres
      username: postgres

  mailpit:
    enabled: true

# ===== CORE: Monobase Account Frontend =====
account:
  enabled: false

  image:
    repository: ghcr.io/monobaselabs/accountapp
    tag: "1.0.2"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  gateway:
    hostname: ""

  config:
    API_URL: "https://hapihub.stg.localfirsthealth.com"

  podDisruptionBudget:
    enabled: false

# ===== HEALTHCARE: HapiHub API =====
hapihub:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/hapihub
    tag: "11.2.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  gateway:
    hostname: ""
    sectionName: https-stg-lfh
    timeouts:
      request: "60s"
    snippetsPolicy:
      enabled: true
      proxyReadTimeout: "3600s"
      clientMaxBodySize: "50m"

  betterAuth:
    passkey:
      rpName: "Mycure"
      rpId: "localfirsthealth.com"

  config:
    CLUSTER_INSTANCES: "max"
    CORS_ORIGINS: "https://mycure.stg.localfirsthealth.com,https://mycurev8.stg.localfirsthealth.com,https://mycurelocal.stg.localfirsthealth.com,https://mycure-myaccount.stg.localfirsthealth.com,https://mycure-deploydash.stg.localfirsthealth.com,https://dentalemon.stg.localfirsthealth.com,https://dentalemon-myaccount.stg.localfirsthealth.com,https://dentalemon-website.stg.localfirsthealth.com,https://dentalemon.stg.mycure.md,https://mycure-pr--*.web.app"
    CORS_STRICT: "true"
    CORS_ALLOW_LOCAL_NETWORK: "false"
    CORS_ALLOW_MOBILE_APPS: "true"
    ACCOUNTS_SERVICE_ACCOUNT_EMAILS: "service@test.com"

  env:
    - name: BETTER_AUTH_RATE_LIMIT_ENABLED
      value: "true"
    - name: BETTER_AUTH_RATE_LIMIT_WINDOW
      value: "60"
    - name: BETTER_AUTH_RATE_LIMIT_MAX
      value: "300"

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: false

  autoscaling:
    enabled: false

  externalSecrets:
    enabled: true
    secretStore: gcp-secretstore
    secretStoreKind: ClusterSecretStore
    refreshInterval: 1h
    secrets:
      - secretKey: GOOGLE_CLIENT_ID
        remoteKey: mycure-staging-google-oauth-client-id
      - secretKey: GOOGLE_CLIENT_SECRET
        remoteKey: mycure-staging-google-oauth-client-secret
      - secretKey: STRIPE_SECRET_KEY
        remoteKey: mycure-staging-stripe-secret-key
      - secretKey: AUTH_SECRET
        remoteKey: mycure-staging-auth-secret
      - secretKey: BETTER_AUTH_SECRET
        remoteKey: mycure-staging-better-auth-secret
      - secretKey: PRIVATE_KEY
        remoteKey: mycure-staging-private-key

  postgresql:
    enabled: true
    serviceName: postgresql
    auth:
      database: hapihub

  mongodb:
    serviceName: mongodb
    database: hapihub
    username: root
    replicaSet: rs0

# ===== HEALTHCARE: Frontend Application =====
mycure:
  enabled: true

  image:
    repository: ghcr.io/mycurelabs/mycureapp
    tag: "10.3.47"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 50m

  gateway:
    hostnames:
      - hostname: dentalemon-website.stg.localfirsthealth.com
        sectionName: https-stg-lfh
      - hostname: dentalemon.stg.mycure.md
        sectionName: https-stg-mycure
    gatewayName: nginx-shared-gateway
    gatewayNamespace: nginx-gateway-system

  networkPolicy:
    enabled: true

  config:

# Source: security-baseline/templates/deny-cross-namespace.yaml
# Deny Cross-Namespace Traffic
# Prevents communication between different client namespaces
# Critical for multi-tenant clusters

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-namespace
  namespace: mycure-production
  labels:
    security-policy: deny-cross-namespace
spec:
  podSelector: {}  # Applies to all pods

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only allow from same namespace
    - from:
        - podSelector: {}

    # Allow from Gateway proxies (exception)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway-system

    # Allow from monitoring (exception, if enabled)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

  egress:
    # Allow to same namespace
    - to:
        - podSelector: {}

    # Allow to kube-system (DNS, API server)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system

    # Allow to internet (HTTPS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

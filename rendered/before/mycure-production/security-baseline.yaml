# Source: security-baseline/templates/deny-cross-namespace.yaml
# For shared services (e.g., shared monitoring):
# Add exception to allow specific namespaces:
#
# egress:
#   - to:
#       - namespaceSelector:
#           matchLabels:
#             shared-service: monitoring

---
# Source: security-baseline/templates/allow-apps-to-db.yaml
# Allow API → PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-postgresql
  namespace: mycure-production
  labels:
    security-policy: allow-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql

  policyTypes:
    - Ingress

  ingress:
    # Allow from API
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api
      ports:
        - protocol: TCP
          port: 5432
---
# Source: security-baseline/templates/allow-apps-to-db.yaml
# Egress from API to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress-to-postgresql
  namespace: mycure-production
  labels:
    security-policy: allow-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api

  policyTypes:
    - Egress

  egress:
    # To PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432

    # To DNS (required for service discovery)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # To Kubernetes API (for service discovery)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
---
# Source: security-baseline/templates/allow-apps-to-db.yaml
# Allow HapiHub/SyncD → MongoDB (ingress to in-cluster MongoDB)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hapihub-to-mongodb
  namespace: mycure-production
  labels:
    security-policy: allow-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb

  policyTypes:
    - Ingress

  ingress:
    # Allow from HapiHub
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hapihub
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: syncd
      ports:
        - protocol: TCP
          port: 27017
---
# Source: security-baseline/templates/allow-apps-to-db.yaml
# Egress from HapiHub to MongoDB (in-cluster or managed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hapihub-egress-to-mongodb
  namespace: mycure-production
  labels:
    security-policy: allow-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hapihub

  policyTypes:
    - Egress

  egress:
    # To in-cluster MongoDB (if enabled)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb
      ports:
        - protocol: TCP
          port: 27017

    # To external/managed MongoDB (DigitalOcean, Atlas, etc.)
    # No 'to' selector = allows all destinations on MongoDB port
    - ports:
        - protocol: TCP
          port: 27017

    # To DNS (required for service discovery)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # To External HTTPS Services (OAuth, APIs, etc.)
    # No 'to' selector = allows all destinations
    - ports:
        - protocol: TCP
          port: 443
---

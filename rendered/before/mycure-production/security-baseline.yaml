# Source: security-baseline/templates/allow-apps-to-storage.yaml
# Notes:
# 1. MinIO and Typesense are optional (check .Values before applying)
# 2. Only Monobase API accesses these services
# 3. Monobase Account and API Worker do NOT need storage access
# 4. External HTTPS needed for:
#    - Payment APIs (Stripe, PayPal)
#    - SMS APIs (Twilio)
#    - Email services (SendGrid, SES)
#    - Third-party integrations
---
# Source: security-baseline/templates/allow-cadence-access.yaml
# Allow Cadence Network Access
# Permits Cadence to connect to Valkey, external HTTPS (iroh relay), and receive gateway traffic
---
# Source: security-baseline/templates/allow-cadence-access.yaml
# Notes:
# 1. Cadence uses Valkey as its metadata backend for change log tracking
# 2. Cadence connects to iroh relay servers (use1-1.relay.iroh.network) for P2P sync
# 3. Cadence validates JWTs via JWKS endpoints (needs HTTPS egress)
# 4. Gateway access needed for WebSocket sync endpoint (/sync) and API
---
# Source: security-baseline/templates/allow-gateway-to-apps.yaml
# Allow Traffic from Gateway to Applications
# Permits Envoy Gateway and NGINX Gateway to route traffic to Monobase API, API Worker, Monobase Account
---
# Source: security-baseline/templates/allow-gateway-to-apps.yaml
# Notes:
# 1. Envoy Gateway pods run in envoy-gateway-system namespace
# 2. NGINX Gateway Fabric pods run in nginx-gateway-system namespace
# 3. This allows ONLY gateway proxies to reach applications
# 4. Direct pod-to-pod traffic is still blocked
# 5. Applications can't reach each other (use allow-apps-to-apps.yaml if needed)

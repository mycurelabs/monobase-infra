# Source: hapihub-docs/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hapihub-docs
  namespace: mycure-production
  labels:
    helm.sh/chart: hapihub-docs-1.0.0
    app.kubernetes.io/name: hapihub-docs
    app.kubernetes.io/instance: hapihub-docs
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: hapihub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hapihub-docs
      app.kubernetes.io/instance: hapihub-docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hapihub-docs
        app.kubernetes.io/instance: hapihub-docs
    spec:
      serviceAccountName: hapihub-docs
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: hapihub-docs
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        image: "ghcr.io/mycurelabs/hapihub-docs:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        # Caddy volumes for tmp, data, and config (read-only root filesystem)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
      volumes:
      - name: tmp
        emptyDir: {}
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config
        emptyDir: {}
      nodeSelector:
        node-pool: production
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"
---
# Source: hapihub-docs/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hapihub-docs
  namespace: mycure-production
  labels:
    helm.sh/chart: hapihub-docs-1.0.0
    app.kubernetes.io/name: hapihub-docs
    app.kubernetes.io/instance: hapihub-docs
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: hapihub
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https  # Default: attach to HTTPS listener
  hostnames:
    - docs.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hapihub-docs
          port: 80
          weight: 1

# Source: database-secrets/templates/postgresql-externalsecret.yaml
# PostgreSQL ExternalSecret
# Syncs PostgreSQL credentials from GCP Secret Manager to Kubernetes
# Used by: postgresql chart (Bitnami), API

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: mycure-production
  labels:
    app.kubernetes.io/name: postgresql-credentials
    app.kubernetes.io/component: external-secrets
spec:
  # Refresh interval - how often to sync from GCP
  refreshInterval: 1h
  
  # Reference to ClusterSecretStore
  secretStoreRef:
    name: gcp-secretstore
    kind: ClusterSecretStore
  
  # Target Kubernetes secret
  target:
    name: postgresql
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # PostgreSQL postgres user password - required by Bitnami PostgreSQL chart
        postgres-password: "{{ .postgresPassword }}"
        # Replication password - used by Bitnami chart when architecture=replication
        # Harmless when architecture=standalone (key is just unused)
        postgres-replication-password: "{{ .postgresReplicationPassword }}"

  # Data to fetch from GCP Secret Manager
  data:
    - secretKey: postgresPassword
      remoteRef:
        key: mycure-production-postgresql-password
    - secretKey: postgresReplicationPassword
      remoteRef:
        key: mycure-production-postgresql-replication-password

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cadence
  namespace: mycure-production
  labels:
    helm.sh/chart: cadence-1.0.0
    app.kubernetes.io/name: cadence
    app.kubernetes.io/instance: cadence
    app.kubernetes.io/version: "0.2.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https
  hostnames:
    - cadence.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: cadence
          port: 7890
          weight: 1

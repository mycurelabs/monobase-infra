# Source: cadence/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadence
  namespace: mycure-production
  labels:
    helm.sh/chart: cadence-1.0.0
    app.kubernetes.io/name: cadence
    app.kubernetes.io/instance: cadence
    app.kubernetes.io/version: "0.2.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cadence
      app.kubernetes.io/instance: cadence
  template:
    metadata:
      annotations:
        checksum/config: 042ae2c06d968d2c79399003c0102948dd04a9c9b5775a4a34cd250333fd170c
      labels:
        app.kubernetes.io/name: cadence
        app.kubernetes.io/instance: cadence
    spec:
      serviceAccountName: cadence
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: cadence
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
        image: "ghcr.io/mycurelabs/cadence:latest"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - exec cadence --primary-db "postgres://${POSTGRESQL_USER}:${POSTGRESQL_PASSWORD}@postgresql.mycure-production.svc.cluster.local:5432/hapihub"
        ports:
        - name: http
          containerPort: 7890
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 7890
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 7890
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        env:
        # Data directory for metadata storage
        - name: CADENCE_DATA_DIR
          value: "/tmp/cadence-data"
        # PostgreSQL connection
        - name: POSTGRESQL_USER
          value: "postgres"
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: postgres-password
        - name: CADENCE_PRIMARY_DB_URL
          value: "postgres://$(POSTGRESQL_USER):$(POSTGRESQL_PASSWORD)@postgresql.mycure-production.svc.cluster.local:5432/hapihub"
        # JWKS URL for JWT validation (from HapiHub)
        - name: CADENCE_JWKS_URL
          value: "http://hapihub.mycure-production.svc.cluster.local:7500/.well-known/jwks.json"
        # Valkey metadata backend
        - name: CADENCE_METADATA_BACKEND
          value: "valkey"
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey
              key: valkey-password
        - name: CADENCE_VALKEY_URL
          value: "redis://:$(VALKEY_PASSWORD)@valkey-primary.mycure-production.svc.cluster.local:6379"
        # Load secrets from External Secrets Operator
        # Additional environment variables from config
        - name: RUST_LOG
          value: "info"
        # Custom environment variables
        volumeMounts:
        - name: config
          mountPath: /app/cadence.yml
          subPath: cadence.yml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: cadence
          items:
          - key: cadence.yml
            path: cadence.yml
      nodeSelector:
        node-pool: production
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"
---

# Source: dentalemon/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dentalemon
  namespace: mycure-production
  labels:
    helm.sh/chart: dentalemon-1.0.0
    app.kubernetes.io/name: dentalemon
    app.kubernetes.io/instance: dentalemon
    app.kubernetes.io/version: "10.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: dentalemon
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dentalemon
      app.kubernetes.io/instance: dentalemon
  template:
    metadata:
      annotations:
        checksum/config: 8e1b8da83399b5ec7719b2f1152292eb5bafd12130d95f50f02589bf06f6312b
      labels:
        app.kubernetes.io/name: dentalemon
        app.kubernetes.io/instance: dentalemon
    spec:
      serviceAccountName: dentalemon
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dentalemon
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        image: "ghcr.io/mycurelabs/dentalemonapp:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
        env:
        - name: API_URL
          value: ""
        - name: HAPIHUB_URL
          value: ""
        # Caddy volumes for tmp, data, and config (read-only root filesystem)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
      volumes:
      - name: tmp
        emptyDir: {}
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config
        emptyDir: {}
      nodeSelector:
        node-pool: production
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"
---
# Source: dentalemon/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dentalemon
  namespace: mycure-production
  labels:
    helm.sh/chart: dentalemon-1.0.0
    app.kubernetes.io/name: dentalemon
    app.kubernetes.io/instance: dentalemon
    app.kubernetes.io/version: "10.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: dentalemon
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https  # Default: attach to HTTPS listener
  hostnames:
    - dentalemon.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dentalemon
          port: 80
          weight: 1

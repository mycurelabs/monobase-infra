# Source: mycure-myaccount/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycure-myaccount
  namespace: mycure-production
  labels:
    helm.sh/chart: mycure-myaccount-1.0.0
    app.kubernetes.io/name: mycure-myaccount
    app.kubernetes.io/instance: mycure-myaccount
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: mycure-myaccount
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mycure-myaccount
      app.kubernetes.io/instance: mycure-myaccount
  template:
    metadata:
      annotations:
        checksum/config: 3e63d1de67d50ef8e03e95b6b31e8747fc9a5a98bd775f41a9b059348cc631c1
      labels:
        app.kubernetes.io/name: mycure-myaccount
        app.kubernetes.io/instance: mycure-myaccount
    spec:
      serviceAccountName: mycure-myaccount
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mycure-myaccount
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        image: "ghcr.io/mycurelabs/myaccount:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        env:
        - name: API_URL
          value: ""
        - name: HAPIHUB_URL
          value: ""
        # Caddy volumes for tmp, data, and config (read-only root filesystem)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
      volumes:
      - name: tmp
        emptyDir: {}
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config
        emptyDir: {}
      nodeSelector:
        node-pool: production
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"
---
# Source: mycure-myaccount/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mycure-myaccount
  namespace: mycure-production
  labels:
    helm.sh/chart: mycure-myaccount-1.0.0
    app.kubernetes.io/name: mycure-myaccount
    app.kubernetes.io/instance: mycure-myaccount
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: mycure-myaccount
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https  # Default: attach to HTTPS listener
  hostnames:
    - mycure-myaccount.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mycure-myaccount
          port: 80
          weight: 1

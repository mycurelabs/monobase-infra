# Source: api/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mycure-preprod
  labels:
    helm.sh/chart: api-1.0.0
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: api
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: api
  template:
    metadata:
      annotations:
        checksum/config: f114b47f60291b9768e78a98954a4bff64c7bcbf93c3732f24567f7e5ff642c0
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: api
    spec:
      serviceAccountName: api
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
        image: "ghcr.io/monobaselabs/api:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 7213
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /livez
            port: 7213
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 7213
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
        env:
        # Set HOME to /tmp to avoid permission denied errors when running as non-root
        - name: HOME
          value: "/tmp"
        # Load from ConfigMap
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: api
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: api
              key: LOG_LEVEL
        - name: PORT
          value: "7213"
        # PostgreSQL connection - individual components
        # Note: PostgreSQL may be deployed separately in GitOps
        - name: POSTGRESQL_HOST
          value: "api-postgresql.mycure-preprod.svc.cluster.local"
        - name: POSTGRESQL_PORT
          value: "5432"
        - name: POSTGRESQL_DATABASE
          value: "hapihub"
        - name: POSTGRESQL_USER
          value: "postgres"
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: postgres-password
        # DATABASE_URL constructed from components using K8s variable expansion
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRESQL_USER):$(POSTGRESQL_PASSWORD)@$(POSTGRESQL_HOST):$(POSTGRESQL_PORT)/$(POSTGRESQL_DATABASE)"
        # Service URLs from dependencies
        - name: REDIS_URL
          value: "redis://api-valkey-master.mycure-preprod.svc.cluster.local:6379"
        - name: STORAGE_PROVIDER
          value: "minio"
        - name: STORAGE_ENDPOINT
          value: "http://minio.mycure-preprod.svc.cluster.local:9000"
        - name: STORAGE_PUBLIC_ENDPOINT
          value: "http://minio.mycure-preprod.svc.cluster.local:9000"
        - name: STORAGE_BUCKET
          value: "monobase-files"
        - name: STORAGE_REGION
          value: "us-east-1"
        - name: STORAGE_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-user
        - name: STORAGE_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-password
        - name: STORAGE_UPLOAD_URL_EXPIRY
          value: "300"
        - name: STORAGE_DOWNLOAD_URL_EXPIRY
          value: "900"
        - name: SMTP_HOST
          value: "mailpit-smtp.mycure-preprod.svc.cluster.local"
        - name: SMTP_PORT
          value: "25"
        - name: SMTP_SECURE
          value: "false"
        # Load non-DB secrets from External Secrets Operator
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: JWT_SECRET
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: S3_ACCESS_KEY_ID
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: S3_SECRET_ACCESS_KEY
        # Additional environment variables from config
      nodeSelector:
        node-pool: staging
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
            weight: 100
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "staging"
          effect: "NoSchedule"

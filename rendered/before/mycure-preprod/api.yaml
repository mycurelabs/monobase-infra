# Source: api/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api
  namespace: mycure-preprod
  labels:
    helm.sh/chart: api-1.0.0
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: api
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: gateway-system
      ports:
      - port: 7213
        protocol: TCP
  egress:
    - ports:
      - port: 5432
        protocol: TCP
      - port: 6379
        protocol: TCP
      - port: 9000
        protocol: TCP
      - port: 1025
        protocol: TCP
      to:
      - namespaceSelector: {}
    - ports:
      - port: 53
        protocol: TCP
      - port: 53
        protocol: UDP
      to:
      - namespaceSelector: {}
    - ports:
      - port: 443
        protocol: TCP
      to:
      - namespaceSelector: {}

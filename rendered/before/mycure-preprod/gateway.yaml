---
# Source: gateway/templates/namespace.yaml
# Gateway System Namespace
# Created by Envoy Gateway operator, but declaring here for clarity
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
  labels:
    helm.sh/chart: gateway-0.1.0
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
---
# Source: gateway/templates/envoy-patch-policy.yaml
# EnvoyPatchPolicy to increase max request headers size
# Fixes HTTP 431 "Request Header Fields Too Large" errors
# Default is 60KB, increased to 96KB (maximum allowed)
---
# Source: gateway/templates/certificate.yaml
# TLS Certificate Request (HTTP-01 Challenge)
# cert-manager will provision this automatically via Let's Encrypt

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-tls
  namespace: gateway-system
  labels:
    helm.sh/chart: gateway-0.1.0
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: gateway-certificate
spec:
  secretName: gateway-tls  # Referenced by Gateway
  issuerRef:
    name: letsencrypt-prod  # Production Let's Encrypt
    kind: ClusterIssuer
  dnsNames:
    # Specific subdomains (HTTP-01 challenge)
    - "app.example.com"
    - "api.example.com"
    # Apex domain
    - "example.com"
---
# Source: gateway/templates/gateway.yaml
# Shared Gateway Resource
# All applications reference this gateway via HTTPRoutes
# Benefits:
# - Single LoadBalancer IP (cost-effective)
# - Zero-downtime client onboarding (just add HTTPRoute)
# - Clean namespace isolation
# - Flexible hostname management

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway-system
  labels:
    helm.sh/chart: gateway-0.1.0
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
spec:
  # Use Envoy Gateway implementation
  gatewayClassName: envoy-gateway

  # Gateway listeners
  listeners:
    # HTTPS listener - accepts all traffic on port 443
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.example.com"  # Derived from domain

      # Allow HTTPRoutes from any namespace
      allowedRoutes:
        namespaces:
          from: All  # Critical for multi-tenant architecture
      # TLS termination
      tls:
        mode: Terminate
        certificateRefs:
          # Certificate managed by cert-manager.
          # group: "" is the core API group default — the API server adds it
          # on apply, so omitting it here causes a permanent ArgoCD diff.
          - group: ""
            kind: Secret
            name: gateway-tls
    # HTTP listener (for redirect to HTTPS or plain HTTP)
    - name: http
      port: 80
      protocol: HTTP
      hostname: "*.example.com"  # Derived from domain
      allowedRoutes:
        namespaces:
          from: All
---
# Source: gateway/templates/gatewayclass.yaml
# GatewayClass Resource
# Defines the controller that manages Gateway resources
# This is a cluster-scoped resource that must exist before creating Gateways

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
  labels:
    helm.sh/chart: gateway-0.1.0
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
spec:
  # Controller name must match the Envoy Gateway installation
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# Source: gateway/templates/http-redirect.yaml
# HTTP to HTTPS Redirect Policy
# Automatically redirects all HTTP traffic to HTTPS

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: gateway-system
  labels:
    helm.sh/chart: gateway-0.1.0
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: http-redirect
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: http  # Attach to HTTP listener only

  hostnames:
    - "*.example.com"  # Match all subdomains for this domain

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301  # 301 = Permanent redirect

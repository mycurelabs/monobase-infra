# Source: hapihub/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hapihub
  namespace: mycure-preprod
  labels:
    helm.sh/chart: hapihub-1.1.0
    app.kubernetes.io/name: hapihub
    app.kubernetes.io/instance: hapihub
    app.kubernetes.io/version: "10.0.13"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hapihub
      app.kubernetes.io/instance: hapihub
  template:
    metadata:
      annotations:
        checksum/config: b369cc61d6e1f91abee61f911bb4230801e9cf0b5833ca97206de82b91d77a1c
      labels:
        app.kubernetes.io/name: hapihub
        app.kubernetes.io/instance: hapihub
    spec:
      serviceAccountName: hapihub
      # Disable service environment variables to avoid port config conflicts
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: hapihub
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
        image: "ghcr.io/mycurelabs/hapihub:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 7500
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 7500
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 7500
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
        env:
        # Set HOME to /tmp to avoid permission denied errors when running as non-root
        - name: HOME
          value: "/tmp"
        # Load from ConfigMap (conditionally)
        # Port configuration - must be numeric (unquoted) for proper parsing
        - name: HAPIHUB_PORT
          value: "7500"
        - name: PORT
          value: "7500"
        # MongoDB connection
        # PostgreSQL connection (v11+)
        - name: POSTGRESQL_USER
          value: "postgres"
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: postgres-password
        - name: DATABASE_URI
          value: "postgres://$(POSTGRESQL_USER):$(POSTGRESQL_PASSWORD)@postgresql.mycure-preprod.svc.cluster.local:5432/hapihub"
        - name: DATABASE_WAIT_FOR_READY
          value: "true"
        - name: DATABASE_STARTUP_RETRIES
          value: "10"
        - name: DATABASE_STARTUP_RETRY_DELAY_MS
          value: "5000"
        # External URL - public HTTPS endpoint for callbacks, webhooks, etc.
        - name: EXTERNAL_ADDRESS
          value: "https://hapihub.preprod.localfirsthealth.com"
        # Better Auth - Passkey/WebAuthn configuration
        - name: BETTER_AUTH_PASSKEY_RP_NAME
          value: "Acme"
        - name: BETTER_AUTH_PASSKEY_RP_ID
          value: "example.com"
        # Service URLs from dependencies
        - name: REDIS_URL
          value: "redis://hapihub-valkey-master.mycure-preprod.svc.cluster.local:6379"
        - name: STORAGE_PROVIDER
          value: "minio"
        - name: STORAGE_ENDPOINT
          value: "http://minio.mycure-preprod.svc.cluster.local:9000"
        - name: STORAGE_PUBLIC_ENDPOINT
          value: "http://minio.mycure-preprod.svc.cluster.local:9000"
        - name: STORAGE_BUCKET
          value: "monobase-files"
        - name: STORAGE_REGION
          value: "us-east-1"
        - name: STORAGE_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-user
        - name: STORAGE_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-password
        - name: STORAGE_UPLOAD_URL_EXPIRY
          value: "300"
        - name: STORAGE_DOWNLOAD_URL_EXPIRY
          value: "900"
        # v11 storage naming
        - name: STORAGE_TYPE
          value: "s3"
        - name: STORAGE_S3_ENDPOINT
          value: "http://minio.mycure-preprod.svc.cluster.local:9000"
        - name: STORAGE_S3_REGION
          value: "us-east-1"
        - name: STORAGE_S3_FORCE_PATH_STYLE
          value: "true"
        - name: STORAGE_S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-user
        - name: STORAGE_S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio
              key: root-password
        - name: SMTP_HOST
          value: "mailpit-smtp.mycure-preprod.svc.cluster.local"
        - name: SMTP_PORT
          value: "25"
        - name: SMTP_SECURE
          value: "false"
        # Load non-DB secrets from External Secrets Operator
        # Additional environment variables from config
        - name: CLUSTER_INSTANCES
          value: "1"
        - name: CORS_ALLOW_LOCAL_NETWORK
          value: "false"
        - name: CORS_ALLOW_MOBILE_APPS
          value: "true"
        - name: CORS_ALLOW_TUNNELING
          value: "false"
        - name: CORS_CREDENTIALS
          value: "true"
        - name: CORS_STRICT
          value: "true"
        - name: DB_RECREATE_INDEX_ON_CONFLICT
          value: "false"
        - name: DB_SKIP_CREATE_INDEXES
          value: "false"
        - name: RUN_WORKERS
          value: "true"
        # Custom environment variables
      nodeSelector:
        node-pool: staging
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - hapihub
              topologyKey: kubernetes.io/hostname
            weight: 100
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "staging"
          effect: "NoSchedule"
---
# Source: hapihub/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hapihub
  namespace: mycure-preprod
  labels:
    helm.sh/chart: hapihub-1.1.0
    app.kubernetes.io/name: hapihub
    app.kubernetes.io/instance: hapihub
    app.kubernetes.io/version: "10.0.13"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: monobase
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https  # Default: attach to HTTPS listener
  hostnames:
    - hapihub.preprod.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hapihub
          port: 7500
          weight: 1

# Source: mycure-dashboard/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycure-dashboard
  namespace: mycure-preprod
  labels:
    helm.sh/chart: mycure-dashboard-1.0.0
    app.kubernetes.io/name: mycure-dashboard
    app.kubernetes.io/instance: mycure-dashboard
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: mycureapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mycure-dashboard
      app.kubernetes.io/instance: mycure-dashboard
  template:
    metadata:
      annotations:
        checksum/config: 4c20122b2d9a78068181ef300a981cde7624dc8dc8fbb0c5d006f7484a60f22e
      labels:
        app.kubernetes.io/name: mycure-dashboard
        app.kubernetes.io/instance: mycure-dashboard
    spec:
      serviceAccountName: mycure-dashboard
      securityContext:
        fsGroup: 101
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mycure-dashboard
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
        image: "ghcr.io/mycurelabs/dashboard:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 512Mi
        env:
        - name: API_URL
          value: ""
        # Caddy volumes for tmp, data, and config (read-only root filesystem)
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
      volumes:
      - name: tmp
        emptyDir: {}
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config
        emptyDir: {}
      nodeSelector:
        node-pool: staging
      tolerations:
        - key: "node-pool"
          operator: "Equal"
          value: "staging"
          effect: "NoSchedule"
---
# Source: mycure-dashboard/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mycure-dashboard
  namespace: mycure-preprod
  labels:
    helm.sh/chart: mycure-dashboard-1.0.0
    app.kubernetes.io/name: mycure-dashboard
    app.kubernetes.io/instance: mycure-dashboard
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: mycureapp
spec:
  parentRefs:
    - name: nginx-shared-gateway
      namespace: nginx-gateway-system
      sectionName: https  # Default: attach to HTTPS listener
  hostnames:
    - mycure-dashboard.preprod.localfirsthealth.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mycure-dashboard
          port: 80
          weight: 1

# Source: monobase-infrastructure/templates/monitoring.yaml
# ArgoCD Application: Monitoring Stack (Prometheus + Grafana)
# Sync Wave 0 - Deploy monitoring (cluster-wide, optional)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    chart: kube-prometheus
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 11.x.x
    helm:
      releaseName: monitoring
      valuesObject:
        # Global storage configuration
        global:
          defaultStorageClass: ""
        
        # Use bitnamilegacy images (Bitnami deprecated non-hardened Debian images)
        operator:
          enabled: true
          image:
            repository: bitnamilegacy/prometheus-operator
        
        # Prometheus configuration
        prometheus:
          enabled: true
          retention: "30d"
          retentionSize: "45GB"
          image:
            repository: bitnamilegacy/prometheus
          
          persistence:
            enabled: true
            storageClass: ""
            size: "50Gi"
          
          resources:
            requests:
              cpu: "100m"
              memory: "400Mi"  # Increased from 200Mi - prevent OOM (actual usage: 324Mi)
            limits:
              cpu: "500m"
              memory: "768Mi"  # Optimized from 1Gi (actual usage: 533Mi = 69%)
          
          # Security context
          securityContext:
            enabled: true
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000

        # Alertmanager configuration (disabled for resource-constrained staging)
        alertmanager:
          enabled: false
        
        # Blackbox Exporter
        blackboxExporter:
          enabled: true
          image:
            repository: bitnamilegacy/blackbox-exporter
        
        # Node Exporter (subchart - DaemonSet runs on all nodes)
        node-exporter:
          image:
            repository: bitnamilegacy/node-exporter
          resources:
            requests:
              cpu: "10m"       # Optimized from 100m (actual usage: ~2m = 2%)
              memory: "64Mi"   # Optimized from 128Mi (actual usage: ~16Mi = 12%)
            limits:
              cpu: "100m"      # Reduced from 150m
              memory: "128Mi"  # Reduced from 192Mi
        
        # Kube State Metrics (subchart)
        kube-state-metrics:
          image:
            repository: bitnamilegacy/kube-state-metrics
          resources:
            requests:
              cpu: "10m"      # Optimized from 250m (actual usage: 3m = 30%)
              memory: "64Mi"  # Optimized from 256Mi (actual usage: 32Mi = 50%)
            limits:
              cpu: "100m"
              memory: "128Mi"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
  
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
---
# Source: monobase-infrastructure/templates/nginx-gateway-resources.yaml
# ArgoCD Application: NGINX Gateway Resources
# Deploys the NGINX shared Gateway resource after NGINX Gateway Fabric operator is ready
# Sync Wave 1 - Deployed after NGINX Gateway Fabric operator (wave 0)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # After nginx-gateway operator
  labels:
    app.kubernetes.io/name: nginx-gateway-resources
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: charts/nginx-gateway
    helm:
      releaseName: nginx-gateway
      valuesObject:
        gateway:
          gatewayClassName: nginx
          listeners:
          - hostname: '*.preprod.localfirsthealth.com'
            name: https-preprod-lfh
            port: 443
            protocol: HTTPS
            tlsSecretName: nginx-gateway-tls-preprod
          - hostname: '*.preprod.localfirsthealth.com'
            name: http-preprod-lfh
            port: 80
            protocol: HTTP
          - hostname: '*.localfirsthealth.com'
            name: https-lfh
            port: 443
            protocol: HTTPS
            tlsSecretName: nginx-gateway-tls-prod
          - hostname: '*.localfirsthealth.com'
            name: http-lfh
            port: 80
            protocol: HTTP
          - hostname: '*.mycure.md'
            name: https-mycure
            port: 443
            protocol: HTTPS
            tlsSecretName: nginx-gateway-tls-prod-mycure
          - hostname: '*.mycure.md'
            name: http-mycure
            port: 80
            protocol: HTTP
          name: nginx-shared-gateway
          namespace: nginx-gateway-system
        gatewayClass:
          enabled: false
        snippetsPolicies:
        - name: hapihub-proxy-timeout
          snippets:
          - context: http.server.location
            value: |
              proxy_read_timeout 3600s;
              client_max_body_size 50m;
        - name: nginx-strip-server-header
          snippets:
          - context: http
            value: |
              js_import securityHeaders from /etc/nginx/njs-security/security-headers.js;
          - context: http.server.location
            value: |
              js_header_filter securityHeaders.clearServer;
        tls:
          certificates:
          - clusterIssuer: letsencrypt-mycure-cloudflare-prod
            dnsNames:
            - '*.preprod.localfirsthealth.com'
            secretName: nginx-gateway-tls-preprod
          - clusterIssuer: letsencrypt-mycure-cloudflare-prod
            dnsNames:
            - '*.localfirsthealth.com'
            secretName: nginx-gateway-tls-prod
          - clusterIssuer: letsencrypt-nginx-http01
            dnsNames:
            - api.mycure.md
            - find.mycure.md
            secretName: nginx-gateway-tls-prod-mycure

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # Ignore expected differences
  ignoreDifferences:
    # Gateway status is managed by controller
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /status
    # Certificate status is managed by cert-manager
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /status
---
# Source: monobase-infrastructure/templates/nginx-gateway.yaml
# ArgoCD Application: NGINX Gateway Fabric
# Sync Wave 0 - Deploy gateway infrastructure (cluster-wide)
# Runs alongside Envoy Gateway — staging proof-of-concept

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: nginx-gateway-fabric
    repoURL: oci://ghcr.io/nginx/charts/nginx-gateway-fabric
    targetRevision: 2.4.1
    helm:
      releaseName: nginx-gateway-fabric
      skipCrds: false  # NGINX-specific CRDs (NginxGateway, NginxProxy) required
      valuesObject:
        nginxGateway:
          snippets:
            enable: true
        # Data-plane (NginxProxy) sizing.
        # 2026-04-07 incident: data-plane pod was BestEffort QoS with replicas:1
        # and grew to ~1.2Gi resident; the kubelet evicted it under node memory
        # pressure on general-03kot, causing a full *.localfirsthealth.com /
        # *.mycure.md outage (502 Bad Gateway) for ~7 min while the replacement
        # rolled. Fix: requests promote the pod to Burstable so the kubelet
        # evicts other BestEffort workloads first; the limit caps growth so a
        # leak fails fast inside one replica; replicas:2 + anti-affinity keep at
        # least one healthy replica through any single restart/eviction.
        nginx:
          replicas: 2
          container:
            resources:
              requests:
                cpu: 100m
                # 192Mi is ~2.3x the observed steady-state RSS (~85Mi) and is
                # the largest request that fits on the current general node
                # pool: nodes are 3Gi each, two of three were ≥90% requested
                # at the time of the incident, so 384Mi made the second
                # replica Pending. Promotes the pod to Burstable QoS (the
                # original eviction-prevention goal); the 1Gi limit still
                # absorbs growth. TODO(infra): grow the general node pool
                # so this can be raised back to 384Mi.
                memory: 192Mi
              limits:
                memory: 1Gi
            # njs script delivered by the nginx-njs-security-headers ConfigMap
            # (charts/nginx-gateway/templates/njs-security-headers-cm.yaml).
            # Wired into every server block by the nginx-strip-server-header
            # SnippetsPolicy (values/infrastructure/main.yaml). Closes
            # vapt-2025#10 L-001 by deleting the `Server` response header.
            volumeMounts:
              - name: njs-security-headers
                mountPath: /etc/nginx/njs-security
                readOnly: true
          pod:
            # Best-effort spread across hosts. Required anti-affinity is too
            # strict for the current general node pool size — when 2 of 3
            # nodes are saturated, requiredDuringScheduling leaves the second
            # replica Pending. ScheduleAnyway lets the scheduler place both
            # on the same node as a last resort while still preferring
            # spread when capacity exists.
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nginx-shared-gateway-nginx
            volumes:
              - name: njs-security-headers
                configMap:
                  name: nginx-njs-security-headers

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
---
# Source: monobase-infrastructure/templates/velero-resources.yaml
# ArgoCD Application: Velero Backup Resources
# Sync Wave 1 - Deploy after Velero operator (wave 0)
# Deploys BackupStorageLocation, VolumeSnapshotLocation, and Backup Schedules

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: infrastructure/velero
    helm:
      releaseName: velero-resources
      valueFiles:
        - ../../values/infrastructure/main.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  syncPolicy:
    automated:
      prune: false  # Never auto-delete backup configurations
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Namespace created by velero operator
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

  ignoreDifferences:
    - group: velero.io
      kind: BackupStorageLocation
      jsonPointers:
        - /status
    - group: velero.io
      kind: VolumeSnapshotLocation
      jsonPointers:
        - /status
    - group: velero.io
      kind: Schedule
      jsonPointers:
        - /status
---
# Source: monobase-infrastructure/templates/velero.yaml
# ArgoCD Application: Velero
# Sync Wave 0 - Deploy backup infrastructure (cluster-wide)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 12.0.1
    helm:
      releaseName: velero
      values: |
        upgradeCRDs: false
        configuration:
          defaultBackupTTL: 720h
          # CSI snapshots are now the primary path (see schedules + the
          # do-block-storage-velero VolumeSnapshotClass). FSB stays available
          # per-backup via `defaultVolumesToFsBackup: true` on the spec, but
          # is no longer the cluster-wide default.
          defaultVolumesToFsBackup: false
          # EnableCSI is required even in Velero v1.14+ where the CSI plugin
          # is integrated into core. Without it, the csi-pvc-backupper action
          # is registered but skipped at runtime, so no VolumeSnapshots get
          # created and backups silently complete with only manifests.
          features: EnableCSI
          # BSL/VSL are managed by the velero-resources app (see
          # infrastructure/velero/templates/backup-locations.yaml), not by
          # the chart. Empty arrays prevent the chart from rendering its
          # own placeholder BSL/VSL with null fields (which fails admission).
          backupStorageLocation: []
          volumeSnapshotLocation: []
        credentials:
          useSecret: true
          existingSecret: velero-credentials
        deployNodeAgent: true
        nodeAgent:
          podVolumePath: /var/lib/kubelet/pods
          # Chart 12 renamed `privileged` -> `containerSecurityContext.privileged`.
          # Required for FSB (file-system backup) to bind-mount pod volumes
          # from /var/lib/kubelet/pods. Without it FSB fails on Bottlerocket,
          # COS, and most hardened distros.
          containerSecurityContext:
            privileged: true
          # Tolerate every taint so node-agent runs on production/staging
          # pools too. Without this, FSB-style backups silently fail for any
          # pod scheduled on a tainted node (production stateful workloads
          # were affected — see incident 2026-05-12). node-agent is also the
          # data-mover for CSI snapshot uploads to Spaces, so it must reach
          # every node that holds a backed-up volume.
          tolerations:
            - operator: Exists
        initContainers:
          - name: velero-plugin-for-aws
            # Velero 1.18 pairs with velero-plugin-for-aws v1.14.x.
            image: velero/velero-plugin-for-aws:v1.14.0
            volumeMounts:
              - mountPath: /target
                name: plugins
        serviceAccount:
          server:
            create: true
            name: velero
            annotations:

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status

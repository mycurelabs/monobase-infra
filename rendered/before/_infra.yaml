# Source: monobase-infrastructure/templates/external-secrets-stores.yaml
# ArgoCD Application: External Secrets SecretStores
# Deploys SecretStore/ClusterSecretStore resources after External Secrets Operator is ready
# Sync Wave 1 - Deployed after External Secrets Operator (wave 0)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-stores
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # After external-secrets operator
  labels:
    app.kubernetes.io/name: external-secrets-stores
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: infrastructure/external-secrets
    # `directory.recurse: false` is the default and ArgoCD strips it on
    # apply, producing a permanent OutOfSync diff if we set it explicitly.

  destination:
    server: https://kubernetes.default.svc
    # ClusterSecretStore is cluster-scoped, but ServiceAccount goes to external-secrets-system
  
  syncPolicy:
    automated:
      prune: true       # Remove SecretStores if provider changes
      selfHeal: true    # Auto-correct configuration drift
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  
  # Ignore expected differences
  ignoreDifferences:
    # SecretStore status is managed by controller
    - group: external-secrets.io
      kind: ClusterSecretStore
      jsonPointers:
        - /status
    - group: external-secrets.io
      kind: SecretStore
      jsonPointers:
        - /status
    # ExternalSecret fields auto-populated by ESO operator
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
---
# Source: monobase-infrastructure/templates/external-secrets.yaml
# ArgoCD Application: External Secrets Operator
# Manages secrets from external sources (AWS Secrets Manager, Azure Key Vault, GCP Secret Manager, SOPS, etc.)
# Sync Wave 0 - Deployed before ClusterSecretStore resources

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.9.11

    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true

        # Resource limits (Actual usage: controller=44Mi, webhook=31Mi, cert-controller=106Mi)
        resources:
          requests:
            cpu: 50m
            memory: 96Mi   # Optimized from 128Mi (actual: 44Mi = 46%)
          limits:
            cpu: 200m
            memory: 192Mi  # Optimized from 256Mi (actual: 44Mi = 23%)

        # Webhook resource limits
        webhook:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi  # Keep as is (actual: 31Mi = 48%)
            limits:
              cpu: 100m
              memory: 128Mi  # Keep as is (actual: 31Mi = 24%)

        # Cert controller resource limits
        certController:
          resources:
            requests:
              cpu: 25m
              memory: 128Mi  # Keep as is (actual: 106Mi = 83%)
            limits:
              cpu: 100m
              memory: 192Mi  # Optimized from 128Mi (actual: 106Mi = 55%, needs headroom)

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # Ignore expected differences
  ignoreDifferences:
    # CRD status is managed by apiserver
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
    # MutatingWebhookConfiguration is managed by cert-controller
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    # ValidatingWebhookConfiguration is managed by cert-controller
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
---
# Source: monobase-infrastructure/templates/gateway-resources.yaml
# ArgoCD Application: Gateway Resources
# Deploys the shared Gateway resource after Envoy Gateway operator is ready
# Sync Wave 1 - Deployed after Envoy Gateway operator (wave 0)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # After envoy-gateway operator
  labels:
    app.kubernetes.io/name: gateway-resources
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: charts/gateway
    helm:
      releaseName: gateway
      valuesObject:
        domain: mycureapp.com
        envoyPatchPolicy:
          enabled: true
          listeners:
          - https
          - https-lfh
          - https-mycure
          maxRequestHeadersKb: 96
        gateway:
          additionalListeners:
          - hostname: '*.localfirsthealth.com'
            name: https-lfh
            port: 443
            protocol: HTTPS
          - hostname: '*.localfirsthealth.com'
            name: http-lfh
            port: 80
            protocol: HTTP
          gatewayClassName: envoy-gateway
          listeners:
            http:
              enabled: true
              port: 80
              protocol: HTTP
            https:
              enabled: true
              port: 443
              protocol: HTTPS
          name: shared-gateway
          namespace: gateway-system
        httpRedirect:
          enabled: false
          statusCode: 301
        tls:
          certManager:
            additionalDomains:
            - dentalemon-myaccount.localfirsthealth.com
            - dentalemon-website.localfirsthealth.com
            - grafana.localfirsthealth.com
            - hapihub.localfirsthealth.com
            - mycure-deploydash.localfirsthealth.com
            - mycure-myaccount.localfirsthealth.com
            - mycure.localfirsthealth.com
            - mycurelocal.localfirsthealth.com
            - mycurev8.localfirsthealth.com
            - sync.localfirsthealth.com
            clusterIssuer: letsencrypt-mycure-cloudflare-prod
            enabled: true
            includeApex: false
            subdomains:
            - grafana
            - api
            - web
            - sync
            - storage
            - dentalemon
            - hapihub
            - mycure
            - mycurev8
          enabled: true
          secretName: gateway-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  
  syncPolicy:
    automated:
      prune: true       # Remove resources if removed from Git
      selfHeal: true    # Auto-correct configuration drift
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Better for CRDs
      - RespectIgnoreDifferences=true  # Respect ignoreDifferences during sync
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  
  # Ignore expected differences
  ignoreDifferences:
    # Gateway status is managed by controller
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /status
        - /spec/listeners/0/tls/certificateRefs  # Ignore K8s auto-added group field
    # HTTPRoute status is managed by controller
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status
        - /spec/parentRefs  # Ignore K8s auto-added group/kind fields
        - /spec/rules/0/matches  # Ignore auto-added default matches
    # Certificate status is managed by cert-manager
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /status
---

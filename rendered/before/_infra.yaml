# Source: monobase-infrastructure/templates/cert-manager-issuers.yaml
# ArgoCD Application: cert-manager-issuers
# Sync Wave 1 - Deploy ClusterIssuers after cert-manager

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: charts/cert-manager-issuers
    helm:
      releaseName: cert-manager-issuers
      values: |
        issuers:
          - email: admin@example.com
            name: letsencrypt-prod
            provider: http01
            server: production
          - email: admin@example.com
            name: letsencrypt-staging
            provider: http01
            server: staging
          - email: caretheextramile@gmail.com
            http01:
              gatewayName: nginx-shared-gateway
              gatewayNamespace: nginx-gateway-system
            name: letsencrypt-nginx-http01
            provider: http01
            server: production
          - cloudflare:
              apiTokenSecretRef:
                key: api-token
                name: mycure-cloudflare-api-token
              dnsZones:
              - mycureapp.com
              - stitchtechsolutions.com
              - localfirsthealth.com
              - mycure.md
            email: caretheextramile@gmail.com
            name: letsencrypt-mycure-cloudflare-prod
            provider: cloudflare
            server: production
  
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
---
# Source: monobase-infrastructure/templates/cert-manager.yaml
# ArgoCD Application: cert-manager
# Sync Wave 0 - Deploy TLS certificate automation (cluster-wide)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.16.2
    helm:
      releaseName: cert-manager
      valuesObject:
        installCRDs: true
        global:
          leaderElection:
            namespace: cert-manager

        # Enable Gateway API support for HTTP-01 challenges
        # In v1.15+, use --enable-gateway-api flag via extraArgs
        extraArgs:
          - --enable-gateway-api

        # Resource limits for cert-manager components
        # Actual usage: controller=39Mi, cainjector=89Mi, webhook=18Mi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        
        cainjector:
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
        
        webhook:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
  
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
---

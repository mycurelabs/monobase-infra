# Source: monobase-applications/templates/valkey.yaml
# ArgoCD Application: Valkey (Redis Cache)
# Sync Wave 2 - Deploy cache before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-preprod-valkey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: valkey
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 2.x.x
    helm:
      releaseName: valkey
      valuesObject:
        global:
          security:
            allowInsecureImages: true
        image:
          repository: bitnamilegacy/valkey
          tag: 8.0.1-debian-12-r2
        architecture: standalone
        auth:
          enabled: true
          existingSecret: valkey
        primary:
          persistence:
            enabled: true
            storageClass: 
            size: 4Gi
          resourcesPreset: "none"
          resources: 
            limits:
              cpu: 500m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 1Gi
          nodeSelector:
            node-pool: staging
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: "staging"
              effect: "NoSchedule"

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-preprod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

# Source: monobase-applications/templates/hapihub.yaml
# ArgoCD Application: HapiHub API
# Sync Wave 3 - Deploy application after database

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-preprod-hapihub
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    path: charts/hapihub
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: main
    helm:
      releaseName: hapihub
      valuesObject:
        autoscaling:
          enabled: false
        betterAuth:
          passkey:
            rpId: preprod.localfirsthealth.com
            rpName: Mycure (preprod)
        config:
          ACCOUNTS_SERVICE_ACCOUNT_EMAILS: service@mycure.md
          CORS_ALLOW_LOCAL_NETWORK: "false"
          CORS_ALLOW_MOBILE_APPS: "true"
          CORS_ORIGINS: https://hapihub.preprod.localfirsthealth.com,https://mycure.preprod.localfirsthealth.com,https://mycurelocal.preprod.localfirsthealth.com,https://mycure-myaccount.preprod.localfirsthealth.com,https://mycure-deploydash.preprod.localfirsthealth.com,https://mycure-dashboard.preprod.localfirsthealth.com,https://dentalemon.preprod.localfirsthealth.com,https://dentalemon-myaccount.preprod.localfirsthealth.com,https://dentalemon-website.preprod.localfirsthealth.com,https://mycure-pr--*.web.app
          CORS_STRICT: "true"
        enabled: true
        env:
        - name: BETTER_AUTH_RATE_LIMIT_ENABLED
          value: "true"
        - name: BETTER_AUTH_RATE_LIMIT_WINDOW
          value: "60"
        - name: BETTER_AUTH_RATE_LIMIT_MAX
          value: "300"
        - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
          value: "false"
        externalSecrets:
          enabled: true
          refreshInterval: 1h
          secretStore: gcp-secretstore
          secretStoreKind: ClusterSecretStore
          secrets:
          - remoteKey: mycure-production-google-oauth-client-id
            secretKey: GOOGLE_CLIENT_ID
          - remoteKey: mycure-production-google-oauth-client-secret
            secretKey: GOOGLE_CLIENT_SECRET
          - remoteKey: mycure-production-stripe-secret-key
            secretKey: STRIPE_SECRET_KEY
          - remoteKey: mycure-production-enc-billing-invoices
            secretKey: ENC_BILLING_INVOICES
          - remoteKey: mycure-production-enc-billing-items
            secretKey: ENC_BILLING_ITEMS
          - remoteKey: mycure-production-enc-billing-payments
            secretKey: ENC_BILLING_PAYMENTS
          - remoteKey: mycure-production-enc-medical-records
            secretKey: ENC_MEDICAL_RECORDS
          - remoteKey: mycure-production-enc-personal-details
            secretKey: ENC_PERSONAL_DETAILS
          - remoteKey: mycure-production-private-key
            secretKey: PRIVATE_KEY
          - remoteKey: mycure-production-public-key
            secretKey: PUBLIC_KEY
          - remoteKey: mycure-production-storage-bucket
            secretKey: STORAGE_BUCKET
          - remoteKey: mycure-production-storage-client-email
            secretKey: STORAGE_CLIENT_EMAIL
          - remoteKey: mycure-production-storage-directory
            secretKey: STORAGE_DIRECTORY
          - remoteKey: mycure-production-storage-private-key
            secretKey: STORAGE_PRIVATE_KEY
          - remoteKey: mycure-production-storage-project-id
            secretKey: STORAGE_PROJECT_ID
          - remoteKey: mycure-production-storage-type
            secretKey: STORAGE_TYPE
          - remoteKey: mycure-production-stripe-key
            secretKey: STRIPE_KEY
          - remoteKey: mycure-production-stripe-checkout-success-url
            secretKey: STRIPE_CHECKOUT_SUCCESS_URL
          - remoteKey: mycure-production-stripe-checkout-cancel-url
            secretKey: STRIPE_CHECKOUT_CANCEL_URL
          - remoteKey: mycure-production-auth-secret
            secretKey: AUTH_SECRET
          - remoteKey: mycure-production-better-auth-secret
            secretKey: BETTER_AUTH_SECRET
        gateway:
          hostnames:
          - hapihub.preprod.localfirsthealth.com
          sectionName: https-preprod-lfh
          snippetsPolicy:
            enabled: false
        image:
          pullPolicy: IfNotPresent
          repository: ghcr.io/mycurelabs/hapihub
          tag: 11.5.0
        livenessProbe:
          enabled: true
        podDisruptionBudget:
          enabled: false
        postgresql:
          auth:
            database: hapihub
            existingSecret: postgresql
            username: postgres
          enabled: true
          external: false
          serviceName: postgresql
        readinessProbe:
          enabled: true
        replicaCount: 1
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 768Mi
        global: 
          domain: preprod.localfirsthealth.com
          environment: preprod
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system
          namespace: mycure-preprod
          nodePool: staging
          secretPrefix: mycure-production
          storage:
            className: ""
            provider: ""
        minio: 
          auth:
            existingSecret: minio
          buckets:
          - name: monobase-files
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            enabled: true
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          defaultBuckets: monobase-files
          enabled: true
          fullnameOverride: minio
          gateway:
            enabled: true
            hostname: ""
            rateLimit:
              enabled: false
            sectionName: https-preprod-lfh
          image:
            repository: bitnamilegacy/minio
            tag: 2025.7.23-debian-12-r3
          mode: standalone
          persistence:
            enabled: true
            size: 10Gi
            storageClass: ""
          podSecurityContext:
            enabled: true
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          region: us-east-1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          statefulset:
            replicaCount: 1
        mongodb: 
          enabled: false
        valkey: 
          architecture: standalone
          auth:
            existingSecret: valkey
          enabled: true
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/valkey
            tag: 8.0.1-debian-12-r2
          master:
            persistence:
              enabled: true
              size: 4Gi
              storageClass: ""
            resources:
              limits:
                cpu: 500m
                memory: 2Gi
              requests:
                cpu: 100m
                memory: 1Gi
        mailpit: 
          enabled: true
          gateway:
            enabled: true
            hostname: mail.preprod.localfirsthealth.com
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 25m
              memory: 32Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-preprod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

# Source: monobase-applications/templates/postgresql.yaml
# ArgoCD Application: PostgreSQL Database
# Sync Wave 2 - Deploy database before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-preprod-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 16.x.x
    helm:
      releaseName: postgresql
      valuesObject:
        image:
          repository: bitnamilegacy/postgresql
          tag: 16.4.0-debian-12-r13
        global:
          postgresql:
            auth:
              username: postgres
              database: hapihub
              existingSecret: postgresql
        auth:
          secretKeys:
            adminPasswordKey: postgres-password
        architecture: standalone

        # Primary block — supports both legacy (.Values.postgresql.{persistence,resources})
        # and new (.Values.postgresql.primary.*) value structures
        primary:
          persistence:
            enabled: true
            size: 200Gi
            storageClass: ""
          resources:
            limits:
              cpu: 2000m
              memory: 8Gi
            requests:
              cpu: 500m
              memory: 2Gi
          podDisruptionBudget:
            enabled: false
          nodeSelector:
            node-pool: staging
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: "staging"
              effect: "NoSchedule"

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-preprod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

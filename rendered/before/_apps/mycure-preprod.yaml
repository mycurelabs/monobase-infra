# Source: monobase-applications/templates/minio.yaml
# ArgoCD Application: MinIO Object Storage
# Sync Wave 2 - Deploy storage before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-preprod-minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Ignore benign drift from Kubernetes auto-modifications
  ignoreDifferences:
  - group: ""
    kind: ServiceAccount
    jsonPointers:
    - /secrets
    - /imagePullSecrets
  - group: ""
    kind: ConfigMap
    jqPathExpressions:
    - .data

  sources:
    # Source 1: Bitnami MinIO Helm chart
    - chart: minio
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 14.x.x
      helm:
        releaseName: minio
        valuesObject:
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/minio
            tag: 2025.7.23-debian-12-r3
          mode: standalone
          statefulset:
            replicaCount: 1
          auth:
            existingSecret: minio
          persistence:
            enabled: true
            storageClass: 
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          defaultBuckets: monobase-files
          podSecurityContext:
            enabled: true
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
          containerSecurityContext:
            enabled: true
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            privileged: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          # Node pool scheduling - inherited from global.nodePool
          nodeSelector:
            node-pool: staging
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: "staging"
              effect: "NoSchedule"
    # Source 2: HTTPRoute for Gateway API integration
    - repoURL: https://github.com/mycurelabs/monobase-infra.git
      path: infrastructure/httproutes/minio
      targetRevision: main
      helm:
        releaseName: minio-httproute
        valuesObject:
          hostname: storage.preprod.localfirsthealth.com
          namespace: mycure-preprod
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-preprod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
        factor: 2

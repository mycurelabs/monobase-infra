# Source: monobase-applications/templates/mailpit.yaml
# ArgoCD Application: Mailpit (Email Testing - Dev/Staging Only)
# Sync Wave 2 - Deploy before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-preprod-mailpit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: main
    path: charts/mailpit
    helm:
      releaseName: mailpit
      valuesObject:
        global:
          domain: preprod.localfirsthealth.com
          environment: preprod
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system
          namespace: mycure-preprod
          nodePool: staging
          secretPrefix: mycure-production
          storage:
            className: ""
            provider: ""
        enabled: true
        gateway:
          enabled: true
          hostname: mail.preprod.localfirsthealth.com
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 25m
            memory: 32Mi
        # Pass node pool scheduling to mailpit subchart
        mailpit:
          nodeSelector:
            node-pool: staging
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: "staging"
              effect: "NoSchedule"

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-preprod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

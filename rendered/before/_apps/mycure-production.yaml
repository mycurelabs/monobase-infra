# Source: monobase-applications/templates/hapihub-next.yaml
# ArgoCD Application: HapiHub Next (v11 alongside v10 for cutover)
#
# Transitional second Helm release of the hapihub chart, using the same
# templates as the main `hapihub:` block but a different `releaseName`
# so Kubernetes resource names do not collide. Purpose:
#
#   - mycure (new v10 frontend) points at a v11 backend on a temp
#     hostname (e.g. hapihub-next.{domain}) while the legacy stack is
#     still live.
#   - mycurev8 keeps calling the canonical hapihub.{domain} (v10 / Mongo).
#   - Later phase: swap HTTPRoute hostnames so v11 takes canonical and
#     v10 moves to hapihub-legacy.{domain}.
#
# Sync wave 3 so it deploys alongside the main hapihub release after
# databases (wave 2) are up.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-production-hapihub-next
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Same chart as the main hapihub release — the difference is only
    # the Helm releaseName, which flows through to hapihub.fullname
    # (= "hapihub-next") and gives the Deployment, Service, HTTPRoute,
    # ConfigMap, etc. distinct names from the main release.
    path: charts/hapihub
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: main
    helm:
      releaseName: hapihub-next
      valuesObject:
        autoscaling:
          enabled: true
          maxReplicas: 3
          minReplicas: 1
        betterAuth:
          passkey:
            rpId: localfirsthealth.com
            rpName: Mycure
        config:
          ACCOUNTS_SERVICE_ACCOUNT_EMAILS: service@mycure.md
          CORS_ALLOW_LOCAL_NETWORK: "false"
          CORS_ALLOW_MOBILE_APPS: "true"
          CORS_ORIGINS: https://mycure.localfirsthealth.com,https://mycurev8.localfirsthealth.com,https://mycurelocal.localfirsthealth.com,https://mycure-myaccount.localfirsthealth.com,https://mycure-deploydash.localfirsthealth.com,https://mycure-dashboard.localfirsthealth.com,https://dentalemon.localfirsthealth.com,https://dentalemon-myaccount.localfirsthealth.com,https://dentalemon-website.localfirsthealth.com
          CORS_STRICT: "true"
        enabled: true
        env:
        - name: BETTER_AUTH_RATE_LIMIT_ENABLED
          value: "true"
        - name: BETTER_AUTH_RATE_LIMIT_WINDOW
          value: "60"
        - name: BETTER_AUTH_RATE_LIMIT_MAX
          value: "300"
        - name: BETTER_AUTH_SESSION_COOKIE_CACHE_ENABLED
          value: "false"
        externalSecrets:
          enabled: true
          refreshInterval: 1h
          secretStore: gcp-secretstore
          secretStoreKind: ClusterSecretStore
          secrets:
          - remoteKey: mycure-production-google-oauth-client-id
            secretKey: GOOGLE_CLIENT_ID
          - remoteKey: mycure-production-google-oauth-client-secret
            secretKey: GOOGLE_CLIENT_SECRET
          - remoteKey: mycure-production-stripe-secret-key
            secretKey: STRIPE_SECRET_KEY
          - remoteKey: mycure-production-enc-billing-invoices
            secretKey: ENC_BILLING_INVOICES
          - remoteKey: mycure-production-enc-billing-items
            secretKey: ENC_BILLING_ITEMS
          - remoteKey: mycure-production-enc-billing-payments
            secretKey: ENC_BILLING_PAYMENTS
          - remoteKey: mycure-production-enc-medical-records
            secretKey: ENC_MEDICAL_RECORDS
          - remoteKey: mycure-production-enc-personal-details
            secretKey: ENC_PERSONAL_DETAILS
          - remoteKey: mycure-production-mongo-uri
            secretKey: MONGO_URI
          - remoteKey: mycure-production-private-key
            secretKey: PRIVATE_KEY
          - remoteKey: mycure-production-public-key
            secretKey: PUBLIC_KEY
          - remoteKey: mycure-production-storage-bucket
            secretKey: STORAGE_BUCKET
          - remoteKey: mycure-production-storage-client-email
            secretKey: STORAGE_CLIENT_EMAIL
          - remoteKey: mycure-production-storage-directory
            secretKey: STORAGE_DIRECTORY
          - remoteKey: mycure-production-storage-private-key
            secretKey: STORAGE_PRIVATE_KEY
          - remoteKey: mycure-production-storage-project-id
            secretKey: STORAGE_PROJECT_ID
          - remoteKey: mycure-production-storage-type
            secretKey: STORAGE_TYPE
          - remoteKey: mycure-production-stripe-key
            secretKey: STRIPE_KEY
          - remoteKey: mycure-production-stripe-checkout-success-url
            secretKey: STRIPE_CHECKOUT_SUCCESS_URL
          - remoteKey: mycure-production-stripe-checkout-cancel-url
            secretKey: STRIPE_CHECKOUT_CANCEL_URL
          - remoteKey: mycure-production-auth-secret
            secretKey: AUTH_SECRET
          - remoteKey: mycure-production-better-auth-secret
            secretKey: BETTER_AUTH_SECRET
        gateway:
          hostnames:
          - hapihub-next.localfirsthealth.com
          sectionName: https-lfh
          snippetsPolicy:
            enabled: false
        image:
          pullPolicy: IfNotPresent
          repository: ghcr.io/mycurelabs/hapihub
          tag: 11.3.7
        livenessProbe:
          enabled: true
        podDisruptionBudget:
          enabled: false
        postgresql:
          auth:
            database: hapihub
            existingSecret: postgresql
            username: postgres
          enabled: true
          external: false
          serviceName: postgresql-primary
        readinessProbe:
          enabled: true
        replicaCount: 3
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 768Mi
        global: 
          domain: localfirsthealth.com
          environment: production
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system
          namespace: mycure-production
          nodePool: production
          storage:
            className: ""
            provider: ""
        minio: 
          auth:
            existingSecret: minio
          buckets:
          - name: monobase-files
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            enabled: true
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          defaultBuckets: monobase-files
          enabled: false
          fullnameOverride: minio
          gateway:
            enabled: true
            hostname: ""
            rateLimit:
              enabled: false
          image:
            repository: bitnamilegacy/minio
            tag: 2025.7.23-debian-12-r3
          mode: standalone
          persistence:
            enabled: true
            size: 10Gi
            storageClass: ""
          podSecurityContext:
            enabled: true
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          region: us-east-1
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          statefulset:
            replicaCount: 1
        mongodb: 
          arbiter:
            enabled: false
          architecture: replicaset
          auth:
            existingSecret: mongodb
            rootUser: root
          enabled: false
          fullnameOverride: mongodb
          image:
            repository: bitnamilegacy/mongodb
            tag: 7.0.15-debian-12-r0
          livenessProbe:
            enabled: true
            failureThreshold: 10
            periodSeconds: 30
            timeoutSeconds: 30
          persistence:
            enabled: true
            size: 100Gi
            storageClass: ""
          podDisruptionBudget:
            enabled: false
          readinessProbe:
            enabled: true
            failureThreshold: 10
            periodSeconds: 20
            timeoutSeconds: 20
          replicaCount: 1
          resources:
            limits:
              cpu: 3000m
              memory: 6Gi
            requests:
              cpu: 1000m
              memory: 4Gi
        valkey: 
          architecture: standalone
          auth:
            existingSecret: valkey
          enabled: true
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/valkey
            tag: 8.0.1-debian-12-r2
          master:
            persistence:
              enabled: true
              size: 4Gi
              storageClass: ""
            resources:
              limits:
                cpu: 500m
                memory: 2Gi
              requests:
                cpu: 100m
                memory: 1Gi
        mailpit: 
          enabled: false
          gateway:
            enabled: true
            hostname: ""
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 25m
              memory: 32Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

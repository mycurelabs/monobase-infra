---
# Source: monobase-applications/templates/cadence.yaml
# ArgoCD Application: Cadence P2P Sync Engine
# Sync Wave 3 - Deploy application after database

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-production-cadence
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    path: charts/cadence
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: main
    helm:
      releaseName: cadence
      valuesObject:
        config:
          RUST_LOG: info
        enabled: true
        gateway:
          hostname: ""
          sectionName: https-lfh
          snippetsPolicy:
            clientMaxBodySize: 10m
            enabled: true
            proxyReadTimeout: 3600s
        image:
          pullPolicy: Always
          repository: ghcr.io/mycurelabs/cadence
          tag: 0.5.12
        replicaCount: 1
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 200m
            memory: 512Mi
        global: 
          domain: localfirsthealth.com
          environment: production
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system
          namespace: mycure-production
          nodePool: production
          storage:
            className: ""
            provider: ""
        postgresql: 
          architecture: replication
          auth:
            database: hapihub
            enabled: true
            existingSecret: postgresql
            replicationUsername: repl_user
            secretKeys:
              adminPasswordKey: postgres-password
              replicationPasswordKey: postgres-replication-password
            username: postgres
          enabled: true
          fullnameOverride: postgresql
          image:
            repository: bitnamilegacy/postgresql
            tag: 16.4.0-debian-12-r13
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          primary:
            persistence:
              enabled: true
              size: 200Gi
              storageClass: ""
            resources:
              limits:
                cpu: 2000m
                memory: 8Gi
              requests:
                cpu: 250m
                memory: 4Gi
          readReplicas:
            persistence:
              enabled: true
              size: 200Gi
              storageClass: ""
            replicaCount: 1
            resources:
              limits:
                cpu: 2000m
                memory: 8Gi
              requests:
                cpu: 100m
                memory: 4Gi
          serviceName: postgresql-primary
        valkey: 
          architecture: standalone
          auth:
            existingSecret: valkey
          enabled: true
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/valkey
            tag: 8.0.1-debian-12-r2
          master:
            persistence:
              enabled: true
              size: 4Gi
              storageClass: ""
            resources:
              limits:
                cpu: 500m
                memory: 2Gi
              requests:
                cpu: 100m
                memory: 1Gi
          serviceName: valkey-primary

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
---
# Source: monobase-applications/templates/database-secrets.yaml
# ArgoCD Application: Database Secrets
# Deploys ExternalSecrets for database credentials (PostgreSQL, MongoDB, MinIO)
# Sync Wave 1 - Deploy secrets before databases

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-production-database-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: database-secrets
    app.kubernetes.io/component: external-secrets
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: 
    path: charts/database-secrets
    helm:
      releaseName: database-secrets
      valuesObject:
        global:
          namespace: mycure-production
          domain: localfirsthealth.com
          environment: production
          secretPrefix: ""

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-production

  syncPolicy:
    automated:
      prune: true       # Remove ExternalSecrets when disabled
      selfHeal: true    # Auto-correct configuration drift
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m

  # Ignore expected differences
  ignoreDifferences:
    # ExternalSecret fields auto-populated by ESO operator
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
---

# Source: monobase-applications/templates/hapihub-migrator.yaml
# ArgoCD Application: HapiHub Migrator
# Sync Wave 4 - Deploy AFTER hapihub (wave 3) so the rest of the stack is healthy
# before the migrator starts touching MongoDB and PostgreSQL.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mycure-production-hapihub-migrator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    path: charts/hapihub-migrator
    repoURL: https://github.com/mycurelabs/monobase-infra.git
    targetRevision: main
    helm:
      releaseName: hapihub-migrator
      valuesObject:
        enabled: true
        externalSecrets:
          enabled: true
          refreshInterval: 1h
          secretStore: gcp-secretstore
          secretStoreKind: ClusterSecretStore
          secrets:
          - remoteKey: mycure-production-enc-billing-invoices
            secretKey: ENC_BILLING_INVOICES
          - remoteKey: mycure-production-enc-billing-items
            secretKey: ENC_BILLING_ITEMS
          - remoteKey: mycure-production-enc-billing-payments
            secretKey: ENC_BILLING_PAYMENTS
          - remoteKey: mycure-production-enc-medical-records
            secretKey: ENC_MEDICAL_RECORDS
          - remoteKey: mycure-production-enc-personal-details
            secretKey: ENC_PERSONAL_DETAILS
        image:
          pullPolicy: IfNotPresent
          repository: ghcr.io/mycurelabs/hapihub-migrator
          tag: 3.7.4
        mode: reverse-cdc
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 50m
            memory: 256Mi
        global: 
          domain: localfirsthealth.com
          environment: production
          gateway:
            name: nginx-shared-gateway
            namespace: nginx-gateway-system
          namespace: mycure-production
          nodePool: production
          storage:
            className: ""
            provider: ""
        postgresql: 
          architecture: replication
          auth:
            database: hapihub
            enabled: true
            existingSecret: postgresql
            passwordKey: postgres-password
            replicationUsername: repl_user
            secretKeys:
              adminPasswordKey: postgres-password
              replicationPasswordKey: postgres-replication-password
            username: postgres
          enabled: true
          fullnameOverride: postgresql
          image:
            repository: bitnamilegacy/postgresql
            tag: 16.4.0-debian-12-r13
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          port: 5432
          primary:
            persistence:
              enabled: true
              size: 200Gi
              storageClass: ""
            resources:
              limits:
                cpu: 2000m
                memory: 8Gi
              requests:
                cpu: 250m
                memory: 4Gi
          readReplicas:
            persistence:
              enabled: true
              size: 200Gi
              storageClass: ""
            replicaCount: 1
            resources:
              limits:
                cpu: 2000m
                memory: 8Gi
              requests:
                cpu: 100m
                memory: 4Gi
          serviceName: postgresql-primary
        mongodb: 
          arbiter:
            enabled: false
          architecture: replicaset
          auth:
            existingSecret: mongodb
            rootUser: root
          authSource: admin
          database: hapihub
          enabled: true
          existingSecret: mongodb
          fullnameOverride: mongodb
          image:
            repository: bitnamilegacy/mongodb
            tag: 7.0.15-debian-12-r0
          livenessProbe:
            enabled: true
            failureThreshold: 10
            periodSeconds: 30
            timeoutSeconds: 30
          passwordKey: mongodb-root-password
          persistence:
            enabled: true
            size: 100Gi
            storageClass: ""
          podDisruptionBudget:
            enabled: false
          port: 27017
          readinessProbe:
            enabled: true
            failureThreshold: 10
            periodSeconds: 20
            timeoutSeconds: 20
          replicaCount: 1
          replicaSet: rs0
          resources:
            limits:
              cpu: 3000m
              memory: 6Gi
            requests:
              cpu: 1000m
              memory: 4Gi
          serviceName: mongodb-headless
          username: root

  destination:
    server: https://kubernetes.default.svc
    namespace: mycure-production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m

{{- if .Values.monitoring.enabled }}
# ArgoCD Application: Monitoring Stack (Prometheus + Grafana)
# Sync Wave 0 - Deploy monitoring (cluster-wide, optional)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    chart: kube-prometheus
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: {{ .Values.monitoring.version | default "11.x.x" }}
    helm:
      releaseName: monitoring
      valuesObject:
        # Global storage configuration
        global:
          defaultStorageClass: ""
        
        # Use bitnamilegacy images (Bitnami deprecated non-hardened Debian images)
        operator:
          enabled: true
          image:
            repository: bitnamilegacy/prometheus-operator
        
        # Prometheus configuration
        prometheus:
          enabled: true
          retention: "30d"
          retentionSize: "45GB"
          image:
            repository: bitnamilegacy/prometheus
          
          persistence:
            enabled: true
            storageClass: ""
            size: "50Gi"
          
          resources:
            requests:
              cpu: "100m"
              memory: "400Mi"  # Increased from 200Mi - prevent OOM (actual usage: 324Mi)
            limits:
              cpu: "500m"
              memory: "768Mi"  # Optimized from 1Gi (actual usage: 533Mi = 69%)
          
          # Security context
          securityContext:
            enabled: true
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000

          # ponytail: managed control plane (DOKS) — kube-proxy/scheduler/controller-manager
          # are NOT scrapeable, so their *Down rules fire forever on absent() metrics.
          # Disable those rule groups. Re-enable per-flag if deployed to on-prem k3s.
          defaultRules:
            create: true
            rules:
              kubeProxy: false
              kubeControllerManager: false
              kubeSchedulerAlerting: false
              kubeSchedulerRecording: false

        # ServiceMonitors for the non-scrapeable managed control-plane components.
        kubeProxy:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false

        # KubeletDown fires falsely: the bundled rule matches up{job="kubelet",
        # metrics_path="/metrics"} but this chart's kubelet ServiceMonitor emits no
        # metrics_path label. Add it back so the rule sees the (healthy) targets.
        kubelet:
          serviceMonitor:
            relabelings:
              - targetLabel: metrics_path
                replacement: /metrics

        # Alertmanager configuration
        alertmanager:
          enabled: {{ .Values.monitoring.alertmanager.enabled }}
          image:
            repository: bitnamilegacy/alertmanager
          persistence:
            enabled: true
            storageClass: ""
            size: 2Gi
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          # Config (route + Postmark email receiver) is supplied externally via the
          # alertmanager-config ExternalSecret in infrastructure/monitoring/, so the
          # Postmark API token (which is BOTH the SMTP username and password) stays in
          # GCP Secret Manager. Operator reads secret:
          #   alertmanager-monitoring-kube-prometheus-alertmanager (key alertmanager.yaml)
          externalConfig: true
        
        # Blackbox Exporter
        blackboxExporter:
          enabled: true
          image:
            repository: bitnamilegacy/blackbox-exporter
        
        # Node Exporter (subchart - DaemonSet runs on all nodes)
        node-exporter:
          image:
            repository: bitnamilegacy/node-exporter
          resources:
            requests:
              cpu: "10m"       # Optimized from 100m (actual usage: ~2m = 2%)
              memory: "64Mi"   # Optimized from 128Mi (actual usage: ~16Mi = 12%)
            limits:
              cpu: "100m"      # Reduced from 150m
              memory: "128Mi"  # Reduced from 192Mi
        
        # Kube State Metrics (subchart)
        kube-state-metrics:
          image:
            repository: bitnamilegacy/kube-state-metrics
          resources:
            requests:
              cpu: "10m"      # Optimized from 250m (actual usage: 3m = 30%)
              memory: "64Mi"  # Optimized from 256Mi (actual usage: 32Mi = 50%)
            limits:
              cpu: "100m"
              memory: "128Mi"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
  
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
{{- end }}

{{- if .Values.signoz.enabled }}
# ArgoCD Application: SigNoz k8s-infra OTel collector
# DaemonSet + deployment collecting cluster/node/pod metrics (hostmetrics,
# kubeletstats, k8s_cluster) and Kubernetes logs, shipping them to the central
# SigNoz collector. Sync Wave 2 - after the SigNoz app (wave 1) is up.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: k8s-infra
    repoURL: https://charts.signoz.io
    targetRevision: {{ .Values.signoz.k8sInfraVersion | default "0.16.0" }}
    helm:
      releaseName: signoz-k8s-infra
      valuesObject:
        clusterName: {{ .Values.signoz.clusterName | default "mycure-production" | quote }}
        # In-cluster OTLP to the SigNoz central collector (plaintext, same cluster).
        otelCollectorEndpoint: signoz-otel-collector.signoz.svc.cluster.local:4317
        otelInsecure: true

  destination:
    server: https://kubernetes.default.svc
    namespace: signoz

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
{{- end }}

{{- if .Values.postgresql.enabled }}
# ArgoCD Application: PostgreSQL Database
# Sync Wave 2 - Deploy database before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.namespace }}-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: postgresql
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 16.x.x
    helm:
      releaseName: postgresql
      valuesObject:
        image:
          repository: {{ .Values.postgresql.image.repository | default "bitnamilegacy/postgresql" }}
          tag: {{ .Values.postgresql.image.tag | default "16.4.0-debian-12-r13" }}
        global:
          postgresql:
            auth:
              username: {{ .Values.postgresql.auth.username | default "postgres" }}
              database: {{ .Values.postgresql.auth.database | default "postgres" }}
              {{- if .Values.postgresql.auth.existingSecret }}
              existingSecret: {{ .Values.postgresql.auth.existingSecret }}
              {{- end }}
        auth:
          {{- if .Values.postgresql.auth.replicationUsername }}
          replicationUsername: {{ .Values.postgresql.auth.replicationUsername }}
          {{- end }}
          {{- if .Values.postgresql.auth.secretKeys }}
          secretKeys:
            adminPasswordKey: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey | default "postgres-password" }}
            {{- if .Values.postgresql.auth.secretKeys.replicationPasswordKey }}
            replicationPasswordKey: {{ .Values.postgresql.auth.secretKeys.replicationPasswordKey }}
            {{- end }}
          {{- end }}
        architecture: {{ .Values.postgresql.architecture | default "standalone" }}

        # Primary block — supports both legacy (.Values.postgresql.{persistence,resources})
        # and new (.Values.postgresql.primary.*) value structures
        primary:
          persistence:
            {{- if .Values.postgresql.primary }}
            {{- toYaml (.Values.postgresql.primary.persistence | default .Values.postgresql.persistence) | nindent 12 }}
            {{- else }}
            enabled: {{ .Values.postgresql.persistence.enabled | default true }}
            storageClass: {{ .Values.postgresql.persistence.storageClass | default "" }}
            size: {{ .Values.postgresql.persistence.size | default "20Gi" }}
            {{- end }}
          {{- if and .Values.postgresql.primary .Values.postgresql.primary.resources }}
          resources:
            {{- toYaml .Values.postgresql.primary.resources | nindent 12 }}
          {{- else if .Values.postgresql.resources }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          {{- end }}
          {{- if and .Values.postgresql.primary .Values.postgresql.primary.pgHbaConfiguration }}
          pgHbaConfiguration: |
            {{- .Values.postgresql.primary.pgHbaConfiguration | nindent 12 }}
          {{- end }}
          {{- if and .Values.postgresql.primary .Values.postgresql.primary.extendedConfiguration }}
          extendedConfiguration: |
            {{- .Values.postgresql.primary.extendedConfiguration | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.podDisruptionBudget }}
          podDisruptionBudget:
            {{- toYaml .Values.postgresql.podDisruptionBudget | nindent 12 }}
          {{- end }}
          {{- if .Values.global.nodePool }}
          nodeSelector:
            node-pool: {{ .Values.global.nodePool }}
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: {{ .Values.global.nodePool | quote }}
              effect: "NoSchedule"
          {{- end }}
          {{- if and .Values.postgresql.primary .Values.postgresql.primary.affinity }}
          affinity:
            {{- toYaml .Values.postgresql.primary.affinity | nindent 12 }}
          {{- end }}

        {{- if .Values.postgresql.readReplicas }}
        readReplicas:
          replicaCount: {{ .Values.postgresql.readReplicas.replicaCount | default 1 }}
          {{- if .Values.postgresql.readReplicas.persistence }}
          persistence:
            {{- toYaml .Values.postgresql.readReplicas.persistence | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.readReplicas.resources }}
          resources:
            {{- toYaml .Values.postgresql.readReplicas.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.readReplicas.extendedConfiguration }}
          extendedConfiguration: |
            {{- .Values.postgresql.readReplicas.extendedConfiguration | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.readReplicas.customStartupProbe }}
          # Gates liveness until the initial pg_basebackup completes. Without
          # this, a large re-clone (139GB+) is SIGKILLed by liveness every ~90s
          # and restarts forever. See disk-full incident 2026-06-25.
          customStartupProbe:
            {{- toYaml .Values.postgresql.readReplicas.customStartupProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.postgresql.podDisruptionBudget }}
          podDisruptionBudget:
            {{- toYaml .Values.postgresql.podDisruptionBudget | nindent 12 }}
          {{- end }}
          {{- if .Values.global.nodePool }}
          nodeSelector:
            node-pool: {{ .Values.global.nodePool }}
          tolerations:
            - key: "node-pool"
              operator: "Equal"
              value: {{ .Values.global.nodePool | quote }}
              effect: "NoSchedule"
          {{- end }}
          {{- if .Values.postgresql.readReplicas.affinity }}
          affinity:
            {{- toYaml .Values.postgresql.readReplicas.affinity | nindent 12 }}
          {{- end }}
        {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.global.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
{{- end }}

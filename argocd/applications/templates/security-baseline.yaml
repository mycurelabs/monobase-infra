# ArgoCD Application: Security Baseline
# Sync Wave 0 - Deploy NetworkPolicies and RBAC before applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.namespace }}-security-baseline
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # Root apps sync children with ServerSideApply=true; syncs of this object
    # intermittently fail with "--force cannot be used with --server-side"
    # (kubectl rejects the combination), aborting the WHOLE root sync across
    # environments (seen prod+demo 2026-07-10, controller syncIds 03748/03816).
    # Applying this one 0.5KB manifest client-side sidesteps the invalid flag
    # pairing entirely (per-resource opt-out documented in ArgoCD sync-options).
    argocd.argoproj.io/sync-options: ServerSideApply=false
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: {{ .Values.argocd.repoURL }}
    targetRevision: {{ .Values.argocd.targetRevision | default "main" }}
    path: charts/security-baseline
    helm:
      releaseName: security-baseline
      valuesObject:
        global:
          namespace: {{ .Values.global.namespace }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.global.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Namespace created by Wave -1
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 2m

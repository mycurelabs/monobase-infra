# AlertManager configuration, rendered with the Postmark API token from GCP Secret
# Manager. The prometheus-operator reads this secret (key alertmanager.yaml) as the
# base config for the Alertmanager named monitoring-kube-prometheus-alertmanager.
#
# Postmark uses the Server API Token as BOTH the SMTP username and password, and
# Alertmanager has no smtp_auth_username_file — so the whole config must be templated
# with the token injected here (externalConfig: true in the kube-prometheus chart).
#
# This dir is applied as raw manifests by the monitoring-resources ArgoCD app, so the
# {{ }} below are external-secrets (ESO) templates, NOT Helm.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-config
    app.kubernetes.io/component: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secretstore
    kind: ClusterSecretStore
  target:
    # Name the operator expects for the Alertmanager base config secret.
    name: alertmanager-monitoring-kube-prometheus-alertmanager
    creationPolicy: Owner
    # Retain is the API server default; spelled out to avoid Argo drift.
    deletionPolicy: Retain
    template:
      # API server defaults — set explicitly to avoid Argo drift.
      engineVersion: v2
      mergePolicy: Replace
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
            smtp_smarthost: "smtp.postmarkapp.com:587"
            smtp_from: "no-reply@mycure.md"
            smtp_auth_username: "{{ .token }}"
            smtp_auth_password: "{{ .token }}"
            smtp_require_tls: true
          route:
            group_by: ["alertname", "severity"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: default
          receivers:
            # Single receiver fans every alert out to BOTH email (Postmark) and Discord.
            - name: default
              email_configs:
                - to: "mycure.engineering@gmail.com"
                  send_resolved: true
              discord_configs:
                - webhook_url: "{{ .discord }}"
                  send_resolved: true
  data:
    - secretKey: token
      remoteRef:
        # API server defaults — set explicitly to avoid Argo drift.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: mycure-production-postmark-api-key
    - secretKey: discord
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: monitoring-alertmanager-discord-webhook

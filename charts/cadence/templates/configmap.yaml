{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cadence.fullname" . }}
  namespace: {{ include "cadence.namespace" . }}
  labels:
    {{- include "cadence.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  cadence.yml: |
    collections:
      {{- range $name, $col := .Values.cadenceConfig.collections }}
      {{ $name | quote }}:
        strategy: {{ $col.strategy }}
        {{- if $col.scope_rules }}
        scope_rules:
          {{- $col.scope_rules | toYaml | nindent 10 }}
        {{- end }}
        {{- if $col.scope_columns }}
        {{- /* toYaml (not `{{ $v }}`) so a multi-column list renders as a real
               YAML sequence. Go's default slice stringification prints
               `[insured insurer insured_organization]` (space-joined, no commas)
               → parsed as ONE bogus column → PrimaryReader drops the whole
               collection (PG 42703) → HMO/partner data never reaches boxes. */}}
        scope_columns:
          {{- $col.scope_columns | toYaml | nindent 10 }}
        {{- end }}
      {{- end }}
    {{- if .Values.cadenceConfig.collectionsBlacklist }}
    collections_blacklist:
      {{- range .Values.cadenceConfig.collectionsBlacklist }}
      - {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- if .Values.cadenceConfig.priorities }}
    priorities:
      {{- range $name, $prio := .Values.cadenceConfig.priorities }}
      {{ $name | quote }}: {{ $prio }}
      {{- end }}
    {{- end }}
{{- end }}

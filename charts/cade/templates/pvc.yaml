{{- if .Values.enabled }}
# Persists the sqlite identity db so the node's EndpointId is stable across restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cade-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
{{- end }}

{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cade
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: cade
spec:
  replicas: 1
  # RWO volume for the sqlite identity db → Recreate avoids attach deadlock on update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cade
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cade
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        # chown the PVC to this group so the non-root user can write the sqlite db.
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: cade
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        args: ["peer", "--accept"]
        env:
        - name: CADE_UDP_PORT
          value: {{ .Values.udpPort | quote }}
        - name: CADE_DB
          value: /data/cade.db
        {{- if .Values.publicAddr }}
        # Anchor advertises its own public LB address so peers reach it DIRECTLY by
        # EndpointId alone (no peer-side IP). A pod can't self-discover its LB IP.
        - name: CADE_PUBLIC_ADDR
          value: {{ .Values.publicAddr | quote }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        ports:
        - name: quic
          containerPort: {{ .Values.udpPort }}
          protocol: UDP
        - name: health
          containerPort: {{ .Values.udpPort }}
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: health
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: cade-data
      {{- if .Values.nodePool }}
      nodeSelector:
        node-pool: {{ .Values.nodePool }}
      tolerations:
      - key: "node-pool"
        operator: "Equal"
        value: {{ .Values.nodePool | quote }}
        effect: "NoSchedule"
      {{- end }}
{{- end }}

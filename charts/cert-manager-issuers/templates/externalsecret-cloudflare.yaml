{{- if .Values.cloudflareExternalSecret.enabled }}
# ExternalSecret: Cloudflare API Token for cert-manager DNS-01 ClusterIssuers
# Syncs from external secret manager into cert-manager namespace

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.cloudflareExternalSecret.targetName | default "mycure-cloudflare-api-token" }}
  namespace: {{ .Values.cloudflareExternalSecret.namespace | default "cert-manager" }}
  labels:
    app.kubernetes.io/name: {{ .Values.cloudflareExternalSecret.targetName | default "mycure-cloudflare-api-token" }}
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: cert-manager-issuers
spec:
  refreshInterval: {{ .Values.cloudflareExternalSecret.refreshInterval | default "1h" }}

  secretStoreRef:
    name: {{ .Values.cloudflareExternalSecret.secretStore | default "gcp-secretstore" }}
    kind: ClusterSecretStore

  target:
    name: {{ .Values.cloudflareExternalSecret.targetName | default "mycure-cloudflare-api-token" }}
    creationPolicy: Owner

  data:
    - secretKey: api-token
      remoteRef:
        key: {{ .Values.cloudflareExternalSecret.remoteKey | required "cloudflareExternalSecret.remoteKey is required" }}
{{- end }}

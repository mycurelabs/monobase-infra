{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-credentials
  namespace: {{ .Values.namespace | default "velero" }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore | default "gcp-secretstore" }}
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    creationPolicy: Owner
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id={{ "{{ .spacesAccessKey }}" }}
          aws_secret_access_key={{ "{{ .spacesSecretKey }}" }}
  data:
    - secretKey: spacesAccessKey
      remoteRef:
        key: {{ .Values.externalSecrets.credentialsKey | default "monobase-digitalocean-spaces" }}
        property: access_key
    - secretKey: spacesSecretKey
      remoteRef:
        key: {{ .Values.externalSecrets.credentialsKey | default "monobase-digitalocean-spaces" }}
        property: secret_key
{{- end }}

# Default values for database-secrets chart
# These are overridden by parent application values

global:
  namespace: example
  domain: example.com
  environment: production
  # GCP Secret Manager key prefix. Defaults to the namespace so keys look like
  # "{namespace}-postgresql-password". Override (e.g. to "mycure-production")
  # when a deployment needs to reuse another environment's DB secrets — useful
  # for ephemeral prod-mirror envs that restore real data and must decrypt it
  # with the original credentials.
  secretPrefix: ""

# MinIO credentials ExternalSecret toggle. Forwarded from the deployment values
# by the database-secrets ArgoCD Application. Default off: the secret is only
# synced where MinIO is actually enabled (preprod/demo); prod uses GCS.
minio:
  enabled: false

# MinIO ExternalSecret
# Syncs MinIO credentials from GCP Secret Manager to Kubernetes
# Used by: minio chart (Bitnami), API, HapiHub
# Only rendered when MinIO is enabled — prod uses GCS (minio.enabled: false), so
# the {prefix}-minio-root-* GCP keys don't exist there and a SecretSyncedError
# would otherwise mark dependent ArgoCD apps Degraded.
{{- if .Values.minio.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: minio-credentials
    app.kubernetes.io/component: external-secrets
spec:
  # Refresh interval - how often to sync from GCP
  refreshInterval: 1h
  
  # Reference to ClusterSecretStore
  secretStoreRef:
    name: gcp-secretstore
    kind: ClusterSecretStore
  
  # Target Kubernetes secret
  target:
    name: minio
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # MinIO root user - required by Bitnami MinIO chart
        root-user: {{ `"{{ .minioRootUser }}"` }}
        # MinIO root password - required by Bitnami MinIO chart
        root-password: {{ `"{{ .minioRootPassword }}"` }}
  
  # Data to fetch from GCP Secret Manager
  data:
    - secretKey: minioRootUser
      remoteRef:
        key: {{ .Values.global.secretPrefix | default .Values.global.namespace }}-minio-root-user

    - secretKey: minioRootPassword
      remoteRef:
        key: {{ .Values.global.secretPrefix | default .Values.global.namespace }}-minio-root-password
{{- end }}

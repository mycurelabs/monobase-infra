{{- if and .Values.enabled .Values.gateway.enabled .Values.gateway.snippetsPolicy.enabled }}
apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsPolicy
metadata:
  name: {{ include "hapihub.fullname" . }}-proxy-timeout
  namespace: {{ include "hapihub.gateway.namespace" . }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "hapihub.gateway.name" . }}
  snippets:
    - context: http.server.location
      value: |
        proxy_read_timeout {{ .Values.gateway.snippetsPolicy.proxyReadTimeout }};
        client_max_body_size {{ .Values.gateway.snippetsPolicy.clientMaxBodySize }};
{{- end }}

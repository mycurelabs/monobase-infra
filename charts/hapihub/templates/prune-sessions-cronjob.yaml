{{- if and .Values.enabled .Values.pruneExpiredSessions.enabled }}
# Daily prune of expired Better Auth sessions. Better Auth never deletes
# expired session rows (it only checks expiry at read time), so they accumulate
# forever. Runs the canonical `hapihub backfill prune-expired-sessions` — a
# bounded, idempotent `DELETE FROM "session" WHERE "expires_at" < now()` that
# only touches already-expired rows, so it never logs anyone out.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "hapihub.fullname" . }}-prune-sessions
  namespace: {{ include "hapihub.namespace" . }}
  labels:
    {{- include "hapihub.labels" . | nindent 4 }}
    job-type: prune-expired-sessions
spec:
  schedule: {{ .Values.pruneExpiredSessions.schedule | default "0 3 * * *" | quote }}
  timeZone: {{ .Values.pruneExpiredSessions.timeZone | default "Etc/UTC" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.pruneExpiredSessions.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.pruneExpiredSessions.failedJobsHistoryLimit | default 3 }}
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.pruneExpiredSessions.backoffLimit | default 1 }}
      ttlSecondsAfterFinished: {{ .Values.pruneExpiredSessions.ttlSecondsAfterFinished | default 86400 }}
      activeDeadlineSeconds: {{ .Values.pruneExpiredSessions.activeDeadlineSeconds | default 600 }}
      template:
        metadata:
          annotations:
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
            {{- with .Values.podAnnotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          labels:
            {{- include "hapihub.selectorLabels" . | nindent 12 }}
            job-type: prune-expired-sessions
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "hapihub.serviceAccountName" . }}
          enableServiceLinks: false
          restartPolicy: Never
          {{- $nodePool := include "hapihub.nodePool" . -}}
          {{- if or $nodePool .Values.nodeSelector }}
          nodeSelector:
            {{- if $nodePool }}
            node-pool: {{ $nodePool }}
            {{- end }}
            {{- with .Values.nodeSelector }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or $nodePool .Values.tolerations }}
          tolerations:
            {{- if $nodePool }}
            - key: "node-pool"
              operator: "Equal"
              value: {{ $nodePool | quote }}
              effect: "NoSchedule"
            {{- end }}
            {{- with .Values.tolerations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
          - name: {{ .Chart.Name }}-prune-sessions
            securityContext:
              {{- toYaml .Values.securityContext | nindent 14 }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            command: ["hapihub"]
            args: ["backfill", "prune-expired-sessions"]
            resources:
              {{- toYaml .Values.pruneExpiredSessions.resources | nindent 14 }}
            env:
            {{- include "hapihub.containerEnv" . | nindent 12 }}
{{- end }}

enabled: true

image:
  repository: ghcr.io/mycurelabs/poc-iroh
  tag: "0.3.0"
  pullPolicy: IfNotPresent

# UDP port the iroh QUIC endpoint binds, and the LB forwards. A TCP listener on
# the same port serves the DO LoadBalancer health check.
udpPort: 6472

# Public address the hub advertises (the udp-gateway LB IP:port) so peers reach
# it directly by EndpointId alone. Empty = advertise only discovered addrs.
publicAddr: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Schedule onto the same pool cadence uses (tainted node-pool=staging on preprod).
nodePool: "staging"

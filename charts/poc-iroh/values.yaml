enabled: true

image:
  repository: ghcr.io/mycurelabs/poc-iroh
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# UDP port the iroh QUIC endpoint binds, and the LB forwards. A TCP listener on
# the same port serves the DO LoadBalancer health check.
udpPort: 6472

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Schedule onto the same pool cadence uses (tainted node-pool=staging on preprod).
nodePool: "staging"

{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: poc-iroh
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: poc-iroh
  annotations:
    # DO UDP LoadBalancers require a TCP/HTTP health check; probe the TCP
    # listener the hub opens on the same port.
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-protocol: "tcp"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-port: {{ .Values.udpPort | quote }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: quic
    port: {{ .Values.udpPort }}
    targetPort: quic
    protocol: UDP
  - name: health
    port: {{ .Values.udpPort }}
    targetPort: health
    protocol: TCP
  selector:
    app.kubernetes.io/name: poc-iroh
{{- end }}

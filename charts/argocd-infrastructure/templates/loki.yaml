{{- if .Values.loki.enabled }}
# ArgoCD Application: Loki
# Sync Wave 1 - After monitoring stack (wave 0)
# Log aggregation for centralized querying of application and system logs

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: loki
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: {{ .Values.loki.version | default "6.24.0" }}
    helm:
      releaseName: loki
      valuesObject:
        # Single-binary mode for simple deployments
        # Switch to distributed mode for >1TB/day ingestion
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          persistence:
            enabled: true
            storageClass: ""
            size: {{ .Values.loki.storageSize | default "50Gi" }}

        # Loki configuration
        loki:
          # Authentication
          auth_enabled: false  # Single-tenant mode

          # Schema and storage
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          # Retention
          limits_config:
            retention_period: {{ .Values.loki.retention | default "30d" }}
            max_query_lookback: {{ .Values.loki.retention | default "30d" }}
            ingestion_rate_mb: 10
            ingestion_burst_size_mb: 20
            max_streams_per_user: 10000

          # Compactor for retention enforcement
          compactor:
            working_directory: /var/loki/compactor
            retention_enabled: true
            delete_request_store: filesystem

          commonConfig:
            replication_factor: 1

        # Disable components not needed in single-binary mode
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0

        # Gateway (nginx) - disabled, using Envoy Gateway
        gateway:
          enabled: false

        # Monitoring
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

        # Security context
        singleBinary:
          extraArgs:
            - -config.expand-env=true
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 5m
{{- end }}

# Default values for MedleyApp chart
# Override these values in values/deployments/*.yaml

global:
  domain: example.com
  namespace: example-prod
  environment: production
  gateway:
    name: shared-gateway
    namespace: gateway-system

enabled: true

replicaCount: 2

image:
  repository: ghcr.io/mycurelabs/medleyapp
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101  # caddy-k8s user
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

gateway:
  enabled: true
  hostname: ""  # Empty = uses medleyapp.{global.domain}
  sectionName: ""  # Override gateway listener section name

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node pool scheduling (optional, disabled by default)
# Inherits from global.nodePool if configured
# nodePool:
#   enabled: false     # Set to false to explicitly disable (overrides global)
#   name: "staging"    # Override global node pool name

nodeSelector: {}
tolerations: []
affinity: {}

# Frontend configuration (passed as environment variables to the container)
config:
  MEDLEY_URL: ""   # Set to Medley backend URL (in-cluster or public)
  API_URL: ""      # Set to HapiHub public URL

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics

{{- if and .Values.enabled .Values.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nocodb.fullname" . }}-bootstrap-script
  namespace: {{ include "nocodb.namespace" . }}
  labels:
    {{- include "nocodb.labels" . | nindent 4 }}
data:
  bootstrap.js: |
{{ .Files.Get "files/bootstrap.js" | indent 4 }}
{{- end }}

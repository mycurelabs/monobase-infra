{{- if and .Values.enabled .Values.reverseNightlyJob.enabled }}
# Reverse nightly safety-net sweep (PG → MongoDB): MODE=reverse-bulk over a
# trailing updated_at window. Catches anything the realtime reverse replayer
# missed (downtime, trigger-uninstalled windows, pre-trigger rows).
# Idempotent — the latest-wins _sl tie-skip makes re-applying a no-op.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "hapihub-migrator.fullname" . }}-reverse-nightly
  namespace: {{ include "hapihub-migrator.namespace" . }}
  labels:
    {{- include "hapihub-migrator.labels" . | nindent 4 }}
    job-type: reverse-nightly-sweep
spec:
  schedule: {{ .Values.reverseNightlyJob.schedule | quote }}
  timeZone: {{ .Values.reverseNightlyJob.timeZone | default "Etc/UTC" | quote }}
  concurrencyPolicy: {{ .Values.reverseNightlyJob.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ .Values.reverseNightlyJob.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.reverseNightlyJob.failedJobsHistoryLimit | default 7 }}
  startingDeadlineSeconds: {{ .Values.reverseNightlyJob.startingDeadlineSeconds | default 3600 }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.reverseNightlyJob.backoffLimit | default 1 }}
      ttlSecondsAfterFinished: {{ .Values.reverseNightlyJob.ttlSecondsAfterFinished | default 259200 }}
      activeDeadlineSeconds: {{ .Values.reverseNightlyJob.activeDeadlineSeconds | default 21600 }}
      template:
        metadata:
          annotations:
            checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
            {{- with .Values.podAnnotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          labels:
            {{- include "hapihub-migrator.reverseSelectorLabels" . | nindent 12 }}
            job-type: reverse-nightly-sweep
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "hapihub-migrator.serviceAccountName" . }}
          enableServiceLinks: false
          restartPolicy: Never
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
          - name: {{ .Chart.Name }}-reverse-nightly
            securityContext:
              {{- toYaml .Values.securityContext | nindent 14 }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            envFrom:
            - configMapRef:
                name: {{ include "hapihub-migrator.fullname" . }}
            env:
            # ===== Reverse nightly overrides (env shadows envFrom) =====
            - name: MODE
              value: "reverse-bulk"
            - name: EXIT_ON_BULK_END
              value: "true"
            - name: RESUME_MIGRATION
              value: "false"
            - name: REVERSE_BULK_WINDOW_HOURS
              value: {{ .Values.reverseNightlyJob.windowHours | default 26 | quote }}
            {{- if .Values.reverseNightlyJob.tables }}
            - name: REVERSE_TABLES
              value: {{ .Values.reverseNightlyJob.tables | quote }}
            {{- end }}
            - name: TZ
              value: "UTC"
            # ===== PostgreSQL source =====
            {{- if .Values.postgresql.enabled }}
            - name: PG_USER
              value: {{ .Values.postgresql.auth.username | default "postgres" | quote }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret | default "postgresql" }}
                  key: {{ .Values.postgresql.auth.passwordKey | default "postgres-password" }}
            - name: PG_TARGET_URI
              value: "postgres://$(PG_USER):$(PG_PASSWORD)@{{ include "hapihub-migrator.postgresql.host" . }}:{{ .Values.postgresql.port | default 5432 }}/{{ .Values.postgresql.auth.database | default "hapihub" }}"
            {{- end }}
            # ===== MongoDB (write target) =====
            {{- if .Values.mongodb.enabled }}
            - name: MONGO_USER
              value: {{ .Values.mongodb.username | default "root" | quote }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.existingSecret | default "mongodb" }}
                  key: {{ .Values.mongodb.passwordKey | default "mongodb-root-password" }}
            - name: MONGO_SOURCE_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PASSWORD)@{{ include "hapihub-migrator.mongodb.host" . }}:{{ .Values.mongodb.port | default 27017 }}/{{ .Values.mongodb.database | default "hapihub" }}?authSource={{ .Values.mongodb.authSource | default "admin" }}&replicaSet={{ .Values.mongodb.replicaSet | default "rs0" }}&directConnection=true"
            {{- end }}
            # ===== Encryption keys =====
            {{- if .Values.externalSecrets.enabled }}
            {{- range .Values.externalSecrets.secrets }}
            - name: {{ .secretKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "hapihub-migrator.fullname" $ }}-secrets
                  key: {{ .secretKey }}
            {{- end }}
            {{- end }}
            # ===== Custom env (free-form) =====
            {{- with .Values.reverseNightlyJob.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            resources:
              {{- toYaml .Values.reverseNightlyJob.resources | nindent 14 }}
          {{- $nodePool := include "hapihub-migrator.nodePool" . -}}
          {{- if or $nodePool .Values.nodeSelector }}
          nodeSelector:
            {{- if $nodePool }}
            node-pool: {{ $nodePool }}
            {{- end }}
            {{- with .Values.nodeSelector }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $nodePool .Values.tolerations }}
          tolerations:
            {{- if $nodePool }}
            - key: "node-pool"
              operator: "Equal"
              value: {{ $nodePool | quote }}
              effect: "NoSchedule"
            {{- end }}
            {{- with .Values.tolerations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
{{- end }}

{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hapihub-migrator.fullname" . }}
  namespace: {{ include "hapihub-migrator.namespace" . }}
  labels:
    {{- include "hapihub-migrator.labels" . | nindent 4 }}
data:
  MODE: {{ .Values.mode | quote }}
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}

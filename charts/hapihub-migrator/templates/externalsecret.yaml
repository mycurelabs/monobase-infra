{{- if and .Values.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "hapihub-migrator.fullname" . }}-secrets
  namespace: {{ include "hapihub-migrator.namespace" . }}
  labels:
    {{- include "hapihub-migrator.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore | default (printf "%s-secretstore" (include "hapihub-migrator.namespace" .)) }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "SecretStore" }}
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  target:
    name: {{ include "hapihub-migrator.fullname" . }}-secrets
    creationPolicy: Owner
    # Retain is the API server default; spelled out to avoid Argo drift.
    deletionPolicy: Retain
  data:
    {{- range .Values.externalSecrets.secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        # API server defaults — set explicitly to avoid Argo drift.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}

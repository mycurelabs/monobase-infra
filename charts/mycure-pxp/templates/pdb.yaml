{{- if and .Values.enabled .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "mycure-pxp.fullname" . }}
  namespace: {{ include "mycure-pxp.namespace" . }}
  labels:
    {{- include "mycure-pxp.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "mycure-pxp.selectorLabels" . | nindent 6 }}
{{- end }}

gatewayClass:
  enabled: true
  name: nginx
  controllerName: gateway.nginx.org/nginx-gateway-controller

gateway:
  name: nginx-shared-gateway
  namespace: nginx-gateway-system
  gatewayClassName: nginx
  # Flat list of listeners — each HTTPS listener references a certificate by tlsSecretName
  listeners: []
  # Example:
  # - name: https-stg-lfh
  #   port: 443
  #   protocol: HTTPS
  #   hostname: "*.stg.localfirsthealth.com"
  #   tlsSecretName: nginx-gateway-tls
  # - name: http-stg-lfh
  #   port: 80
  #   protocol: HTTP
  #   hostname: "*.stg.localfirsthealth.com"

# Cluster-wide SnippetsPolicies attached to the shared Gateway.
# Owned here (not per-app chart) so two releases can never inject the
# same directive into the same nginx context — that triggers
# "directive is duplicate" and breaks config reload.
snippetsPolicies: []
# Example:
# - name: hapihub-proxy-timeout
#   snippets:
#     - context: http.server.location
#       value: |
#         proxy_read_timeout 3600s;
#         client_max_body_size 50m;

tls:
  # List of certificates — each can use a different ClusterIssuer
  certificates: []
  # Example:
  # - secretName: nginx-gateway-tls
  #   clusterIssuer: letsencrypt-mycure-cloudflare-prod
  #   dnsNames:
  #     - dentalemon-website.stg.localfirsthealth.com

{{- /*
Cluster-wide SnippetsPolicy for the shared nginx Gateway.

This used to live in the per-environment hapihub chart, but defining the
same SnippetsPolicy in two releases against the same Gateway caused nginx
to inject the same `proxy_read_timeout` directive twice and fail config
reload with "directive is duplicate" — taking down hapihub.localfirsthealth.com.

Owning it once at the gateway level mirrors the resource's actual scope:
the snippet applies to every request through nginx-shared-gateway.
*/ -}}
{{- range .Values.snippetsPolicies }}
---
apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsPolicy
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "nginx-gateway.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gateway.name }}
  snippets:
    {{- range .snippets }}
    - context: {{ .context }}
      value: |
        {{- .value | nindent 8 }}
    {{- end }}
{{- end }}

      ports:
        - protocol: TCP
          port: 9000  # S3 API

---
# Notes:
# 1. Envoy Gateway pods run in envoy-gateway-system namespace
# 2. NGINX Gateway Fabric pods run in nginx-gateway-system namespace
# 3. This allows ONLY gateway proxies to reach applications
# 4. Direct pod-to-pod traffic is still blocked
# 5. Applications can't reach each other (use allow-apps-to-apps.yaml if needed)

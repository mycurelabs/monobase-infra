# Allow Traffic from Gateway to Applications
# Permits Envoy Gateway and NGINX Gateway to route traffic to Monobase API, API Worker, Monobase Account

---
# Allow Gateway → Monobase API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-api
  namespace: {{ .Values.global.namespace }}
  labels:
    security-policy: allow-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api

  policyTypes:
    - Ingress

  ingress:
    # Allow from Gateway namespaces (Envoy Gateway + NGINX Gateway)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway-system
      ports:
        - protocol: TCP
          port: 7213

---
